---
# WFI Sources Protocol Configuration for ace-timestamp
# This enables workflow discovery from the ace-support-timestamp gem
#
# NOTE: The filename "ace-timestamp.yml" is intentionally kept for protocol stability.
# The protocol name "wfi://timestamp" is user-facing and remains stable even though
# the gem was renamed to ace-support-timestamp in version 0.2.0 (per ADR-024, no
# backward compatibility shims are provided, but user-facing protocols remain stable).

name: ace-support-timestamp
type: gem
description: Timestamp workflow instructions from ace-support-timestamp gem
priority: 10

# Configuration for workflow discovery within the gem
config:
  # Relative path within the gem (default: handbook/workflow-instructions)
  relative_path: handbook/workflow-instructions

  # Pattern for finding workflow files (default: *.wf.md)
  pattern: "*.wf.md"

  # Enable discovery
  enabled: true
