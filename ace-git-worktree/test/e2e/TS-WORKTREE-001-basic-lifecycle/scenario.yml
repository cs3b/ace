test-id: TS-WORKTREE-001
title: "ace-git-worktree Basic Lifecycle Goal-Based E2E"
area: worktree
package: ace-git-worktree
priority: high
tags: [smoke, happy-path, "use-case:worktree"]
cost-tier: smoke
tool-under-test: ace-git-worktree

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "List and create evidence"
  results/tc/03/:  "Switch and output format evidence"
  results/tc/04/:  "Dry-run operations evidence"
  results/tc/05/:  "Remove worktree evidence"
  results/tc/06/:  "Prune orphaned worktree evidence"

e2e-justification: >
  All goals require real git worktree operations through a shell. Creating,
  switching, removing, and pruning worktrees depend on real git state,
  filesystem paths, and branch management. None testable with mocks.

unit-coverage-reviewed:
  - test/commands/create_command_test.rb
  - test/commands/list_command_test.rb
  - test/commands/switch_command_test.rb
  - test/commands/remove_command_test.rb
  - test/commands/prune_command_test.rb
  - test/molecules/worktree_creator_test.rb
  - test/molecules/worktree_lister_test.rb
  - test/molecules/worktree_remover_test.rb
  - test/organisms/worktree_manager_test.rb

requires:
  tools: [git, ace-git-worktree]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $ACE_E2E_SOURCE_ROOT/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - run: mkdir -p .ace-wt
  - run: |
      git checkout -b feature/test-worktree --quiet
      echo "feature content" > feature.txt
      git add feature.txt && git commit -m "Add feature" --quiet
      git checkout -b bugfix/test-fix --quiet
      echo "bugfix content" > bugfix.txt
      git add bugfix.txt && git commit -m "Add bugfix" --quiet
      git checkout main --quiet
