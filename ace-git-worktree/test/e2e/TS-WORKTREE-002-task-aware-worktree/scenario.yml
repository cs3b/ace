test-id: TS-WORKTREE-002
title: Task-Aware Worktree
area: git-worktree
package: ace-git-worktree
priority: high
requires:
  tools: [git, ace-git-worktree, ace-taskflow]

setup:
  - git-init
  - run: |
      echo "# Test Repository" > README.md
      git add README.md && git commit -m "Initial commit" --quiet
  - copy-fixtures
  - run: |
      mkdir -p .ace-wt
      git add .ace-taskflow/ .ace/ && git commit -m "Add taskflow" --quiet
  - env:
      PROJECT_ROOT_PATH: .
