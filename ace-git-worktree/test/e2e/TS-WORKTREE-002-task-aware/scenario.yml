test-id: TS-WORKTREE-002
title: "ace-git-worktree Task-Aware Goal-Based E2E"
area: worktree
package: ace-git-worktree
priority: high
tags: [deep, "use-case:worktree"]
cost-tier: happy-path
tool-under-test: ace-git-worktree

sandbox-layout:
  results/tc/01/:  "Help survey (task flags)"
  results/tc/02/:  "Task worktree creation evidence"
  results/tc/03/:  "Task list and filter evidence"
  results/tc/04/:  "Switch by task ID evidence"
  results/tc/05/:  "Multi-task worktree evidence"
  results/tc/06/:  "JSON output with task metadata"
  results/tc/07/:  "Remove and cleanup evidence"

e2e-justification: >
  Task-aware worktree operations require real git worktrees, real taskflow
  task files, and real .ace-wt tracking metadata. Branch naming conventions,
  task ID resolution, and metadata injection into JSON output all depend on
  the real filesystem and git state.

unit-coverage-reviewed:
  - test/commands/create_command_test.rb
  - test/commands/list_command_test.rb
  - test/commands/switch_command_test.rb
  - test/commands/remove_command_test.rb
  - test/molecules/current_task_linker_test.rb
  - test/molecules/parent_task_resolver_test.rb
  - test/molecules/task_fetcher_test.rb
  - test/organisms/task_worktree_orchestrator_test.rb

requires:
  tools: [git, ace-git-worktree]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
