---
description: Preview task-aware worktree creation and listing
tags:
- docs
- worktree
settings:
  font_size: 16
  width: 960
  height: 480
  format: gif
setup:
- sandbox
- git-init
- copy-fixtures
- run: git add -A && git commit -qm "initial commit"
scenes:
- name: Create a worktree from a branch
  commands:
  - type: ace-git-worktree create --branch feature/demo --dry-run
    sleep: 4s
- name: List worktrees
  commands:
  - type: clear
    sleep: 1s
  - type: ace-git-worktree list
    sleep: 3s
teardown:
- cleanup
