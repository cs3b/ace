test-id: TS-TASK-001
title: "ace-task Core CLI Smoke E2E"
area: task
package: ace-task
priority: high
tags: [smoke, happy-path, "use-case:task"]
cost-tier: smoke
tool-under-test: ace-task

sandbox-layout:
  results/tc/01/: "Help survey observations"
  results/tc/02/: "Create/show/list lifecycle evidence"
  results/tc/03/: "Update and archive movement evidence"
  results/tc/04/: "Doctor health/error-path evidence"

e2e-justification: >
  These goals validate the real ace-task CLI binary in a real sandbox with real
  filesystem state transitions across multiple commands. Unit tests cover
  command internals but do not validate end-to-end operator flow with persistent
  on-disk task state and shell-level command boundaries.

unit-coverage-reviewed:
  - test/fast/commands/create_test.rb
  - test/fast/commands/update_test.rb
  - test/fast/commands/doctor_test.rb
  - test/fast/commands/plan_test.rb

requires:
  tools: [ace-task, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp ${ACE_E2E_SOURCE_ROOT:-$PROJECT_ROOT_PATH}/mise.toml mise.toml && mise trust mise.toml"
  - run: git add -A && git commit -m "initial" --quiet
