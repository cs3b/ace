---
description: Showcase ace-task list, create, show, status, and doctor
tags:
- ace-task
- docs
- getting-started
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
scenes:
- name: List tasks and filter by status
  commands:
  - type: ace-task list
    sleep: 3s
  - type: ace-task list --status pending
    sleep: 3s
- name: Create a new task
  commands:
  - type: ace-task create "Add health check endpoint" --priority high --tags ops,infra
    sleep: 3s
- name: Show task with subtask tree
  commands:
  - type: ace-task show 002 --tree
    sleep: 3s
- name: Status dashboard
  commands:
  - type: ace-task status
    sleep: 3s
- name: Health checks
  commands:
  - type: ace-task doctor
    sleep: 3s
teardown:
- cleanup
setup:
- sandbox
- copy-fixtures
- git-init
