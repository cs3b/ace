---
# Template Sources Protocol Configuration for ace-test gem
# This enables template discovery from the installed ace-test gem

name: ace-test
type: gem
description: Testing templates from ace-test gem
priority: 10

# Configuration for template discovery within the gem
config:
  # Relative path within the gem
  relative_path: handbook/templates

  # Pattern for finding template files
  pattern: "**/*.template.md"

  # Enable discovery
  enabled: true
