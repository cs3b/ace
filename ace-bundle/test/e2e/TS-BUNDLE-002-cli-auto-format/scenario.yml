test-id: TS-BUNDLE-002
title: CLI Auto-Format Behavior
area: cli
package: ace-bundle
priority: high
requires:
  tools: [ace-bundle]
  ruby: ">= 3.0"

setup:
  - git-init
  - copy-fixtures
  - run: |
      # Generate large preset (over 500 lines) - should output to cache
      {
        printf '%s\n' '---' 'name: large-test' '---' '' '# Large Test Content' ''
        for i in $(seq 1 600); do echo "Line $i of large content"; done
      } > .ace/bundle/presets/large-test.md
  - run: |
      # Generate at-threshold preset (~500 total lines) - should go to cache
      {
        printf '%s\n' '---' 'name: at-threshold-test' '---' '' '# Test Content' ''
        for i in $(seq 1 493); do echo "Line $i"; done
      } > .ace/bundle/presets/at-threshold-test.md
  - run: |
      # Generate below-threshold preset (100 lines) - should go to stdio
      {
        printf '%s\n' '---' 'name: below-threshold-test' '---' '' '# Test Content' ''
        for i in $(seq 1 95); do echo "Line $i"; done
      } > .ace/bundle/presets/below-threshold-test.md
  - env:
      PROJECT_ROOT_PATH: .
