---
description: Showcase ace-bundle preset loading, listing, and protocol usage
tags:
- ace-bundle
- docs
- getting-started
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
scenes:
- name: Load project context
  commands:
  - type: ace-bundle project
    sleep: 3s
- name: List available presets
  commands:
  - type: ace-bundle --list
    sleep: 3s
- name: Load workflow via protocol
  commands:
  - type: ace-bundle wfi://task/plan
    sleep: 3s
- name: Inspect resolved config
  commands:
  - type: ace-bundle project --inspect-config
    sleep: 3s
teardown:
- cleanup
