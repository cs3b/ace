---
description: Showcase ace-bundle preset loading, protocol resolution, and task bundling
tags:
- ace-bundle
- docs
- getting-started
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
scenes:
- name: Bundle project context to cache
  commands:
  - type: ace-bundle project --output cache
    sleep: 6s
- name: Load workflow via protocol
  commands:
  - type: ace-bundle wfi://task/finder
    sleep: 6s
- name: Bundle task context to cache
  commands:
  - type: ace-bundle task://t.0or --output cache
    sleep: 6s
teardown:
- cleanup
