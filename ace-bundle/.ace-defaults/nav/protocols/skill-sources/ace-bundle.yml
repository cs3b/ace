---
# Skill Sources Protocol Configuration for ace-bundle gem
# This enables canonical skill discovery from the installed ace-bundle gem

name: ace-bundle
type: gem
description: Canonical skills from ace-bundle gem
priority: 10

# Configuration for skill discovery within the gem
config:
  # Relative path within the gem
  relative_path: handbook/skills

  # Pattern for finding canonical skill files
  pattern: "*/SKILL.md"

  # Enable discovery
  enabled: true
