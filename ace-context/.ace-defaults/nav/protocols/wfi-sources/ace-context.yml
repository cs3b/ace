---
# WFI Sources Protocol Configuration for ace-context gem
# This enables workflow discovery from the installed ace-context gem

name: ace-context
type: gem
description: Context loading workflow instructions from ace-context gem
priority: 10

# Configuration for workflow discovery within the gem
config:
  # Relative path within the gem (default: handbook/workflow-instructions)
  relative_path: handbook/workflow-instructions

  # Pattern for finding workflow files (default: *.wf.md)
  pattern: "*.wf.md"

  # Enable discovery
  enabled: true
