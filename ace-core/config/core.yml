# Default configuration for ace-core gem
ace:
  version: "0.9.0"

  # Configuration cascade settings
  config_cascade:
    enabled: true
    search_paths:
      - "./.ace"        # Project-local configuration (highest priority)
      - "~/.ace"        # User home configuration
    file_patterns:
      - "config.yml"
      - "config.yaml"
      - "*/config.yml"
      - "*/config.yaml"
      - "core/config.yml"
      - "core/config.yaml"
    merge_strategy: deep  # deep, shallow, or replace
    array_strategy: replace  # replace, concat, or union

  # Environment variable handling
  environment:
    load_dotenv: true
    dotenv_files:
      - ".env.local"    # Local overrides (not in git)
      - ".env"          # Project defaults
    overwrite_existing: false

  # Core settings
  settings:
    auto_create_directories: true
    verbose_logging: false
    cache_ttl: 300  # seconds

  # Security settings
  security:
    validate_paths: true
    forbidden_patterns:
      - "**/.git/**"
      - "**/node_modules/**"
      - "**/*.key"
      - "**/*.pem"
      - "**/secrets/**"