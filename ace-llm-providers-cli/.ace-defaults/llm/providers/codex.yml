name: codex
class: Ace::LLM::Providers::CLI::CodexClient
gem: ace-llm-providers-cli
models:
  - gpt-5
  - gpt-5-mini
aliases:
  global:
    codex-gpt5: codex:gpt-5
    codex-mini: codex:gpt-5-mini
  model:
    5: gpt-5
    mini: gpt-5-mini
    m: gpt-5-mini
capabilities:
  - text_generation
  - code_generation
  - function_calling
  - skill_rewriting
default_options:
  temperature: 0.7
  skills_dir: .codex/skills
