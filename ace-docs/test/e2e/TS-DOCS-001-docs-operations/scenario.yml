test-id: TS-DOCS-001
title: "ace-docs Core Documentation Operations"
area: docs
package: ace-docs
priority: medium
cost-tier: smoke
tags: [smoke, "use-case:docs"]
tool-under-test: ace-docs

sandbox-layout:
  results/tc/01/: "Discover command artifacts"
  results/tc/02/: "Validate command artifacts"
  results/tc/03/: "Status command artifacts"
  results/tc/04/: "Update command artifacts"

e2e-justification: >
  Validates real document discovery, frontmatter validation, status summary, and
  metadata update behavior on filesystem-backed documentation sets. Unit tests
  verify command internals, while this scenario verifies CLI-level behavior
  across a shared docs corpus and real file updates.

unit-coverage-reviewed:
  - test/fast/cli/commands/discover_test.rb
  - test/fast/cli/commands/validate_test.rb
  - test/fast/cli/commands/status_test.rb
  - test/fast/cli/commands/update_test.rb
  - test/feat/status_command_integration_test.rb

requires:
  tools: [ace-docs, bash]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp ${ACE_E2E_SOURCE_ROOT:-$PROJECT_ROOT_PATH}/mise.toml mise.toml && mise trust mise.toml"
  - run: |
      mkdir -p docs results/tc/01 results/tc/02 results/tc/03 results/tc/04
      cat > docs/guide.md <<'MD'
      ---
      doc-type: guide
      title: Guide
      purpose: Seed docs corpus
      ace-docs:
        last-updated: 2025-01-01
      ---
      # Guide
      MD
      cat > docs/reference.md <<'MD'
      ---
      doc-type: reference
      title: Reference
      purpose: Seed docs corpus
      ace-docs:
        last-updated: 2025-01-01
      ---
      # Reference
      MD
      for n in 01 02 03 04; do
        printf "seeded docs corpus\n" > "results/tc/${n}/setup.stdout"
        : > "results/tc/${n}/setup.stderr"
        printf "0\n" > "results/tc/${n}/setup.exit"
      done
