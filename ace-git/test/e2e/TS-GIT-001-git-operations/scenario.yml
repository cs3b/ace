test-id: TS-GIT-001
title: "ace-git Core Operations"
area: git
package: ace-git
priority: medium
cost-tier: smoke
tags: [smoke, "use-case:git"]
tool-under-test: ace-git

sandbox-layout:
  results/tc/01/: "Status command artifacts"
  results/tc/02/: "Diff command artifacts"
  results/tc/03/: "Branch command artifacts"
  results/tc/04/: "PR command artifacts"
  results/tc/05/: "Diff output path security artifacts"
  results/tc/06/: "Status JSON no-pr artifacts"

e2e-justification: >
  Requires real git repository state inspection and subprocess-backed command
  behavior across status, diff, branch, and PR context operations.

unit-coverage-reviewed:
  - test/commands/status_test.rb
  - test/commands/diff_test.rb
  - test/commands/branch_test.rb
  - test/commands/pr_test.rb

requires:
  tools: [ace-git, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
