test-id: TS-NAV-001
title: "ace-nav Goal-Based E2E"
area: nav
package: ace-support-nav
priority: high
tags: [smoke, happy-path, "use-case:nav"]
cost-tier: smoke
tool-under-test: ace-nav

sandbox-layout:
  results/tc/01/:  "Help survey observations + sources command captures"
  results/tc/02/:  "Extension inference chain evidence (shorthand, full, generic)"
  results/tc/03/:  "Inference priority and exact-match evidence"
  results/tc/04/:  "Error handling captures (missing resource, informative errors)"
  results/tc/05/:  "Cross-protocol inference evidence (wfi:// vs guide://)"

e2e-justification: >
  All goals require the real ace-nav binary resolving resources through the
  filesystem with protocol configuration. Extension inference, priority
  ordering, and cross-protocol resolution depend on the real file discovery
  engine, configured sources, and actual filesystem layout. Unit tests verify
  individual resolver logic; these tests verify the full navigation pipeline.

requires:
  tools: [ace-nav]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $ACE_E2E_SOURCE_ROOT/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
