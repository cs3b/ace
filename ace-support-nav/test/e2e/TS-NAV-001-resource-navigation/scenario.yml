test-id: TS-NAV-001
title: "ace-nav resource navigation smoke"
area: nav
package: ace-support-nav
priority: high
tags: [smoke, happy-path, "use-case:nav"]
cost-tier: smoke
tool-under-test: ace-nav

sandbox-layout:
  results/tc/01/:  "Help survey observations + sources command captures"
  results/tc/02/:  "Extension inference chain evidence (shorthand, full, generic)"
  results/tc/03/:  "Inference priority and exact-match evidence"
  results/tc/04/:  "Error handling captures (missing resource, informative errors)"
  results/tc/05/:  "Cross-protocol inference evidence (wfi:// vs guide://)"

e2e-justification: >
  These checks validate real CLI navigation behavior across protocol inference,
  precedence resolution, and cross-protocol discovery using filesystem-backed
  handbook sources. Deterministic parser/scanner/registry logic is covered in
  fast and feat tests; this scenario retains only full pipeline behavior that
  requires real command execution with fixtures.

unit-coverage-reviewed:
  - test/fast/commands/cli_test.rb
  - test/fast/atoms/extension_inferrer_test.rb
  - test/fast/atoms/uri_parser_test.rb
  - test/fast/molecules/protocol_scanner_test.rb
  - test/fast/molecules/source_registry_test.rb
  - test/fast/organisms/navigation_engine_test.rb
  - test/feat/task_protocol_test.rb

requires:
  tools: [ace-nav]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "if [ -f \"$PROJECT_ROOT_PATH/mise.toml\" ]; then cp \"$PROJECT_ROOT_PATH/mise.toml\" mise.toml && mise trust mise.toml; fi"
  - agent-env:
      PROJECT_ROOT_PATH: .
  - copy-fixtures
