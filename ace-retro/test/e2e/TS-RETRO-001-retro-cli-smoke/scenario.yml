test-id: TS-RETRO-001
title: "ace-retro CLI Smoke E2E"
area: retro
package: ace-retro
priority: high
cost-tier: smoke
tags: [smoke, happy-path, "use-case:retro"]
tool-under-test: ace-retro

sandbox-layout:
  results/tc/01/: "CLI help and argument-surface artifacts"
  results/tc/02/: "Create/list/show lifecycle artifacts"
  results/tc/03/: "Folder and filtering artifacts"
  results/tc/04/: "Doctor health and failure-path artifacts"

e2e-justification: >
  These checks require the real ace-retro CLI binary, real on-disk retro files,
  and cross-command state continuity across separate invocations.
  Unit/command tests cover many command internals, but they do not validate
  sandbox-level command wiring, executable behavior, and end-to-end filesystem
  transitions in one operator workflow.

unit-coverage-reviewed:
  - test/fast/commands/retro_cli_test.rb
  - test/fast/organisms/retro_doctor_test.rb
  - test/fast/molecules/retro_creator_test.rb
  - test/fast/molecules/retro_scanner_test.rb

requires:
  tools: [ace-retro, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - run: git add -A && git commit -m "initial" --quiet
