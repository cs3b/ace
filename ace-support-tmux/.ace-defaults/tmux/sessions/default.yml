# Default session preset
# 3-pane layout: claude (left 40%), shell (right-top), nvim (right-bottom)
name: default
windows:
  - name: main
    layout: main-vertical
    options:
      main-pane-width: "40%"
    panes:
      - commands:
          - claude
      - commands: []
      - commands:
          - nvim .
        focus: true
