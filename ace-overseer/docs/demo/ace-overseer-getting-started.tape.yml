---
description: Showcase ace-overseer worktree dashboard with progress bars and PR status
tags:
- ace-overseer
- docs
- getting-started
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
scenes:
- name: Show the worktree dashboard — progress bars, PR status, failure counts
  commands:
  - type: ace-overseer status
    sleep: 6s
- name: Show available commands
  commands:
  - type: ace-overseer --help
    sleep: 4s
- name: Show work-on options for launching task worktrees
  commands:
  - type: ace-overseer work-on --help
    sleep: 5s
teardown:
- cleanup
setup:
- sandbox
- copy-fixtures
