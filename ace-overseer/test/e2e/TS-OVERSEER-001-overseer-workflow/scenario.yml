test-id: TS-OVERSEER-001
title: "ace-overseer Goal-Based E2E"
area: overseer
package: ace-overseer
priority: high
timeout: 900
tags: [smoke, happy-path, deep, "use-case:overseer"]
cost-tier: happy-path
tool-under-test: ace-overseer

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Work-on happy path evidence (worktree, tmux, assignment)"
  results/tc/03/:  "Idempotent re-run evidence"
  results/tc/04/:  "Preset override evidence"
  results/tc/05/:  "Prune workflow evidence (dry-run, safe removal, preserve unsafe)"

e2e-justification: >
  All goals require the real ace-overseer binary orchestrating real git
  worktrees, tmux windows, and ace-assign assignments. The work-on command
  creates actual worktrees, opens tmux sessions, and initializes real
  assignment state. Prune inspects task status to determine safe removal.
  None testable with mocks.

requires:
  tools: [ace-overseer, ace-git-worktree, ace-tmux, ace-assign, ace-task, git, tmux]
  ruby: ">= 3.0"

setup:
  - git-init
  - tmux-session:
      name-source: run-id
  - run: "cp $ACE_E2E_SOURCE_ROOT/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - agent-env:
      PROJECT_ROOT_PATH: .
