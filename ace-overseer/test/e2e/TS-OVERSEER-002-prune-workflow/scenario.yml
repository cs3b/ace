test-id: TS-OVERSEER-002
title: Prune Workflow
area: overseer
package: ace-overseer
priority: high
requires:
  tools: [ace-overseer, ace-git-worktree, ace-tmux, ace-assign, ace-taskflow, git, tmux]

setup:
  - git-init
  - run: |
      echo "# Test Project" > README.md
      git add README.md && git commit -m "Initial commit" --quiet
  - copy-fixtures
  - run: |
      git add .ace-taskflow/ .ace/ && git commit -m "Add taskflow and config" --quiet
  - tmux-session
  - env:
      PROJECT_ROOT_PATH: .
  # Create worktrees for both tasks
  - run: |
      ace-overseer work-on --task 001
      ace-overseer work-on --task 002
  # Make task 001 safe to prune: mark done, complete assignment, ensure tracked changes are committed
  - run: |
      TASK_SPEC=".ace-taskflow/v.0.1.0/t/001-prune-safe/001-prune-safe.s.md"
      sed -i 's/status: [a-z_-]*/status: done/' "$TASK_SPEC"
      git add "$TASK_SPEC" && git commit -q -m "Mark task 001 as done"

      WORKTREE_001=$(git worktree list | grep "task\.001" | awk '{print $1}' | head -1)
      if [ -n "$WORKTREE_001" ]; then
        cd "$WORKTREE_001"
        export PROJECT_ROOT_PATH="$WORKTREE_001"
        echo "Phase complete." > /tmp/e2e-report.md
        ace-assign report /tmp/e2e-report.md
        # Note: untracked files (e.g. .cache/) are kept — ace-overseer prune uses
        # ignore_untracked: true so they do not block worktree removal.
        cd -
        unset PROJECT_ROOT_PATH
      fi
