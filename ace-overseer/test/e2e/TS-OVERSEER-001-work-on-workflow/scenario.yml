test-id: TS-OVERSEER-001
title: Work-On Workflow
area: overseer
package: ace-overseer
priority: high
requires:
  tools: [ace-overseer, ace-git-worktree, ace-tmux, ace-assign, ace-taskflow, git, tmux]

setup:
  - git-init
  - run: |
      echo "# Test Project" > README.md
      git add README.md && git commit -m "Initial commit" --quiet
  - copy-fixtures
  - run: |
      git add .ace-taskflow/ .ace/ && git commit -m "Add taskflow and config" --quiet
  - env:
      PROJECT_ROOT_PATH: .
