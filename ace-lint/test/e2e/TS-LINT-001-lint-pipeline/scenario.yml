test-id: TS-LINT-001
title: "ace-lint Goal-Based E2E"
area: lint
package: ace-lint
priority: high
tags: [smoke, happy-path, deep, "use-case:lint"]
cost-tier: smoke
tool-under-test: ace-lint

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Valid file lint report artifacts (report.json, ok.md)"
  results/tc/03/:  "Fix mode artifacts (modified file diff, fixed.md)"
  results/tc/04/:  "Syntax error artifacts (pending.md, exit code)"
  results/tc/05/:  "Batch mixed results (categorization, all three .md files)"
  results/tc/06/:  "Configuration routing evidence (group config, CLI override)"
  results/tc/07/:  "Doctor diagnostics output (healthy env, YAML error detection)"

e2e-justification: >
  All goals require the real ace-lint binary executing through a shell with
  real standardrb/rubocop validators. Lint pipeline generates filesystem
  artifacts (report.json, markdown files). Fix mode modifies real files.
  Doctor mode inspects real tool availability and config files. None of
  this is testable with mocks.

unit-coverage-reviewed:
  - test/fast/lint_test.rb
  - test/fast/atoms/comment_validator_test.rb
  - test/fast/atoms/pattern_matcher_test.rb
  - test/fast/atoms/rubocop_runner_test.rb
  - test/fast/atoms/standardrb_runner_test.rb
  - test/fast/molecules/group_resolver_test.rb
  - test/fast/molecules/markdown_linter_test.rb
  - test/fast/molecules/ruby_linter_test.rb
  - test/fast/molecules/markdown_surgical_fixer_test.rb
  - test/fast/organisms/lint_orchestrator_test.rb
  - test/fast/organisms/lint_doctor_test.rb
  - test/fast/organisms/report_generator_test.rb
  - test/fast/commands/lint_command_test.rb

requires:
  tools: [ace-lint, standardrb, rubocop, jq]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "if [ -f \"$PROJECT_ROOT_PATH/mise.toml\" ]; then cp \"$PROJECT_ROOT_PATH/mise.toml\" mise.toml && mise trust mise.toml; fi"
  - copy-fixtures
