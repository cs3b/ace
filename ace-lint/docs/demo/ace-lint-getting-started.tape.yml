---
description: Showcase ace-lint linting markdown and Ruby files with auto-fix
tags:
- ace-lint
- docs
- getting-started
settings:
  font_size: 16
  width: 1200
  height: 700
  format: gif
scenes:
- name: Main flow
  commands:
  - type: ace-lint README.md
    sleep: 3s
  - type: ace-lint .ace/config.yml --type yaml
    sleep: 3s
  - type: ace-lint docs/getting-started.md --fix
    sleep: 3s
  - type: ace-lint --doctor
    sleep: 3s
teardown:
- cleanup
setup:
- sandbox
- copy-fixtures
