# Skill validation configuration for ace-lint
# Follows ADR-022 configuration pattern
#
# This configuration defines validation rules for:
# - SKILL.md files (Claude Code skills)
# - *.wf.md files (workflow instructions)
# - *.ag.md files (agent definitions)

# Known tool names for allowed-tools validation
# These are the valid tool names that can appear in allowed-tools frontmatter
known_tools:
  - Bash
  - Read
  - Edit
  - MultiEdit
  - Write
  - Glob
  - Grep
  - LS
  - WebFetch
  - WebSearch
  - TodoWrite
  - Task
  - NotebookEdit
  - AskUserQuestion
  - Skill
  - EnterPlanMode
  - ExitPlanMode
  - KillShell
  - TaskOutput

# Bash pattern prefixes (for Bash(ace-*:*) patterns)
# When allowed-tools contains "Bash(prefix:*)", the prefix must match one of these
known_bash_prefixes:
  - ace-assign
  - ace-b36ts
  - ace-bundle
  - ace-demo
  - ace-docs
  - ace-git
  - ace-git-commit
  - ace-git-secrets
  - ace-git-worktree
  - ace-handbook
  - ace-handbook-integration-claude
  - ace-idea
  - ace-lint
  - ace-nav
  - ace-overseer
  - ace-prompt-prep
  - ace-retro
  - ace-review
  - ace-search
  - ace-sim
  - ace-task
  - ace-test
  - ace-test-suite
  - firebase
  - git
  - gh
  - npm
  - npx
  - bundle
  - mise
  - ruby

known_integration_providers:
  - claude
  - codex
  - gemini
  - opencode
  - pi

# Schema definitions by file type
schemas:
  skill:
    required_fields:
      - name
      - description
      - user-invocable
      - allowed-tools
      - source
      - skill
    required_nested_fields:
      - skill.kind
      - skill.execution.workflow
    required_comments:
      - "# bundle:"
      - "# agent:"
    field_validations:
      name:
        type: string
        pattern: "^(as|ace)-[a-z0-9-]+$"
        error_message: "name must use lowercase alphanumerics and hyphens, and start with 'as-' or 'ace-'"
      user-invocable:
        type: boolean
      allowed-tools:
        type: array
        validate_tools: true
      source:
        type: string
      skill.kind:
        type: string
        values:
          - capability
          - workflow
          - orchestration
        error_message: "skill.kind must be one of: capability, workflow, orchestration"
      skill.execution.workflow:
        type: string
        pattern: "^wfi://[a-z0-9][a-z0-9/_-]*$"
        error_message: "skill.execution.workflow must use a wfi:// workflow reference"

  workflow:
    required_fields:
      - name
      - description
      - allowed-tools
    field_validations:
      name:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
        error_message: "name must be lowercase with hyphens (e.g., 'my-workflow')"
      allowed-tools:
        type: array
        validate_tools: true

  agent:
    required_fields:
      - name
      - description
      - type
    field_validations:
      type:
        type: string
        values:
          - agent
        error_message: "type must be 'agent'"
