# Minimal RuboCop configuration for ace-lint fallback
# Used when StandardRB is not available
# This provides reasonable defaults for Ruby linting

# Target Ruby version
AllCops:
  TargetRubyVersion: 3.4
  # Exclude common directories
  Exclude:
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'tmp/**/*'

# Style rules
Style/FrozenStringLiteralComment:
  Enabled: true
  # Enforce frozen string literal comments for consistency

# Layout rules
Layout/LineLength:
  Max: 120
  # Consistent with ACE project conventions

# Disable some cops that may be too strict for fallback use
Metrics/MethodLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
