# Full task workflow with PR creation and review cycles
# Usage: /ace:coworker-prepare work-on-task-with-pr --taskref 123

name: work-on-task-with-pr
description: Work on a task and create/iterate PR with reviews

parameters:
  taskref:
    required: true
    description: Task reference (e.g., task-123 or 123)

steps:
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Load context and understand the project structure.

  - name: work-on-task
    skill: ace:work-on-task
    instructions:
      - "Work on task {{taskref}}."
      - Implement the required changes following project conventions.

  - name: create-pr
    skill: ace:create-pr
    instructions:
      - Create a pull request for the changes.
      - Capture the PR number for subsequent review steps.
      - Update the next steps with the PR number.

  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 3).
      - Focus on correctness and architecture.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 3).
      - Focus on edge cases and error handling.

  - name: apply-feedback-2
    instructions:
      - Apply feedback from review (medium+ priority).

  - name: review-cycle-3
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 3 of 3).
      - Final polish and documentation check.

  - name: apply-feedback-3
    instructions:
      - Apply final feedback from review.

  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Ensure PR is ready for human review.
