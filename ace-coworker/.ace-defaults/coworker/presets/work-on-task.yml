# Simple task implementation workflow
# Usage: /ace:coworker-prepare work-on-task --taskref 123
#
# This preset demonstrates fork context pattern:
# - prepare: orchestrator loads context
# - implement: forked agent does the work
# - verify: orchestrator validates (worker shouldn't verify own work)
# - finalize: orchestrator commits

name: work-on-task
description: Work on a single task with implementation and commit

parameters:
  taskref:
    required: true
    description: Task reference (e.g., task-123 or 123)

steps:
  - name: prepare
    instructions:
      - Load task context with ace-taskflow task {{taskref}}
      - Review task requirements and acceptance criteria
      - Report task title and key deliverables

  - name: implement
    context: fork
    instructions: |
      ## Onboard

      Load context before starting work:
      - Run `ace-bundle project` to load project context
      - Run `ace-taskflow task {{taskref}}` to load task details

      ## Work

      Implement task {{taskref}} following the specification:
      - Follow project conventions and coding standards
      - Make incremental commits as you progress
      - Run tests after significant changes

      ## Report

      Return a structured summary:
      - **Task**: task ID and title
      - **Status**: completed | partial | blocked
      - **Changes**: list of files modified and what changed
      - **Commits**: commit hashes and messages created
      - **Issues**: any problems encountered or deferred decisions

  - name: verify
    instructions:
      - Run ace-test to verify implementation
      - Check all acceptance criteria are met
      - Report test results and any issues found

  - name: finalize
    skill: ace:commit
    instructions:
      - Commit any remaining changes with a descriptive message
      - Ensure all tests pass before completing
