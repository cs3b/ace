# ace-coworker default configuration
# Override in ~/.ace/coworker/config.yml or .ace/coworker/config.yml

# Directory where sessions are stored
cache_dir: ".cache/ace-coworker"

# Main task numbering step (gaps for injection)
step_increment: 10

# Subtask numbering format
subtask_format: "%02d"

# Maximum subtask depth (e.g., 010.01.01 = 3 levels)
max_subtask_depth: 3
