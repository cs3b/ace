session:
  name: task-227-feedback-architecture
  description: |
    Implement feedback-based review output architecture (Task 227).
    Transforms monolithic synthesis-report.md into structured feedback/*.s.md files
    with lifecycle management for concurrent agent verification.

steps:
  # Phase 1: Onboarding
  - name: onboard
    number: "010"
    skill: onboard
    instructions:
      - Load project context and understand ace-review architecture.
      - Focus on ATOM pattern, existing synthesizer, and review pipeline.
      - Understand the current Report → ReportSynthesizer → synthesis-report.md flow.

  # Phase 2: Core Implementation (227.01-227.04)
  - name: implement-feedback-model
    number: "020"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.01 (Feedback Model and Core Atoms).
      - Create FeedbackItem model with id, title, files, reviewer, status, priority, timestamps.
      - Create FeedbackIdGenerator atom using ace-support-timestamp for 6-char Base36 IDs.
      - Create FeedbackSlugGenerator atom for URL-safe slugs (max 40 chars).
      - Write comprehensive tests for all components.
      - Commit changes with message referencing task 227.01.

  - name: implement-file-io
    number: "030"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.02 (Feedback File I/O).
      - Create FeedbackFileWriter molecule with file locking (3 retries, exponential backoff).
      - Create FeedbackFileReader molecule for YAML frontmatter + markdown parsing.
      - Create FeedbackDirectoryManager molecule for directory structure management.
      - Implement atomic writes using temp-file-and-move pattern.
      - Write tests including concurrency scenarios.
      - Commit changes with message referencing task 227.02.

  - name: implement-extractor
    number: "040"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.03 (Feedback Extractor).
      - Create FeedbackExtractor molecule with LLM integration.
      - Create extraction prompt at handbook/prompts/extract-feedback.system.md.
      - Implement deduplication (Levenshtein ≤3 OR ≥85% similarity).
      - Handle large reports (>100k tokens) by splitting at section boundaries.
      - Write tests with mocked LLM responses.
      - Commit changes with message referencing task 227.03.

  - name: implement-manager
    number: "050"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.04 (Feedback Manager Organism).
      - Create FeedbackManager organism as central lifecycle coordinator.
      - "Implement methods: extract_and_save, list, find, verify, skip, resolve, stats."
      - "Handle state transitions: draft → pending/invalid/skip/done."
      - Auto-archive terminal states (invalid, skip, done).
      - Write comprehensive lifecycle tests.
      - Commit changes with message referencing task 227.04.

  # Phase 3: Create PR (Core Complete Milestone)
  - name: create-pr
    number: "060"
    skill: ace:create-pr
    instructions:
      - Create pull request for task 227 implementation.
      - "Title: feat(ace-review): Feedback-based review output architecture"
      - Summarize core feedback infrastructure (227.01-227.04) completed.
      - Note that integration, CLI, and documentation steps are in progress.
      - Capture PR number for subsequent review steps.

  # Phase 4: Integration Implementation (227.05-227.08)
  - name: implement-synthesizer-integration
    number: "070"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.05 (Synthesizer Integration).
      - Add feedback boolean option to ReviewOptions model (default true).
      - Integrate FeedbackManager coordination into ReviewManager organism.
      - Keep ReportSynthesizer unchanged (ATOM hierarchy preserved).
      - Add --no-feedback flag to disable extraction.
      - Write integration tests.
      - Commit changes with message referencing task 227.05.

  - name: implement-cli-commands
    number: "080"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.06 (CLI Commands for Feedback Management).
      - "Create commands: feedback list, show, verify, skip, resolve."
      - Implement table output for list command.
      - Support partial ID matching (min 3 chars).
      - Implement task context detection (flag > branch > directory > cache).
      - Register commands in ace-review CLI.
      - Write command tests.
      - Commit changes with message referencing task 227.06.

  - name: implement-task-integration
    number: "090"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.07 (Task Integration).
      - Add save_feedback and archive_feedback methods to TaskReportSaver.
      - Integrate task-context feedback saving in ReviewManager.
      - Create feedback/ and feedback/_archived/ directories under task dir.
      - Write integration tests.
      - Commit changes with message referencing task 227.07.

  - name: implement-documentation
    number: "100"
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on subtask 227.08 (Documentation).
      - Create ace-review/docs/feedback-workflow.md with overview, usage, config, troubleshooting.
      - Update ace-review/CHANGELOG.md with feature summary.
      - Ensure all public methods have documentation.
      - Commit changes with message referencing task 227.08.

  # Phase 5: Review Cycles
  - name: review-cycle-1
    number: "110"
    skill: ace:review-pr
    instructions:
      - Review the PR (iteration 1 of 3).
      - "Focus areas: ATOM architecture compliance, model correctness, file I/O safety."
      - Check for proper separation of concerns between atoms, molecules, organisms.
      - Verify file locking and atomic write implementations.

  - name: apply-feedback-1
    number: "120"
    context: fork
    instructions:
      - Apply medium+ priority feedback from review cycle 1.
      - Address architecture and safety concerns first.
      - Commit fixes with clear messages.

  - name: review-cycle-2
    number: "130"
    skill: ace:review-pr
    instructions:
      - Review the PR (iteration 2 of 3).
      - "Focus areas: Edge cases, error handling, test coverage."
      - Check LLM extraction edge cases and large report handling.
      - Verify all state transitions have proper error handling.

  - name: apply-feedback-2
    number: "140"
    context: fork
    instructions:
      - Apply medium+ priority feedback from review cycle 2.
      - Add missing edge case handling and tests.
      - Commit fixes with clear messages.

  - name: review-cycle-3
    number: "150"
    skill: ace:review-pr
    instructions:
      - Review the PR (iteration 3 of 3).
      - "Focus areas: Documentation completeness, integration points, final polish."
      - Verify user documentation is comprehensive.
      - Check CLI help text and error messages.

  - name: apply-feedback-3
    number: "160"
    context: fork
    instructions:
      - Apply final feedback from review cycle 3.
      - Polish documentation and user-facing messages.
      - Commit fixes with clear messages.

  # Phase 6: Finalize
  - name: finalize
    number: "170"
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with final implementation summary.
      - List all 8 subtasks completed (227.01-227.08).
      - Include key files changed and test coverage summary.
      - Mark PR as ready for merge.
