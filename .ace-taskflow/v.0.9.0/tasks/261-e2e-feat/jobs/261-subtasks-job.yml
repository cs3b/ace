# Job: All Task 261 subtasks with 2 code-deep review cycles
# Task 261: E2E Per-TC Infrastructure Implementation
# Branch: 261-e2e-per-tc-infrastructure-implementation (PR #197 open)
# Dependencies: 261.01 → 261.02 → 261.03 → 261.04 (strict chain)
# Note: Significant implementation already exists — verify before coding

session:
  name: task-261-all-subtasks
  description: |
    Implement all Task 261 subtasks (E2E Per-TC Infrastructure).
    Replaces monolithic .mt.md format with structured TS-*/scenario.yml + TC-*.tc.md.

    PR #197 already exists on branch 261-e2e-per-tc-infrastructure-implementation.
    Verify existing implementation against specs before writing new code.

    Subtasks (strict sequential chain):
    - 261.01: SetupExecutor + ScenarioLoader Infrastructure (foundation)
    - 261.02: TC-Level Execution Pipeline (depends on 261.01)
    - 261.03: Orchestration + Suite Support (depends on 261.02)
    - 261.04: Remove Legacy .mt.md Support (depends on 261.03)

steps:
  # Phase 1: Onboard
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Run `ace-bundle project` to load project context.
      - Run `ace-taskflow task 261` to understand the parent task and all subtasks.
      - Review the existing branch and PR #197 to understand what has already been implemented.
      - Familiarize yourself with the ace-test-e2e-runner package structure and ATOM pattern.

  # Phase 2: Foundation — SetupExecutor + ScenarioLoader
  - name: work-on-261.01
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 261.01 (SetupExecutor + ScenarioLoader Infrastructure).
      - This is the foundation task — no dependencies.
      - "IMPORTANT: Verify existing implementation first. Significant code already exists on this branch."
      - Check for existing ScenarioLoader, SetupExecutor, FixtureCopier, and TestCase model implementations.
      - Compare existing code against the 261.01 spec requirements.
      - Complete any missing pieces and fix any issues found during verification.
      - "Key deliverables: ScenarioLoader molecule, SetupExecutor molecule, FixtureCopier molecule, TestCase model, updated TestScenario model, `ace-test-e2e setup` CLI subcommand."
      - Setup must complete in ~200ms (deterministic Ruby, not LLM-driven).
      - Each TC gets independent sandbox with no shared state.
      - Run ace-test to verify changes before completing.

  # Phase 3: TC-Level Execution Pipeline
  - name: work-on-261.02
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 261.02 (TC-Level Execution Pipeline).
      - Depends on 261.01 being complete.
      - "IMPORTANT: Verify existing implementation first. Check what already exists on this branch."
      - Compare existing code against the 261.02 spec requirements.
      - Complete any missing pieces and fix any issues found during verification.
      - "Key deliverables: TestExecutor.execute_tc(), PromptBuilder.build_tc(), SkillPromptBuilder TC methods, ResultParser.parse_tc(), SkillResultParser.parse_tc(), ReportWriter per-TC reports, updated run-e2e-test.wf.md."
      - Single TC prompts (not full scenario content).
      - Sandbox pre-populated by SetupExecutor (setup already done).
      - Per-TC reports in `{ts}-{pkg}-{scenario}-{tc}-reports/` format.
      - Backward compatibility — existing `execute(scenario)` must remain unchanged.
      - Run ace-test to verify changes before completing.

  # Phase 4: Orchestration + Suite Support
  - name: work-on-261.03
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 261.03 (Orchestration + Suite Support).
      - Depends on 261.01 and 261.02 being complete.
      - "IMPORTANT: Verify existing implementation first. Check what already exists on this branch."
      - Compare existing code against the 261.03 spec requirements.
      - Complete any missing pieces and fix any issues found during verification.
      - "Key deliverables: TestDiscoverer.find_scenarios(), TestOrchestrator per-TC sandbox setup + execution loop, SuiteOrchestrator TC-level execution queue, FailureFinder at {scenario}/{tc-id} granularity, display managers for TS-LINT-001/TC-001 format."
      - Dual-mode discovery — find both .mt.md files and TS-*/scenario.yml dirs.
      - Per-TC orchestration — SetupExecutor per-TC, then TestExecutor.
      - TC-level queue — expand scenarios into per-TC items for parallelism.
      - --only-failures re-runs target specific TCs within scenarios.
      - Run ace-test to verify changes before completing.

  # Phase 5: Remove Legacy .mt.md Support
  - name: work-on-261.04
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 261.04 (Remove Legacy .mt.md Support).
      - Depends on 261.03 being complete.
      - "IMPORTANT: Verify existing implementation first. Check what already exists on this branch."
      - "Note: Full removal requires all 262.* migrations to be complete. If migrations are not yet done, implement the removal code but guard it appropriately."
      - "Key deliverables: Delete ScenarioParser molecule, remove .mt.md discovery from TestDiscoverer, remove MT-format execution paths, rename execute_tc → execute / build_tc → build, update config.yml patterns, clean test fixtures."
      - Clean removal (no deprecation) per ADR-024.
      - Verify no stale references via comprehensive grep.
      - Update handbook documentation.
      - Run ace-test to verify changes before completing.

  # Phase 6: Review Cycle 1
  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review PR #197 (iteration 1 of 2).
      - Use preset code-deep for thorough analysis.
      - Focus on correctness, ATOM architecture compliance, and the dependency chain between subtasks.
      - Verify SetupExecutor determinism and sandbox isolation.
      - Check TC-level execution pipeline for proper separation of concerns.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review cycle 1 (medium+ priority).
      - Commit changes with descriptive messages.
      - Ensure changes maintain consistency across all subtask implementations.

  # Phase 7: Review Cycle 2
  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review PR #197 (iteration 2 of 2).
      - Use preset code-deep for thorough analysis.
      - Focus on edge cases, error handling, test coverage, and backward compatibility.
      - Verify dual-mode discovery works correctly.
      - Check --only-failures TC-level targeting.

  - name: apply-feedback-2
    instructions:
      - Apply final feedback from review cycle 2.
      - Commit changes with descriptive messages.

  # Phase 8: Finalize
  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR #197 description with implementation summary.
      - List all 4 subtasks completed (261.01-261.04).
      - Include key architecture changes (MT-format → TS-format).
      - Push all changes to remote.
      - Ensure PR is ready for human review.
