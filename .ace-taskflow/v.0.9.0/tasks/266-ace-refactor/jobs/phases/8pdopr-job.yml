session:
  name: work-on-tasks-266-267
  description: Work on tasks 266 (rename ace-support-tmux to ace-tmux) and 267 (rename ace-support-timestamp to ace-b36ts) with PR, review cycles, release, and clean history

steps:
  - name: onboard
    number: "000"
    skill: onboard
    instructions:
      - Load project context.
      - Review task queue and priorities.

  - name: batch-tasks
    number: "010"
    instructions: |
      Batch container for multiple task implementations.
      This step auto-completes when all child tasks are done.

      Tasks to implement: 266, 267

  - name: work-on-266
    number: "010.01"
    parent: "010"
    skill: ace:work-on-task
    context: fork
