      First: onboard yourself using /onboard skill to load project context.
      Implement task 266.

  - name: work-on-267
    number: "010.02"
    parent: "010"
    skill: ace:work-on-task
    context: fork
    instructions: |
      First: onboard yourself using /onboard skill to load project context.
      Implement task 267.

  - name: release-minor
    number: "020"
    skill: ace-release
    instructions:
      - Bump version (minor or patch, usually minor) and update CHANGELOGs.
      - This is the initial release for new functionality.
      - Follow semantic versioning conventions.

  - name: create-pr
    number: "030"
    skill: ace:create-pr
    instructions:
      - Create a pull request for the changes.
      - Include summary of all implemented tasks.
      - Capture the PR number for subsequent review steps.

  - name: review-cycle-1
    number: "040"
    skill: ace:review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /onboard skill to load project context."
      - "Review the code (iteration 1 of 2)."
      - Use preset code-deep for thorough analysis.
      - "Focus: correctness, architecture, and major design issues."

  - name: apply-feedback-1
    number: "050"
    skill: ace:apply-feedback
    instructions:
      - Apply feedback from review cycle 1 (medium+ priority).
      - Commit changes with descriptive messages.

  - name: release-patch-1
    number: "060"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures review cycle 1 fixes.

  - name: review-cycle-2
    number: "070"
    skill: ace:review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /onboard skill to load project context."
      - "Review the code (iteration 2 of 2)."
      - Use preset code-deep for thorough analysis.
      - "Focus: edge cases, error handling, and test coverage."

  - name: apply-feedback-2
    number: "080"
    skill: ace:apply-feedback
    instructions:
      - Apply final feedback from review cycle 2.
      - Commit changes with descriptive messages.

  - name: release-patch-2
    number: "090"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures review cycle 2 fixes.

  - name: reorganize-commits
    number: "100"
    skill: ace:reorganize-commits
    instructions:
      - Reorganize commits into logical groups.
      - Group by concern (structure, implementation, tests, release).

  - name: push-to-remote
    number: "110"
    instructions:
      - Push all changes to the remote repository.
      - "Run: git push --force-with-lease origin HEAD"
      - Force-with-lease needed because reorganize-commits rewrites history.

  - name: update-pr-desc
    number: "120"
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with final implementation summary.
      - Include released version numbers and key components.
      - Ensure PR is ready for human review.
