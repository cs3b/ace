session:
  name: work-on-tasks-251-test-refactor
  description: Work on all 5 test refactoring subtasks to move integration tests to E2E, then create PR and review

steps:
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Load context and understand the project structure.
      - Familiarize yourself with the E2E test template at ace-test-e2e-runner/handbook/templates/test-e2e.template.md

  - name: work-on-task-251.02
    skill: ace:work-on-task
    instructions:
      - Work on task 251.02 (Move ace-support-timestamp CLI Integration Tests to E2E).
      - Create E2E test file MT-TIMESTAMP-004-cli-integration.mt.md.
      - Delete ace-support-timestamp/test/cli_integration_test.rb.
      - Update CHANGELOG.md.
      - Verify test suite runs fast with ace-test ace-support-timestamp.
      - Commit changes with a descriptive message.

  - name: work-on-task-251.03
    skill: ace:work-on-task
    instructions:
      - Work on task 251.03 (Move ace-lint CLI Integration Tests to E2E).
      - Create E2E test files MT-LINT-004-cli-exit-codes.mt.md and MT-LINT-005-doctor-command.mt.md.
      - Delete ace-lint/test/integration/cli_integration_test.rb and doctor_integration_test.rb.
      - Add Open3.capture3 mocks to validator_executor_test.rb if needed.
      - Update CHANGELOG.md.
      - Verify test suite runs fast with ace-test ace-lint.
      - Commit changes with a descriptive message.

  - name: work-on-task-251.04
    skill: ace:work-on-task
    instructions:
      - Work on task 251.04 (Move ace-git-secrets Integration Tests to E2E).
      - Create E2E test files MT-SECRETS-001, MT-SECRETS-002, MT-SECRETS-003.
      - Delete ace-git-secrets/test/integration/full_workflow_test.rb and config_cascade_test.rb.
      - Add git mocks to history_scanner_test.rb if needed.
      - Update CHANGELOG.md.
      - Verify test suite runs fast with ace-test ace-git-secrets.
      - Commit changes with a descriptive message.

  - name: work-on-task-251.05
    skill: ace:work-on-task
    instructions:
      - Work on task 251.05 (Move ace-bundle Section Workflow Integration Tests to E2E).
      - Create E2E test file MT-BUNDLE-001-section-workflow.mt.md.
      - Delete ace-bundle/test/integration/section_workflow_integration_test.rb.
      - Add filesystem mocks to context_builder_test.rb if needed.
      - Update CHANGELOG.md.
      - Verify test suite runs fast with ace-test ace-bundle.
      - Commit changes with a descriptive message.

  - name: work-on-task-251.06
    skill: ace:work-on-task
    instructions:
      - Work on task 251.06 (Move ace-review Integration Tests to E2E - Complex Refactoring).
      - Create E2E test files MT-REVIEW-001, MT-REVIEW-002, MT-REVIEW-003.
      - Delete or refactor integration test files as specified in task.
      - Add filesystem mocks to task_report_saver_test.rb if needed.
      - Update CHANGELOG.md.
      - Verify test suite runs fast with ace-test ace-review.
      - Commit changes with a descriptive message.

  - name: create-pr
    skill: ace:create-pr
    instructions:
      - Create a pull request for the changes.
      - Title should be "refactor(tests): move integration tests to E2E suite (task 251)"
      - Include summary of all 5 subtasks completed.
      - Capture the PR number for subsequent review steps.
      - Update the next steps with the PR number.

  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 3).
      - Focus on correctness and E2E test completeness.
      - Verify all integration test coverage is preserved in E2E tests.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 3).
      - Focus on edge cases and mock correctness.
      - Verify test performance improvements.

  - name: apply-feedback-2
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: review-cycle-3
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 3 of 3).
      - Final polish and documentation check.
      - Verify CHANGELOG entries are complete.

  - name: apply-feedback-3
    instructions:
      - Apply final feedback from review.
      - Commit changes with descriptive messages.

  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Ensure PR is ready for human review.
