# Test scenario for fork context feature (task 237.02)
#
# Purpose: Verify that context: fork jobs are correctly parsed and
# output Task tool instructions instead of raw instructions.
#
# Expected behavior:
# - Steps without context: fork display instructions directly
# - Steps with context: fork output Task tool invocation instructions
# - Fork jobs include session context (working dir, session ID)

session:
  name: test-fork-context
  description: Test session to verify fork context feature works correctly

steps:
  - name: setup
    instructions:
      - This is a regular step (no fork context).
      - The orchestrator should see these instructions directly.
      - "Run: echo 'Setup complete' to verify."

  - name: forked-work
    context: fork
    instructions: |
      ## Onboard

      Load context for the forked agent:
      - Run `pwd` to confirm working directory
      - Run `date` to confirm execution time

      ## Work

      This is a **forked step**. The orchestrator should NOT see
      these instructions directly. Instead, it should receive
      Task tool invocation instructions.

      Perform these test actions:
      1. Create a test file: `echo "fork test" > /tmp/fork-test-output.txt`
      2. Read the file back: `cat /tmp/fork-test-output.txt`
      3. Clean up: `rm /tmp/fork-test-output.txt`

      ## Report

      Return:
      - **Status**: completed | failed
      - **Working Directory**: result of pwd
      - **Timestamp**: result of date
      - **Test File**: confirm creation and cleanup

  - name: verify
    instructions:
      - This is another regular step (orchestrator runs directly).
      - Verify the forked step completed successfully.
      - Check the report from the previous step.
      - "Confirm: /tmp/fork-test-output.txt was cleaned up."

  - name: forked-second
    context: fork
    instructions: |
      ## Onboard

      Second fork context test.

      ## Work

      This tests that multiple fork context jobs work correctly.
      Just run: `echo "Second fork complete"`

      ## Report

      Return: **Status**: completed
