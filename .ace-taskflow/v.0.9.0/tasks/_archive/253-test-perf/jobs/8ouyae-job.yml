# Job: work-on-subtasks-253 with PR and 2 review cycles
# Generated for Task 253 pending subtasks (skipping 253.06 CI Gate)
# Dependencies: 253.02 first, then dependent tasks in order

session:
  name: work-on-subtasks-253
  description: Work on 5 pending subtasks of Task 253 (Test Performance Strategy) with dependency-aware execution and 2 code-deep review cycles

steps:
  # Phase 1: Foundation task (no dependencies)
  - name: work-on-253.02
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 253.02 (Integrate Testing Guides into ace-test Handbook).
      - This is the foundation task - no dependencies.
      - Implement the required changes following project conventions.
      - Run ace-test to verify changes before completing.

  # Phase 2: Tasks dependent on 253.02
  - name: work-on-253.03
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 253.03 (Integrate Testing Workflows into ace-test Handbook).
      - Depends on 253.02 being complete.
      - Implement workflow documentation following patterns established in 253.02.
      - Run ace-test to verify changes before completing.

  - name: work-on-253.04
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 253.04 (Integrate Testing Templates into Handbook).
      - Depends on 253.02 being complete.
      - Implement template documentation following patterns established in 253.02.
      - Run ace-test to verify changes before completing.

  # Phase 3: Task dependent on 253.03
  - name: work-on-253.05
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 253.05 (Create Claude Skills for Testing).
      - Depends on 253.03 being complete.
      - Create Claude skills that integrate with testing workflows.
      - Run ace-test to verify changes before completing.

  # Phase 4: Task dependent on 253.02, 253.03, 253.04
  - name: work-on-253.07
    context: fork
    skill: ace:work-on-task
    instructions:
      - Work on task 253.07 (Update Documentation Index and Cross-References).
      - Depends on 253.02, 253.03, and 253.04 being complete.
      - Update documentation index to reference all new testing content.
      - Ensure all cross-references are correct and complete.
      - Run ace-test to verify changes before completing.

  # Phase 5: PR Creation
  - name: create-pr
    skill: ace:create-pr
    instructions:
      - Create a pull request for all Task 253 subtask changes.
      - Title should reference Task 253 Test Performance Strategy.
      - Capture the PR number for subsequent review steps.

  # Phase 6: Review Cycle 1
  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 2).
      - Use preset code-deep for thorough analysis.
      - Focus on correctness, architecture, and consistency across subtasks.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review cycle 1 (medium+ priority).
      - Commit changes with descriptive messages.
      - Ensure changes maintain consistency across all subtask implementations.

  # Phase 7: Review Cycle 2
  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 2).
      - Use preset code-deep for thorough analysis.
      - Focus on edge cases, documentation quality, and cross-references.

  - name: apply-feedback-2
    instructions:
      - Apply final feedback from review cycle 2.
      - Address any remaining issues from review.

  # Phase 8: Finalize
  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Summarize what was completed across all 5 subtasks.
      - Ensure PR is ready for human review.
