# Job: All Task 259 subtasks with PR and 2 review cycles
# Custom job for Task 259 (E2E Workflow Test Case Filtering)
# Dependencies: 259.01 first, 259.03 independent, then 259.02→259.04→259.05

session:
  name: task-259-all-subtasks-with-pr
  description: |
    Implement all Task 259 subtasks (E2E Workflow Test Case Filtering)
    with PR creation and 2 review cycles, ending with manual testing.

    Subtasks (in execution order):
    - 259.01: E2E Workflow Test Case Filtering (foundational)
    - 259.03: E2E Failed Test Metadata (independent)
    - 259.02: E2E CLI Test Case Selection (depends on 259.01)
    - 259.04: E2E Only-Failures Single Package (depends on 259.03)
    - 259.05: E2E Only-Failures Suite Level (depends on 259.04)

steps:
  # Phase 1: Onboard
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Run `ace-bundle project` to load project context.
      - Run `ace-taskflow task 259` to understand the parent task and all subtasks.

  # Phase 2: Foundation tasks (no dependencies)
  - name: work-on-259.01
    skill: ace:work-on-task
    instructions:
      - "Work on task 259.01 (E2E Workflow Test Case Filtering)."
      - This is the foundational subtask - enable the run-e2e-test workflow to accept optional TEST_CASES argument.
      - Implement test case ID normalization (tc-001, 001, TC-1 all normalize to TC-001).
      - Add validation for non-existent test case IDs.
      - Maintain backward compatibility (no TEST_CASES = all tests run).
      - Run tests after implementation.

  - name: work-on-259.03
    skill: ace:work-on-task
    instructions:
      - "Work on task 259.03 (E2E Failed Test Metadata)."
      - This is independent from 259.01/259.02 and can be done now.
      - Enhance metadata.yml to track which specific test cases failed.
      - Add failed_test_cases array to metadata output.
      - Ensure backward compatibility with existing parsers.
      - Run tests after implementation.

  # Phase 3: Dependent tasks (in dependency order)
  - name: work-on-259.02
    skill: ace:work-on-task
    instructions:
      - "Work on task 259.02 (E2E CLI Test Case Selection)."
      - Depends on 259.01 being complete.
      - Add --test-cases and --dry-run flags to ace-test-e2e CLI command.
      - Create TestCaseParser atom class with normalize and filter methods.
      - Ensure --test-cases and --only-failures are mutually exclusive.
      - Run tests after implementation.

  - name: work-on-259.04
    skill: ace:work-on-task
    instructions:
      - "Work on task 259.04 (E2E Only-Failures Single Package)."
      - Depends on 259.03 being complete (needs failed_test_cases metadata).
      - Add --only-failures flag to ace-test-e2e command.
      - Create FailureFinder molecule to scan cache for failed test cases.
      - Provide clear error when no failures found.
      - Run tests after implementation.

  - name: work-on-259.05
    skill: ace:work-on-task
    instructions:
      - "Work on task 259.05 (E2E Only-Failures Suite Level)."
      - Depends on 259.04 being complete.
      - Extend --only-failures to ace-test-suite-e2e command.
      - Collect and group failures by package/test.
      - Ensure compatibility with --affected flag.
      - Run tests after implementation.

  # Phase 4: PR Creation
  - name: create-pr
    skill: ace:create-pr
    instructions:
      - Create a pull request for Task 259 implementation.
      - "Title: E2E Workflow Test Case Filtering"
      - Include summary of all 5 subtasks implemented.
      - Reference the dependency chain in the PR description.

  # Phase 5: Review Cycle 1
  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 2).
      - Focus on correctness and architecture.
      - Check ATOM pattern compliance in ace-test-e2e-runner.
      - Verify dependency chain is respected in implementation.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  # Phase 6: Review Cycle 2
  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 2).
      - Focus on edge cases, error handling, and test coverage.
      - Final polish and documentation check.

  - name: apply-feedback-2
    instructions:
      - Apply final feedback from review.
      - Commit changes with descriptive messages.

  # Phase 7: Finalize
  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Ensure PR is ready for human review.

  # Phase 8: Manual Testing
  - name: manual-testing
    instructions:
      - "PAUSE: Manual testing by human."
      - The PR is ready for manual verification of E2E test filtering features.
      - Notify the user that the workflow is paused for their manual testing.
