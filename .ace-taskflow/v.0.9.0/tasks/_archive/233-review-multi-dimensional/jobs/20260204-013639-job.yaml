session:
  name: task-233-subtasks-with-pr
  description: |
    Implement all Task 233 subtasks (Multi-Dimensional Review Architecture)
    with PR creation and 2 review cycles.

    Subtasks:
    - 233.01: Token Estimation Foundation
    - 233.02: Subject Strategy Interface + Full Strategy
    - 233.03: Chunked Strategy
    - 233.04: Adaptive Strategy Selection
    - 233.06: Reviewer Entity Model

steps:
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Run `ace-bundle project` to load project context.
      - Run `ace-taskflow task 233` to understand the parent task.

  - name: work-on-233.01
    skill: ace:work-on-task
    instructions:
      - Work on task 233.01 (Token Estimation Foundation).
      - Implement TokenEstimator atom with chars/4 heuristic.
      - Implement ContextLimitResolver for model-to-limit mapping.
      - Run tests after implementation.

  - name: work-on-233.02
    skill: ace:work-on-task
    instructions:
      - Work on task 233.02 (Subject Strategy Interface + Full Strategy).
      - Define SubjectStrategy interface with factory pattern.
      - Implement FullStrategy (pass-through, no-split).
      - Ensure 85% headroom threshold is respected.

  - name: work-on-233.03
    skill: ace:work-on-task
    instructions:
      - Work on task 233.03 (Chunked Strategy).
      - Implement DiffBoundaryFinder atom.
      - Implement ChunkedStrategy with file boundary splitting.
      - Handle oversized files with truncation markers.

  - name: work-on-233.04
    skill: ace:work-on-task
    instructions:
      - Work on task 233.04 (Adaptive Strategy Selection).
      - Implement AdaptiveStrategy that auto-selects Full or Chunked.
      - Make Adaptive the default strategy.
      - Add extensive logging for strategy selection.

  - name: work-on-233.06
    skill: ace:work-on-task
    instructions:
      - Work on task 233.06 (Reviewer Entity Model).
      - Implement Reviewer entity with configurable attributes.
      - Support file pattern filtering and system prompt enhancement.
      - Ensure backward compatibility with legacy model formats.

  - name: create-pr
    skill: ace:create-pr
    instructions:
      - Create a pull request for Task 233 implementation.
      - Title should reference Multi-Dimensional Review Architecture.
      - Include summary of all 5 subtasks implemented.

  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 2).
      - Focus on correctness and architecture.
      - Check ATOM pattern compliance in ace-review.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 2).
      - Final polish, edge cases, and documentation check.

  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Ensure PR is ready for human review.
