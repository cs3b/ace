    instructions:
      - Create a pull request for the changes.
      - Capture the PR number for subsequent review steps.
      - Update the next steps with the PR number.

  - name: review-cycle-1
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 1 of 3).
      - Focus on correctness and architecture.

  - name: apply-feedback-1
    instructions:
      - Apply feedback from review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: review-cycle-2
    skill: ace:review-pr
    instructions:
      - Review the code (iteration 2 of 3).
      - Focus on edge cases and error handling.

  - name: apply-feedback-2
    instructions:
