session:
  name: task-255-subtasks-linear-with-pr
  description: Linear execution of 255.01–255.05 with PR workflow, reviews, and consolidated review.

steps:
  - name: onboard
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Load context and understand the project structure.

  - name: prepare-batch
    instructions:
      - "Confirm task list: 255.01–255.05 (exclude 255.00 and 255)."
      - Run `ace-taskflow task 255.01` and summarize key deliverables.
      - Run `ace-taskflow task 255.02` and summarize key deliverables.
      - Run `ace-taskflow task 255.03` and summarize key deliverables.
      - Run `ace-taskflow task 255.04` and summarize key deliverables.
      - Run `ace-taskflow task 255.05` and summarize key deliverables.

  - name: prepare-255.01
    instructions:
      - Load task context with `ace-taskflow task 255.01`.
      - Review task requirements and acceptance criteria.
      - Report task title and key deliverables.

  - name: implement-255.01
    instructions: |
      ## Onboard

      Load context before starting work:
      - Run `ace-bundle project` to load project context
      - Run `ace-taskflow task 255.01` to load task details

      ## Work

      Implement task 255.01 following the specification:
      - Follow project conventions and coding standards
      - Make incremental commits as you progress
      - Run tests after significant changes

      ## Report

      Return a structured summary:
      - **Task**: task ID and title
      - **Status**: completed | partial | blocked
      - **Changes**: list of files modified and what changed
      - **Commits**: commit hashes and messages created
      - **Issues**: any problems encountered or deferred decisions

  - name: verify-255.01
    instructions:
      - Run `ace-test` for relevant package(s) touched by task 255.01.
      - Check all acceptance criteria are met.
      - Report test results and any issues found.

  - name: commit-255.01
    skill: ace:commit
    instructions:
      - Commit any remaining changes with a descriptive message.
      - Ensure all tests pass before completing.

