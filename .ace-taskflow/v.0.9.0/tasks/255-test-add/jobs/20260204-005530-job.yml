      - Final polish and documentation check.

  - name: apply-feedback-3
    instructions:
      - Apply final feedback from review.

  - name: consolidated-review
    skill: ace:review
    instructions: |
      Review all batch changes using consolidated review preset.

      Run: `ace-review --preset batch`

      Review focus:
      - Cross-task consistency (naming, patterns, style)
      - Integration points between tasks
      - Test coverage across all changes
      - Any shared code or refactoring opportunities

      Tasks reviewed: 255.01, 255.02, 255.03, 255.04, 255.05

  - name: finalize
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with implementation summary.
      - Push all changes to remote.
      - Ensure PR is ready for human review.

  - name: mark-tasks-done
    instructions:
      - Run `ace-taskflow task done 255.01`.
      - Run `ace-taskflow task done 255.02`.
      - Run `ace-taskflow task done 255.03`.
      - Run `ace-taskflow task done 255.04`.
      - Run `ace-taskflow task done 255.05`.
      - Confirm status updated for each.
