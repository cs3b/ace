tags:
- ace-b36ts
- e2e
- testing
settings:
  font_size: 16
  width: 1100
  height: 700
  format: gif
scenes:
- name: Restarted E2E split
  commands:
  - type: find ace-b36ts/test/fast -maxdepth 3 -type f
    sleep: 3s
  - type: find ace-b36ts/test/feat -maxdepth 2 -type f
    sleep: 3s
  - type: find ace-b36ts/test/e2e -maxdepth 2 -type f
    sleep: 3s
  - type: ace-test ace-b36ts
    sleep: 3s
  - type: ace-test ace-b36ts feat
    sleep: 3s
  - type: ace-test-e2e ace-b36ts --dry-run
    sleep: 5s
teardown:
- cleanup
