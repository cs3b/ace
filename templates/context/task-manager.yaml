# Task Manager Context Template
# This template loads task management context without file content
# Use: context --yaml dev-handbook/templates/context/task-manager.yaml

# No files needed - we work at file level, not content level

commands:
  # Discover releases dynamically
  - release-manager current
  - release-manager all
  
  # List all tasks (provides complete task metadata with status summary)
  - task-manager list
  
  # Find next actionable work (with limit for planning)
  - task-manager next --limit 5
  
  # Check recent activity
  - task-manager recent --limit 3
  
  # Current work status (using custom git-status command)
  - git-status
  
format: markdown-xml