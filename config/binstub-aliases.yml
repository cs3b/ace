# Binstub Aliases Configuration
# Defines shell binstubs to be generated and their target executables
#
# Schema:
#   aliases:
#     binstub_name:
#       description: "Brief description of what this binstub does"
#       executable: "path/to/executable"
#       type: "shell" | "ruby"
#       args_processing: "pass_through" | "custom"

version: "1.0"

aliases:
  # Task Management Tools
  tn:
    description: "Get next task"
    executable: "task-manager"
    command: "next"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  tr:
    description: "Get recent tasks"
    executable: "task-manager"
    command: "recent"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  tal:
    description: "Get all tasks"
    executable: "task-manager"
    command: "all"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  tnid:
    description: "Get next task ID"
    executable: "task-manager"
    command: "generate-id"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  # Release Manger

  rc:
    description: "Current Relese"
    executable: "release-manager current"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  # LLM Tools
  llm-query:
    description: "Query LLM providers"
    executable: "llm-query"
    type: "shell"
    args_processing: "pass_through"

  llm-models:
    description: "List available LLM models"
    executable: "llm-models"
    type: "shell"
    args_processing: "pass_through"

  llm-usage:
    description: "Generate LLM usage report"
    executable: "llm-usage-report"
    type: "shell"
    args_processing: "pass_through"

  # Navigation Tools
  np:
    description: "Navigation path resolution and generation"
    executable: "nav-path"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "dev_tools"

  nt:
    description: "Navigation tree with filtering and autocorrection"
    executable: "nav-tree"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "dev_tools"

  # Git Commands (Multi-Repository Support)
  gc:
    description: "Git commit with LLM-generated messages across repositories"
    executable: "git-commit"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gs:
    description: "Git status across all repositories"
    executable: "git-status"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  ga:
    description: "Git add with intelligent path grouping"
    executable: "git-add"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gp:
    description: "Git push across repositories"
    executable: "git-push"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gpull:
    description: "Git pull across repositories"
    executable: "git-pull"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gl:
    description: "Git log with unified timeline"
    executable: "git-log"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gd:
    description: "Git diff across repositories"
    executable: "git-diff"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gf:
    description: "Git fetch across repositories"
    executable: "git-fetch"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gco:
    description: "Git checkout across repositories"
    executable: "git-checkout"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gsw:
    description: "Git switch across repositories"
    executable: "git-switch"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  gmv:
    description: "Git move/rename with intelligent path grouping"
    executable: "git-mv"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  grm:
    description: "Git remove with intelligent path grouping"
    executable: "git-rm"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"

  grestore:
    description: "Git restore with intelligent path grouping"
    executable: "git-restore"
    type: "shell"
    args_processing: "pass_through"
    execution_context: "project_root"
