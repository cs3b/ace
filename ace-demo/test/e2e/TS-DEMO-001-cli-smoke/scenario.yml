test-id: TS-DEMO-001
title: "ace-demo CLI Smoke E2E"
area: demo
package: ace-demo
priority: high
cost-tier: smoke
tags: [smoke, happy-path, "use-case:demo"]
tool-under-test: ace-demo

sandbox-layout:
  results/tc/01/: "CLI help command-surface artifacts"
  results/tc/02/: "Create/show tape lifecycle artifacts"
  results/tc/03/: "Inline record dry-run preview artifacts"
  results/tc/04/: "Attach argument-validation error artifacts"

e2e-justification: >
  These checks require the real ace-demo executable, real command parsing through
  the CLI registry, and real sandbox filesystem transitions (tape creation and
  lookup) across separate invocations. Unit tests stub internals heavily and do
  not validate full operator workflows through packaged CLI boundaries.

unit-coverage-reviewed:
  - test/fast/commands/cli_test.rb
  - test/fast/commands/create_test.rb
  - test/fast/commands/retime_test.rb
  - test/fast/organisms/tape_creator_test.rb
  - test/fast/organisms/demo_recorder_test.rb
  - test/fast/molecules/inline_recorder_test.rb
  - test/fast/molecules/tape_scanner_test.rb

requires:
  tools: [ace-demo, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - run: git add -A && git commit -m "initial" --quiet
