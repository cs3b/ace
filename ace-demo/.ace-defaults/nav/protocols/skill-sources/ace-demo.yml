---
# Skill Sources Protocol Configuration for ace-demo gem
# This enables canonical skill discovery from the installed ace-demo gem

name: ace-demo
type: gem
description: Canonical skills from ace-demo gem
priority: 10

# Configuration for skill discovery within the gem
config:
  # Relative path within the gem
  relative_path: handbook/skills

  # Pattern for finding canonical skill files
  pattern: "*/SKILL.md"

  # Enable discovery
  enabled: true
