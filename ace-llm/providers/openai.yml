name: openai
class: Ace::LLM::Organisms::OpenAIClient
gem: ace-llm
models:
  - gpt-5
  - gpt-5-turbo
  - gpt-5-mini
  - o3
  - o3-mini
aliases:
  global:
    gpt5: openai:5
    gpt5turbo: openai:5turbo
    gpt5mini: openai:5mini
    o3: openai:o3
  model:
    5: gpt-5
    5turbo: gpt-5-turbo
    5mini: gpt-5-mini
    o3: o3
    o3mini: o3-mini
api_key:
  env: OPENAI_API_KEY
  required: true
  description: OpenAI API key
capabilities:
  - text_generation
  - streaming
  - function_calling
  - vision
  - embeddings
default_options:
  temperature: 0.7
  max_tokens: 4096