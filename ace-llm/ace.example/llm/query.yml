# Configuration for ace-llm gem
# This file should be copied to .ace/llm/query.yml in your project
#
# Controls LLM query defaults and model selection

llm:
  # Default model for queries
  # Can be a model name or alias
  default_model: "gpt-4"

  # Model aliases for convenience
  # Map short names to full model identifiers
  aliases:
    # OpenAI models
    gpt4: "gpt-4"
    gpt35: "gpt-3.5-turbo"
    gpt4o: "gpt-4o"

    # Anthropic models
    claude: "claude-3-opus-20240229"
    claude3: "claude-3-opus-20240229"
    sonnet: "claude-3-sonnet-20240229"
    haiku: "claude-3-haiku-20240307"

    # Local/lightweight models
    glite: "gpt-3.5-turbo"  # Lightweight default
    local: "lmstudio/local"  # Local model via LMStudio

    # Custom shortcuts
    fast: "gpt-3.5-turbo"   # Fast responses
    smart: "gpt-4"           # High quality
    cheap: "gpt-3.5-turbo"  # Cost effective

  # Query defaults
  query:
    # Default temperature (0.0-1.0)
    temperature: 0.7

    # Maximum tokens for response
    max_tokens: 2000

    # Request timeout in seconds
    timeout: 60

    # Number of retries on failure
    retry_attempts: 3

    # Delay between retries (seconds)
    retry_delay: 2

    # Stream responses
    stream: false

  # Model-specific overrides
  models:
    "gpt-4":
      max_tokens: 4000
      temperature: 0.7
      timeout: 90

    "gpt-3.5-turbo":
      max_tokens: 2000
      temperature: 0.8
      timeout: 30

    "claude-3-opus-20240229":
      max_tokens: 4000
      temperature: 0.7
      timeout: 90

    "claude-3-sonnet-20240229":
      max_tokens: 2000
      temperature: 0.7
      timeout: 60

  # Provider selection
  providers:
    # Auto-detect provider from model name
    auto_detect: true

    # Provider precedence (first available wins)
    precedence:
      - env          # Environment variables
      - cli          # CLI providers (claude, codex, opencode)
      - api          # Direct API providers

    # Fallback provider if none available
    fallback: null

  # Prompt engineering
  prompts:
    # System prompt prefix
    system_prefix: ""

    # System prompt suffix
    system_suffix: ""

    # Add thinking tags
    add_thinking: false

    # Include context format
    context_format: "markdown"  # Options: markdown, xml, json

    # Maximum context size (characters)
    max_context_size: 50000

  # Rate limiting
  rate_limit:
    # Enable rate limiting
    enabled: false

    # Requests per minute
    requests_per_minute: 60

    # Tokens per minute
    tokens_per_minute: 90000

    # Concurrent requests
    max_concurrent: 5

  # Caching
  cache:
    # Enable response caching
    enabled: false

    # Cache directory
    directory: ".cache/ace-llm"

    # Cache TTL in seconds
    ttl: 3600

    # Cache key includes
    key_includes:
      - model
      - temperature
      - max_tokens
      - prompt_hash

  # Logging
  logging:
    # Log API requests
    log_requests: false

    # Log API responses
    log_responses: false

    # Log file path
    file: ".logs/ace-llm.log"

    # Sanitize sensitive data
    sanitize: true

    # Include token counts
    include_tokens: true

  # Error handling
  errors:
    # Raise on API errors
    raise_on_error: true

    # Fallback to different model on error
    fallback_model: "gpt-3.5-turbo"

    # Error notification
    notify_on_error: false

  # Cost tracking
  cost_tracking:
    # Enable cost tracking
    enabled: false

    # Cost per 1000 tokens (input)
    input_costs:
      "gpt-4": 0.03
      "gpt-3.5-turbo": 0.0015
      "claude-3-opus-20240229": 0.015
      "claude-3-sonnet-20240229": 0.003

    # Cost per 1000 tokens (output)
    output_costs:
      "gpt-4": 0.06
      "gpt-3.5-turbo": 0.002
      "claude-3-opus-20240229": 0.075
      "claude-3-sonnet-20240229": 0.015

    # Warning threshold (USD)
    warning_threshold: 10.0

    # Hard limit (USD)
    hard_limit: 100.0

  # Safety and moderation
  safety:
    # Enable content filtering
    filter_content: false

    # Block harmful requests
    block_harmful: false

    # Moderation model
    moderation_model: "text-moderation-latest"

  # Development settings
  development:
    # Enable debug mode
    debug: false

    # Use mock responses
    mock_responses: false

    # Mock response delay (ms)
    mock_delay: 100

    # Save queries for testing
    save_queries: false

    # Query save path
    query_path: "test/fixtures/queries"