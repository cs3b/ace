# Example ace-llm configuration
# Copy to .ace/llm/query.yml in your project and customize

llm:
  # Default model for queries
  default_model: "gpt-4"

  # Model aliases for convenience
  # Map short names to full model identifiers
  aliases:
    # Common shortcuts
    gpt4: "gpt-4"
    gpt35: "gpt-3.5-turbo"
    claude: "claude-3-opus-20240229"
    sonnet: "claude-3-sonnet-20240229"

    # Purpose-based aliases
    fast: "gpt-3.5-turbo"   # Fast responses
    smart: "gpt-4"           # High quality
    cheap: "gpt-3.5-turbo"   # Cost effective
    glite: "gpt-3.5-turbo"   # Git commit default

  # Query defaults (optional)
  query:
    temperature: 0.7
    max_tokens: 2000
    timeout: 60
    retry_attempts: 3

  # Model-specific overrides (optional)
  models:
    "gpt-4":
      max_tokens: 4000
      temperature: 0.7

    "gpt-3.5-turbo":
      max_tokens: 2000
      temperature: 0.8

  # Provider selection (optional)
  providers:
    auto_detect: true
    precedence:
      - env          # Environment variables
      - cli          # CLI providers (claude, codex)
      - api          # Direct API providers