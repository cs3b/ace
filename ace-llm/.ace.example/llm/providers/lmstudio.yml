name: lmstudio
class: Ace::LLM::Organisms::LMStudioClient
gem: ace-llm
models:
  - local-model
  - custom-model
endpoint: http://localhost:1234
api_key:
  required: false
  description: LM Studio local server (no API key needed)
capabilities:
  - text_generation
  - streaming
default_options:
  temperature: 0.7
  max_tokens: 4096