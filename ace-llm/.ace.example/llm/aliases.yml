# ace-llm aliases configuration
# Place this file in .ace/llm/aliases.yml in your project or home directory

global:
  # Google Gemini aliases
  gflash: "google:gemini-2.5-flash"
  gpro: "google:gemini-2.5-pro"
  gfast: "google:gemini-2.5-flash-lite"

  # Anthropic Claude aliases
  opus: "anthropic:claude-3-opus-20240229"
  sonnet: "anthropic:claude-3-5-sonnet-20241022"
  haiku: "anthropic:claude-3-haiku-20240307"
  csonnet: "anthropic:claude-3-5-sonnet-20241022"

  # OpenAI aliases
  gpt4: "openai:gpt-4-turbo-preview"
  gpt4o: "openai:gpt-4o"
  o4mini: "openai:gpt-4o-mini"
  gpt35: "openai:gpt-3.5-turbo"

  # Mistral aliases
  mistral-large: "mistral:mistral-large-latest"
  mistral-medium: "mistral:mistral-medium-latest"

  # Together AI aliases
  llama3: "togetherai:meta-llama/Llama-3-70b-chat-hf"
  mixtral: "togetherai:mistralai/Mixtral-8x7B-Instruct-v0.1"

  # Custom aliases - add your own
  quick: "openai:gpt-4o-mini"
  smart: "anthropic:claude-3-5-sonnet-20241022"
  local: "lmstudio"

providers:
  # Provider-specific aliases (used with provider:alias syntax)
  google:
    flash: "gemini-2.5-flash"
    pro: "gemini-2.5-pro"

  openai:
    4: "gpt-4-turbo-preview"
    4o: "gpt-4o"
    mini: "gpt-4o-mini"

  anthropic:
    s: "claude-3-5-sonnet-20241022"
    o: "claude-3-opus-20240229"
    h: "claude-3-haiku-20240307"