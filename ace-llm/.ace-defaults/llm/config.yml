# ace-llm default configuration
# Override in .ace/llm/config.yml for project-specific settings

llm:
  # Optional allow-list of active providers.
  # When unset, null, or empty, all discovered providers remain available.
  # Example:
  # providers:
  #   active:
  #     - google
  #     - anthropic
  providers: {}

  # Default timeout in seconds for LLM requests
  # CLI providers (opencode, claude, codex, gemini) may need longer
  # due to subprocess overhead and "thinking" phases
  timeout: 120

  # Global fallback policy shared by QueryInterface and ace-llm CLI query.
  fallback:
    enabled: true
    retry_count: 3
    retry_delay: 1.0
    max_total_timeout: 30.0
    chains: {}
    providers: []

  # Named model roles for indirection across consumer configs.
  # Each role lists candidates in priority order; RoleResolver returns
  # the first available one. Every role covers codex, claude, and gemini
  # so resolution succeeds even when a provider is unconfigured.
  # Override in .ace/llm/config.yml for project-specific role assignments.
  roles:
    # --- Reusable candidate lists ---
    _utility-lite: &utility-lite
      - google:lite
      - codex:mini
      - claude:haiku
    _assign-worker: &assign-worker
      - codex:codex@yolo
      - claude:sonnet@yolo
      - gemini:pro-latest@yolo

    # --- Diagnostic ---
    doctor:
      - gemini:flash-latest@yolo
      - claude:haiku@yolo
      - codex:mini@yolo

    # --- Planning ---
    planner:
      - codex:gpt@ro
      - claude:sonnet@ro
      - gemini:pro-latest@ro

    # --- Review (single-model and synthesis) ---
    review-default:
      - codex:codex@ro
      - claude:sonnet@ro
      - gemini:pro-latest@ro
    review-synthesizer:
      - codex:gpt@ro
      - claude:sonnet@ro
      - gemini:pro-latest@ro

    # --- Review (provider-specific, for parallel multi-model review) ---
    review-claude:
      - claude:opus@ro
      - codex:gpt@ro
      - gemini:pro-latest@ro
    review-codex:
      - codex:gpt@ro
      - claude:sonnet@ro
      - gemini:pro-latest@ro
    review-gemini:
      - gemini:pro-latest@ro
      - claude:sonnet@ro
      - codex:gpt@ro

    # --- Assignment ---
    assign-executor: *assign-worker
    assign-engineer: *assign-worker
    assign-orchestrator:
      - claude:sonnet
      - codex:gpt
      - gemini:pro-latest

    # --- E2E testing ---
    e2e-executor:
      - claude:haiku@yolo
      - codex:mini@yolo
      - gemini:flash-latest@yolo
    e2e-reporter:
      - claude:haiku
      - codex:mini
      - gemini:flash-latest

    # --- Utility ---
    prompt-enhance: *utility-lite
    commit:
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    docs-analysis: *utility-lite
    idea-enhance:
      - gemini:flash-latest
      - codex:mini
      - claude:haiku
    compressor: *utility-lite

    # --- Simulation ---
    sim-primary:
      - google:flash-preview
      - claude:haiku
      - codex:mini
    sim-synthesis:
      - claude:haiku
      - codex:mini
      - gemini:flash-latest

  # Default context limit for unknown models (in tokens)
  # Provider-specific limits are defined in providers/*.yml
  context_limit:
    default: 128000
