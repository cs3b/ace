# ace-llm default configuration
# Override in .ace/llm/config.yml for project-specific settings

llm:
  # Optional allow-list of active providers.
  # When unset, null, or empty, all discovered providers remain available.
  # Example:
  # providers:
  #   active:
  #     - google
  #     - anthropic
  providers: {}

  # Default timeout in seconds for LLM requests
  # CLI providers (opencode, claude, codex, gemini) may need longer
  # due to subprocess overhead and "thinking" phases
  timeout: 120

  # Global fallback policy shared by QueryInterface and ace-llm CLI query.
  fallback:
    enabled: true
    retry_count: 3
    retry_delay: 1.0
    max_total_timeout: 30.0
    chains: {}
    providers: []

  # Named model roles for indirection across consumer configs.
  # Override in .ace/llm/config.yml for project-specific role assignments.
  roles:
    doctor:
      - gemini:flash-latest@yolo
    planner:
      - codex:gpt@ro
    review-default:
      - codex:codex@ro
    review-synthesizer:
      - codex:gpt@ro
    review-fallback:
      - claude:sonnet
    review-claude:
      - claude:opus@ro
    review-codex:
      - codex:gpt@ro
    review-gemini:
      - gemini:pro-latest@ro
    assign-executor:
      - codex:codex@yolo
    e2e-executor:
      - claude:haiku@yolo
    e2e-reporter:
      - claude:haiku
    prompt-enhance:
      - glite
    commit:
      - codex:mini
    docs-analysis:
      - glite
    idea-enhance:
      - gemini:flash-latest
    compressor:
      - glite
    sim-primary:
      - google:flash-preview
    sim-synthesis:
      - claude:haiku

  # Default context limit for unknown models (in tokens)
  # Provider-specific limits are defined in providers/*.yml
  context_limit:
    default: 128000
