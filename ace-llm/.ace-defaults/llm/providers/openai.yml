name: openai
last_synced: 2025-12-05
class: Ace::LLM::Organisms::OpenAIClient
gem: ace-llm
context_limit: 128000  # GPT-4o has 128K context window
models:
  - gpt-5.1
  - gpt-5.1-chat-latest
  - gpt-5.1-codex
  - gpt-5.1-codex-max
  - gpt-5.1-codex-mini
aliases:
  global:
    oagpt: openai:gpt
    oacodex: openai:codex
    oamax: openai:max
  model:
    gpt: gpt-5.1
    codex: gpt-5.1-codex
    max: gpt-5.1-codex-max
api_key:
  env: OPENAI_API_KEY
  required: true
  description: OpenAI API key
capabilities:
  - text_generation
  - streaming
  - function_calling
  - vision
  - embeddings
default_options:
  temperature: 0.7
  max_tokens: 16384
