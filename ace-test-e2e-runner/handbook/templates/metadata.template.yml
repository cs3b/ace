# E2E Test Run Metadata
# Generated by ace-test-e2e-runner workflow

# Run identification
run-id: "{run-id}"
test-id: "{test-id}"
package: "{package}"

# Execution details
agent: "{agent-name}"
started: "{start-timestamp}"  # ISO 8601 format: YYYY-MM-DDTHH:MM:SSZ
completed: "{end-timestamp}"  # ISO 8601 format: YYYY-MM-DDTHH:MM:SSZ
duration: "{duration-seconds}s"

# Test results
status: "pass|fail|partial|incomplete"
results:
  passed: 0
  failed: 0
  total: 0

# Git context
git:
  branch: "{branch-name}"
  commit: "{commit-sha}"
  dirty: false

# Tool versions
tools:
  ruby: "{ruby-version}"
  # Add other relevant tool versions
  # standardrb: "{version}"
  # rubocop: "{version}"

# Environment
environment:
  os: "{os-name}"
  arch: "{architecture}"

# Cleanup status
cleanup:
  enabled: false
  completed: false
