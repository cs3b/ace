---
# Prompt Sources Protocol Configuration for ace-prompt gem
# This enables prompt discovery from the installed ace-prompt gem

name: ace-prompt
type: gem
description: Prompt enhancement prompts from ace-prompt gem
priority: 10

# Configuration for prompt discovery within the gem
config:
  # Relative path within the gem (default: handbook/prompts)
  relative_path: handbook/prompts

  # Pattern for finding prompt files (supports nested discovery)
  pattern: "**/*.md"

  # Enable discovery
  enabled: true

# Categories of prompts available
categories:
  - base  # Base enhancement prompts

# Notes for users
notes: |
  ace-prompt provides prompts for enhancement:
  - base.enhance: System prompt for enhancing user prompts with clarity
    and specificity improvements

  Use prompt:// URIs to reference these prompts in your enhancement configurations.
  Users can override by creating:
    - .ace/handbook/prompts/base.enhance.md (project)
    - ~/.ace/handbook/prompts/base.enhance.md (user)
