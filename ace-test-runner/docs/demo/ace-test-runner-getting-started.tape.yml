---
description: Run real fast/feat tests with ace-test from project root
tags:
    - ace-test-runner
    - docs
    - getting-started
settings:
    font_size: 12
    width: 960
    height: 540
    format: gif
    env:
        PROJECT_ROOT_PATH: /home/mc/ace-t.5nx
scenes:
    - name: Switch to project root
      commands:
          - type: cd $PROJECT_ROOT_PATH && clear
            sleep: 1s
    - name: Run all package tests
      commands:
          - type: ace-test ace-b36ts
            sleep: 5s
          - type: clear
            sleep: 1s
    - name: Run targeted target
      commands:
          - type: ace-test ace-b36ts atoms
            sleep: 3s
    - name: Profile slowest tests
      commands:
          - type: ace-test ace-b36ts --profile 5
            sleep: 5s
          - type: clear
            sleep: 1s
    - name: Run the suite
      commands:
          - type: ace-test-suite --progress
            sleep: 10s
teardown:
    - cleanup
