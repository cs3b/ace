# ace-test-runner default configuration
# ADR-022: This file is the single source of truth for defaults
#
# Configuration cascade:
#   1. .ace-defaults/test-runner/config.yml (gem defaults - this file)
#   2. ~/.ace/test/runner.yml (user defaults)
#   3. .ace/test/runner.yml (project overrides)
#   4. CLI options (highest priority)

version: 1

# Test file patterns for each category
# Supports both the new fast/feat layout and legacy flat/unit+integration layouts during migration.
patterns:
  smoke: "test/{fast/,unit/,}smoke/**/*_test.rb"
  atoms: "test/{fast/,unit/,}atoms/**/*_test.rb"
  molecules: "test/{fast/,unit/,}molecules/**/*_test.rb"
  organisms: "test/{fast/,unit/,}organisms/**/*_test.rb"
  models: "test/{fast/,unit/,}models/**/*_test.rb"
  commands: "test/{fast/,unit/,}commands/**/*_test.rb"
  cli: "test/{fast/,unit/,}cli/**/*_test.rb"
  prompts: "test/{fast/,unit/,}prompts/**/*_test.rb"
  fixtures: "test/{fast/,unit/,}fixtures/**/*_test.rb"
  support: "test/{fast/,unit/,}support/**/*_test.rb"
  edge: "test/{fast/,unit/,}edge/**/*_test.rb"
  feat_tests: "test/feat/**/*_test.rb"

# Test targets that combine multiple patterns
targets:
  fast:
    - smoke
    - atoms
    - molecules
    - organisms
    - models
    - commands
    - cli
    - prompts
    - fixtures
    - support
  feat:
    - feat_tests
    - edge
  unit:
    - fast
  integration:
    - feat
  int:
    - feat
  all:
    - fast
    - feat
  quick:
    - atoms
    - molecules

# Default execution options
defaults:
  reporter: progress
  color: auto
  fail_fast: false
  save_reports: true
  report_dir: .ace-local/test/reports

# Failure display limits
failure_limits:
  max_display: 7

execution:
  mode: by-target
  target_fail_fast: true
  target_isolation: false
