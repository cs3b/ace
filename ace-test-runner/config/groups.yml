# Default test group configuration for ace-test-runner
#
# Groups allow you to organize tests for different execution strategies.
# Each group can have its own patterns, explicit files, and options.
#
# Example usage:
#   ace-test --group unit         # Run only unit tests
#   ace-test --group integration  # Run only integration tests
#   ace-test                      # Run all tests (default)

groups:
  # Unit tests - fast, isolated tests
  unit:
    patterns:
      - "test/unit/**/*_test.rb"
      - "test/*_test.rb"           # Top-level test files are usually unit tests
      - "test/*/atoms/*_test.rb"    # Atoms are pure functions, always unit tests
    options:
      fail_fast: false
      timeout: 10                   # 10 second timeout for unit tests

  # Integration tests - tests that interact with external resources
  integration:
    patterns:
      - "test/integration/**/*_test.rb"
      - "test/*/molecules/*_test.rb"  # Molecules often integrate multiple components
    options:
      fail_fast: false
      timeout: 30                      # 30 second timeout for integration tests

  # System/E2E tests - full system tests
  system:
    patterns:
      - "test/system/**/*_test.rb"
      - "test/e2e/**/*_test.rb"
      - "test/*/organisms/*_test.rb"  # Organisms orchestrate full workflows
    options:
      fail_fast: true                 # Stop on first failure for expensive tests
      timeout: 60                      # 60 second timeout for system tests

  # Performance tests - benchmarks and performance validations
  performance:
    patterns:
      - "test/performance/**/*_test.rb"
      - "test/benchmark/**/*_test.rb"
    options:
      verbose: true
      timeout: 120                     # 2 minute timeout for performance tests

  # Default group - all tests
  all:
    patterns:
      - "test/**/*_test.rb"
      - "spec/**/*_spec.rb"            # Also include RSpec tests if present
    options:
      fail_fast: false

  # Quick smoke test - minimal set for rapid feedback
  smoke:
    files:                             # Explicit file list for smoke tests
      - "test/test_helper.rb"
      - "test/ace_test.rb"             # Main entry point test
    patterns:
      - "test/*/version_test.rb"      # Version tests are quick sanity checks
    options:
      fail_fast: true
      verbose: false