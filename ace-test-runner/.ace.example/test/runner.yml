# Example test runner configuration
# Copy to .ace/test/runner.yml in your project and customize

test_runner:
  # Test framework configuration
  framework: rspec         # Options: rspec, minitest, test-unit

  # Test file patterns
  patterns:
    - "test/**/*_test.rb"   # For minitest/test-unit
    - "spec/**/*_spec.rb"   # For rspec

  # Coverage settings (optional)
  coverage:
    enabled: true
    minimum: 80             # Minimum coverage percentage

  # Output formatting (optional)
  output:
    format: progress        # Options: progress, documentation, json
    color: true