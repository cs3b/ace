# ace-test-runner configuration
# Copy to .ace/test/runner.yml if you need to override defaults

test:
  # Output format: progress, progress-file, or json
  format: progress

  # Test reports directory
  report_dir: test-reports
  save_reports: true

  # Test execution options
  fail_fast: false
  verbose: false
  parallel: false
  color: true

  # Timeout in seconds (nil = no timeout)
  timeout: null

  # Test file patterns (optional - has good defaults)
  # patterns:
  #   all: "test/**/*_test.rb"
  #   unit: "test/unit/**/*_test.rb"
  #   integration: "test/integration/**/*_test.rb"