version: 1
patterns:
  atoms: 'test/{fast/,}atoms/**/*_test.rb'
  molecules: 'test/{fast/,}molecules/**/*_test.rb'
  organisms: 'test/{fast/,}organisms/**/*_test.rb'
  models: 'test/{fast/,}models/**/*_test.rb'
  feat_tests: 'test/{feat,integration}/**/*_test.rb'
  integration: 'test/integration/**/*_test.rb'
  helpers: 'test/helpers/**/*_test.rb'
groups:
  fast: [atoms, molecules, organisms, models]
  feat: [feat_tests]
  unit: [fast]
  integration: [feat]
  int: [feat]
  all: [fast, feat]
  quick: [atoms, molecules]
  core: [atoms, molecules, models]
defaults:
  reporter: progress
  color: auto
  fail_fast: false
  save_reports: true
  report_dir: .ace-local/test/reports
