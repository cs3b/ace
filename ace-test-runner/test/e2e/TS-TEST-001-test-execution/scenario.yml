test-id: TS-TEST-001
title: "ace-test Core Execution Workflows"
area: testing
package: ace-test-runner
priority: high
cost-tier: smoke
tags: [smoke, "use-case:testing"]
tool-under-test: ace-test

sandbox-layout:
  results/tc/01/: "Package test execution artifacts"
  results/tc/02/: "Single-file execution artifacts"
  results/tc/03/: "Group-scoped execution artifacts"

e2e-justification: >
  Validates real test discovery and subprocess execution behavior for package,
  file, and test-group scopes using the actual CLI in sandboxed repositories.

unit-coverage-reviewed:
  - test/feat/package_argument_test.rb
  - test/feat/explicit_file_execution_test.rb
  - test/fast/commands/cli_routing_test.rb

requires:
  tools: [ace-test]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "if [ -f \"$PROJECT_ROOT_PATH/mise.toml\" ]; then cp \"$PROJECT_ROOT_PATH/mise.toml\" mise.toml && mise trust mise.toml; elif [ -f \"mise.toml\" ]; then mise trust mise.toml; fi"
  - copy-fixtures
