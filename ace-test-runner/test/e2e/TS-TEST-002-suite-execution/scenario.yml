test-id: TS-TEST-002
title: "ace-test-suite Aggregation and Failure Propagation"
area: testing
package: ace-test-runner
priority: medium
cost-tier: deep
tags: [deep, "use-case:testing"]
tool-under-test: ace-test-suite

sandbox-layout:
  results/tc/01/: "Cross-package suite execution artifacts"
  results/tc/02/: "Failure propagation artifacts"

e2e-justification: >
  Validates cross-package orchestration and exit-code propagation from
  ace-test-suite, which requires real subprocess management across package sets.

unit-coverage-reviewed:
  - test/integration/suite/orchestrator_test.rb
  - test/integration/suite/display_helpers_test.rb
  - test/molecules/failed_package_reporter_test.rb

requires:
  tools: [ace-test-suite, ace-test]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "echo $PROJECT_ROOT_PATH > .monorepo-root"
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - run: "mkdir -p .ace/test && cp $PROJECT_ROOT_PATH/.ace/test/suite.yml .ace/test/suite.yml"
