name: plan-task
skill: ace-task-plan
description: Analyze task requirements and create an implementation plan

produces: [implementation-plan]
consumes: [project-base-context, task-spec]

context:
  default: fork
  reason: "Planning benefits from focused exploration"

when_to_skip:
