# Multi-task workflow: batch implement → release → PR → review cycles → reorganize → push
# Usage: /ace-assign-prepare work-on-tasks --taskrefs 148,149,150
#        /ace-assign-prepare work-on-tasks --taskrefs 148-152
#        /ace-assign-prepare work-on-tasks --taskrefs "240.*"

name: work-on-tasks
description: Work on multiple tasks with PR, review cycles, release, and clean history

parameters:
  taskrefs:
    required: true
    type: array
    description: Task references (comma-separated, range, or pattern)

steps:
  - name: onboard
    number: "000"
    skill: ace-onboard
    instructions:
      - Load project context.
      - Review task queue and priorities.

  - name: verify-test-suite
    number: "012"
    skill: ace-test-verify-suite
    instructions:
      - "Identify all packages modified across the batch of tasks."
      - "For each modified package, run: cd <package> && ace-test --profile 6"
      - "Check profile output against performance budgets: atoms <50ms, molecules <100ms, integration <1s, full package suite <30s."
      - "If any test exceeds thresholds, investigate and fix (stub I/O, mock network calls)."
      - "Then run ace-test-suite to verify no cross-package regressions."
      - "Skip if changes are documentation-only (no .rb files modified)."

  - name: verify-e2e
    number: "015"
    skill: ace-e2e-review
    instructions:
      - "Identify all packages modified across the batch of tasks."
      - "For each heavily modified package, run /ace-e2e-review <package>."
      - "Review the coverage matrix — identify gaps and stale TCs."
      - "If TCs need updating, update them before running."
      - "Run ace-test-e2e-suite <package> for each affected package (not full suite)."
      - "Skip if no public CLI API was changed across any of the batch tasks."

  - name: release-minor
    number: "020"
    skill: ace-release
    instructions:
      - Bump version (minor or patch, usually minor) and update CHANGELOGs.
      - This is the initial release for new functionality.
      - Follow semantic versioning conventions.

  - name: update-docs
    number: "025"
    skill: ace-docs-update
    instructions:
      - "Identify packages across all batch tasks where CLI commands, flags, or public contracts changed."
      - "Run /ace-docs-update-usage for each affected package."
      - "Verify updated docs with ace-docs validate."
      - "Skip if no public API/CLI changes across any of the batch tasks."

  - name: create-pr
    number: "030"
    skill: ace-git-create-pr
    instructions:
      - Create a pull request for the changes.
      - Include summary of all implemented tasks.
      - Capture the PR number for subsequent review steps.

  - name: review-valid-1
    number: "040"
    skill: ace-review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /ace-onboard skill to load project context."
      - Review the code for correctness.
      - Use preset code-valid.
      - "Focus: correctness — bugs, logic errors, missing functionality, broken contracts."

  - name: apply-valid-1
    number: "050"
    skill: ace-review-apply-feedback
    instructions:
      - Apply feedback from valid review (medium+ priority).
      - Commit changes with descriptive messages.

  - name: release-valid-1
    number: "060"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures valid review fixes.

  - name: review-fit-1
    number: "070"
    skill: ace-review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /ace-onboard skill to load project context."
      - Review the code for quality.
      - Use preset code-fit.
      - "Focus: quality — performance, architecture, standards, test coverage."

  - name: apply-fit-1
    number: "080"
    skill: ace-review-apply-feedback
    instructions:
      - Apply feedback from fit review.
      - Commit changes with descriptive messages.

  - name: release-fit-1
    number: "090"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures fit review fixes.

  - name: review-shine-1
    number: "100"
    skill: ace-review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /ace-onboard skill to load project context."
      - Review the code for polish.
      - Use preset code-shine.
      - "Focus: polish — simplification, naming, documentation (non-blocking suggestions)."

  - name: apply-shine-1
    number: "110"
    skill: ace-review-apply-feedback
    instructions:
      - Apply feedback from shine review (worthwhile improvements only).
      - Commit changes with descriptive messages.

  - name: release-shine-1
    number: "120"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures shine review fixes.

  - name: reorganize-commits
    number: "130"
    skill: ace-git-reorganize-commits
    instructions:
      - Reorganize commits into logical groups.
      - Group by concern (structure, implementation, tests, release).

  - name: push-to-remote
    number: "140"
    instructions:
      - Push all changes to the remote repository.
      - "Run: git push --force-with-lease origin HEAD"
      - Force-with-lease needed because reorganize-commits rewrites history.

  - name: update-pr-desc
    number: "150"
    skill: ace-git-update-pr-desc
    instructions:
      - Update PR description with final implementation summary.
      - Include released version numbers and key components.
      - Ensure PR is ready for human review.

expansion:
  batch-parent:
    name: batch-tasks
    number: "010"
    instructions: |
      Batch container for multiple task implementations.
      This step auto-completes when all child tasks are done.

      Tasks to implement: {{taskrefs}}

  foreach: taskrefs
  child-template:
    name: "work-on-{{item}}"
    parent: "010"
    context: fork
    skill: ace-task-work
    taskref: "{{item}}"
    instructions: |
      First: onboard yourself using /ace-onboard skill to load project context.
      Implement task {{item}}.
      When complete, mark the task as done: run `ace-task update {{item}} --set status=done --move-to archive`
