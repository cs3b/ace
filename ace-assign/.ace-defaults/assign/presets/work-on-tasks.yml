# Multi-task implementation workflow with expansion
# Usage: /ace:assign-prepare work-on-tasks --taskrefs 148,149,150
#        /ace:assign-prepare work-on-tasks --taskrefs 148-152
#        /ace:assign-prepare work-on-tasks --taskrefs "240.*"
#
# This preset uses expansion directives to generate:
# - An onboard step (000) to load context
# - A batch parent step (010) that auto-completes when children done
# - Child steps (010.01, 010.02, ...) for each task, with fork context
# - A validate-batch step (020) after all tasks complete
# - A finalize step (030) for any remaining work

name: work-on-tasks
description: Work on multiple tasks with batch validation

parameters:
  taskrefs:
    required: true
    type: array
    description: Task references (comma-separated, range, or pattern)

steps:
  - name: onboard
    number: "000"
    skill: onboard
    instructions:
      - Load project context
      - Review task queue and priorities

  - name: validate-batch
    number: "020"
    instructions:
      - Run ace-test to verify all implementations
      - Check cross-task consistency
      - Report any integration issues

  - name: finalize
    number: "030"
    instructions:
      - Summarize completed tasks
      - Note any deferred work

expansion:
  batch-parent:
    name: batch-tasks
    number: "010"
    instructions: |
      Batch container for multiple task implementations.
      This step auto-completes when all child tasks are done.

      Tasks to implement: {{taskrefs}}

  foreach: taskrefs
  child-template:
    name: "work-on-{{item}}"
    parent: "010"
    context: fork
    skill: ace:work-on-task
    instructions: "Implement task {{item}}"
