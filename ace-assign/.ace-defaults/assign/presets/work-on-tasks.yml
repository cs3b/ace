# Multi-task workflow: batch implement → release → PR → review cycles → reorganize → push
# Usage: /ace:assign-prepare work-on-tasks --taskrefs 148,149,150
#        /ace:assign-prepare work-on-tasks --taskrefs 148-152
#        /ace:assign-prepare work-on-tasks --taskrefs "240.*"

name: work-on-tasks
description: Work on multiple tasks with PR, review cycles, release, and clean history

parameters:
  taskrefs:
    required: true
    type: array
    description: Task references (comma-separated, range, or pattern)

steps:
  - name: onboard
    number: "000"
    skill: onboard
    instructions:
      - Load project context.
      - Review task queue and priorities.

  - name: release-minor
    number: "020"
    skill: ace-release
    instructions:
      - Bump version (minor or patch, usually minor) and update CHANGELOGs.
      - This is the initial release for new functionality.
      - Follow semantic versioning conventions.

  - name: create-pr
    number: "030"
    skill: ace:create-pr
    instructions:
      - Create a pull request for the changes.
      - Include summary of all implemented tasks.
      - Capture the PR number for subsequent review steps.

  - name: review-cycle-1
    number: "040"
    skill: ace:review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /onboard skill to load project context."
      - "Review the code (iteration 1 of 2)."
      - Use preset code-valid.
      - "Focus: correctness — bugs, logic errors, missing functionality, broken contracts."

  - name: apply-feedback-1
    number: "050"
    skill: ace:apply-feedback
    instructions:
      - Apply feedback from review cycle 1 (medium+ priority).
      - Commit changes with descriptive messages.

  - name: release-patch-1
    number: "060"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures review cycle 1 fixes.

  - name: review-cycle-2
    number: "070"
    skill: ace:review-pr
    context: fork
    instructions:
      - "First: onboard yourself using /onboard skill to load project context."
      - "Review the code (iteration 2 of 2)."
      - Use preset code-fit.
      - "Focus: quality — performance, architecture, standards, test coverage."

  - name: apply-feedback-2
    number: "080"
    skill: ace:apply-feedback
    instructions:
      - Apply final feedback from review cycle 2.
      - Commit changes with descriptive messages.

  - name: release-patch-2
    number: "090"
    skill: ace-release
    instructions:
      - Bump patch version and update CHANGELOGs.
      - This captures review cycle 2 fixes.

  - name: reorganize-commits
    number: "100"
    skill: ace:reorganize-commits
    instructions:
      - Reorganize commits into logical groups.
      - Group by concern (structure, implementation, tests, release).

  - name: push-to-remote
    number: "110"
    instructions:
      - Push all changes to the remote repository.
      - "Run: git push --force-with-lease origin HEAD"
      - Force-with-lease needed because reorganize-commits rewrites history.

  - name: update-pr-desc
    number: "120"
    skill: ace:update-pr-desc
    instructions:
      - Update PR description with final implementation summary.
      - Include released version numbers and key components.
      - Ensure PR is ready for human review.

expansion:
  batch-parent:
    name: batch-tasks
    number: "010"
    instructions: |
      Batch container for multiple task implementations.
      This step auto-completes when all child tasks are done.

      Tasks to implement: {{taskrefs}}

  foreach: taskrefs
  child-template:
    name: "work-on-{{item}}"
    parent: "010"
    context: fork
    skill: ace:work-on-task
    instructions: |
      First: onboard yourself using /onboard skill to load project context.
      Implement task {{item}}.
      When complete, mark the task as done: run `ace-taskflow task done {{item}}`
