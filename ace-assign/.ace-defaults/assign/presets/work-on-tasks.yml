# Work on multiple tasks with consolidated validation
# Usage: /ace:coworker-prepare work-on-tasks --taskrefs "262.02,262.03,262.04"

name: work-on-tasks
description: Execute multiple tasks in parallel with final validation

parameters:
  taskrefs:
    required: true
    type: array
    description: Task references (e.g., "262.02,262.03,262.04" or "262.02-262.10")

expansion:
  batch-parent:
    name: batch-tasks
    number: "010"
    instructions: |
      Batch container for parallel task execution.
      Auto-completes when all child tasks finish successfully.
      Working on: {{taskrefs}}

  foreach: taskrefs
  child-template:
    name: "work-on-{{item}}"
    parent: "010"
    context: fork
    skill: ace:work-on-task
    instructions:
      - run skill /onboard to get familiar with the project 
      - "Work on task {{item}} following its specification and skill instructions"

steps:
  - name: onboard
    number: "000"
    skill: onboard
    instructions:
      - Onboard yourself to the codebase.
      - Load context and understand the project structure.

  - name: validate-batch
    number: "020"
    instructions:
      - Verify all tasks completed successfully.
      - Run ace-test-suite to ensure no regressions.
      - Confirm all tasks marked done via ace-taskflow.

  - name: finalize
    number: "030"
    instructions:
      - Summarize completed work across all tasks.
      - Report any issues or manual steps required.
      - Ensure branch is clean and ready for review.
