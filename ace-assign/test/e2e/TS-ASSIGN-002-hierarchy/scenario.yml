test-id: TS-ASSIGN-002
title: "ace-assign Hierarchy and Injection Goal-Based E2E"
timeout: 900
area: assign
package: ace-assign
priority: high
tags: [deep, "use-case:assign"]
cost-tier: happy-path
tool-under-test: ace-assign

sandbox-layout:
  results/tc/01/:  "Child injection and renumbering evidence"
  results/tc/02/:  "Auto-completion cascade evidence"
  results/tc/03/:  "Hierarchy error handling evidence"
  results/tc/04/:  "Display and audit trail evidence"
  results/tc/05/:  "Fork subtree scope evidence"

e2e-justification: >
  Hierarchy operations require real assignment state with parent-child
  relationships, renumbering cascades, and audit metadata tracking. Auto-
  completion triggers state transitions across multiple levels. Subtree
  scoping resolves step addresses against real assignment structure.
  None testable with mocks.

requires:
  tools: [ace-assign]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - agent-env:
      PROJECT_ROOT_PATH: .
