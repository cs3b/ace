test-id: TS-ASSIGN-006
title: Prepare Workflow
area: assign
package: ace-assign
priority: high
requires:
  tools: [ace-assign]
  ruby: ">= 3.0"

setup:
  - env:
      PROJECT_ROOT_PATH: .
      CACHE_BASE: .cache/ace-assign
  - run: |
      mkdir -p .cache/ace-assign
      # Minimal taskflow structure so the agent can look up task context
      mkdir -p .ace-taskflow/v.0.1.0/t/001-test-task
      cat > .ace-taskflow/v.0.1.0/t/001-test-task/001-test-task.s.md <<'EOF'
      ---
      id: "001"
      title: Test Task
      status: pending
      ---
      # Test Task

      Implement a feature for testing the prepare workflow.
      EOF
