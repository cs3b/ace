test-id: TS-ASSIGN-001
title: "ace-assign Lifecycle and Fork Context Goal-Based E2E"
area: assign
package: ace-assign
priority: high
tags: [smoke, happy-path, "use-case:assign"]
cost-tier: smoke
tool-under-test: ace-assign

sandbox-layout:
  results/tc/01/:  "Workflow lifecycle evidence (create, complete steps, finish)"
  results/tc/02/:  "Fork context evidence (regular vs fork steps)"

e2e-justification: >
  These goals require the real ace-assign binary managing real assignment
  state on the filesystem. Workflow lifecycle creates directories, writes
  markdown step state, transitions queues through failure and retry, and
  validates end-to-end completion behavior. Fork context renders structured
  assignment guidance from real step files and verifies regular/fork display
  transitions. These are not reliable with mocks alone.

fast-coverage-reviewed:
  - test/fast/commands/create_command_test.rb
  - test/fast/commands/status_command_test.rb
  - test/fast/commands/finish_command_test.rb
  - test/fast/commands/fail_command_test.rb
  - test/fast/commands/retry_cmd_test.rb
  - test/fast/commands/add_command_test.rb
  - test/fast/commands/fork_run_command_test.rb
  - test/fast/commands/assignment_target_test.rb
  - test/fast/molecules/assignment_manager_test.rb
  - test/fast/molecules/fork_session_launcher_test.rb
  - test/fast/organisms/assignment_executor_test.rb

requires:
  tools: [ace-assign]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp ${ACE_E2E_SOURCE_ROOT:-$PROJECT_ROOT_PATH}/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - agent-env:
      PROJECT_ROOT_PATH: .
