# Full task workflow: implement → release → PR → review cycles → reorganize → push
# Legacy fixture source for prepare path.
# Public usage: /as-assign-create work-on-task --taskref 123

name: work-on-task
description: Work on a task with PR, review cycles, release, and clean history

parameters:
  taskref:
    required: true
    description: Task reference (e.g., 123 or 256.01)

steps:
  - name: onboard
    workflow: wfi://onboard
    taskref: "{{taskref}}"
    instructions:
      - "Load project context for task {{taskref}}."

  - name: work-on-task
    context: fork
    workflow: wfi://task/work
    instructions:
      - "Implement task {{taskref}} in the forked execution context."
      - "Keep task status aligned with implementation progress and finish by marking the task done."
      - "Preserve any public contract, docs, test, and release follow-ups required by the resulting diff."

  - name: mark-task-done
    instructions:
      - "Mark task {{taskref}} as done."
      - "Run: ace-taskflow task done {{taskref}}"

  - name: release-minor
    instructions:
      - Release all modified packages touched by this task.
      - Auto-detect modified packages from the current diff, bump version (minor or patch, usually minor), and update both package and root CHANGELOGs.
      - This is the initial release for new functionality.
      - Follow semantic versioning conventions.

  - name: create-pr
    workflow: wfi://github/pr/create
    instructions:
      - "Create a pull request for the task {{taskref}} changes."
      - "Capture the PR number for the downstream review and PR-update steps."

  - name: review-valid-1
    context: fork
    sub_steps: [review-pr, apply-feedback, release]
    instructions:
      - Execute the valid review cycle via child steps.
      - "Child review-pr: use preset code-valid."
      - "Focus: correctness — bugs, logic errors, missing functionality, broken contracts."
      - "Child apply-feedback: apply medium+ priority review findings and commit."
      - "Child release: publish patch-level updates for modified packages touched by valid-cycle fixes and update both package and root CHANGELOGs."

  - name: review-fit-1
    context: fork
    sub_steps: [review-pr, apply-feedback, release]
    instructions:
      - Execute the fit review cycle via child steps.
      - "Child review-pr: use preset code-fit."
      - "Focus: quality — performance, architecture, standards, test coverage."
      - "Child apply-feedback: apply fit-cycle findings and commit."
      - "Child release: publish patch-level updates for modified packages touched by fit-cycle fixes and update both package and root CHANGELOGs."

  - name: review-shine-1
    context: fork
    sub_steps: [review-pr, apply-feedback, release]
    instructions:
      - Execute the shine review cycle via child steps.
      - "Child review-pr: use preset code-shine."
      - "Focus: polish — simplification, naming, documentation (non-blocking suggestions)."
      - "Child apply-feedback: apply worthwhile shine-cycle findings and commit."
      - "Child release: publish patch-level updates for modified packages touched by shine-cycle fixes and update both package and root CHANGELOGs."

  - name: reorganize-commits
    workflow: wfi://git/reorganize-commits
    instructions:
      - "Reorganize commits for task {{taskref}} into logical groups."
      - "Group commits by concern where possible, such as structure, implementation, tests, docs, and release updates."

  - name: push-to-remote
    instructions:
      - Push all changes to the remote repository.
      - "Run: git push --force-with-lease origin HEAD"
      - Force-with-lease needed because reorganize-commits rewrites history.

  - name: update-pr-desc
    workflow: wfi://github/pr/update
    instructions:
      - "Update the PR description with the final summary for task {{taskref}}."
      - "Include final release/version information and the key completed components when applicable."
      - "Make sure the PR description reflects the post-review final state."
