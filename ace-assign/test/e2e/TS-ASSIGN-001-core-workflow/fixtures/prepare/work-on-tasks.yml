# Multi-task workflow: batch implement → release → PR → review cycles → reorganize → push
# Legacy fixture source for prepare path.
# Public usage: /as-assign-create work-on-tasks --taskrefs 148,149,150
#               /as-assign-create work-on-tasks --taskrefs 148-152
#               /as-assign-create work-on-tasks --taskrefs "240.*"

name: work-on-tasks
description: Work on multiple tasks with PR, review cycles, release, and clean history

parameters:
  taskrefs:
    required: true
    type: array
    description: Task references (comma-separated, range, or pattern)

steps:
  - name: onboard
    number: "000"
    skill: as-onboard
    instructions:
      - Load project context.
      - Review task queue and priorities.

  - name: release-minor
    number: "020"
    instructions:
      - Run /as-release to release all modified packages.
      - Auto-detect modified packages from the current diff, bump version (minor or patch, usually minor), and update both package and root CHANGELOGs.
      - This is the initial release for new functionality.
      - Follow semantic versioning conventions.

  - name: create-pr
    number: "030"
    skill: as-github-pr-create
    instructions:
      - Create a pull request for the changes.
      - Include summary of all implemented tasks.
      - Capture the PR number for subsequent review steps.

  - name: review-valid-1
    number: "040"
    context: fork
    sub_phases: [review-pr, apply-feedback, release]
    instructions:
      - "First: onboard yourself using /as-onboard skill to load project context."
      - Execute the valid review cycle via child phases.
      - "Child review-pr: use preset code-valid."
      - "Focus: correctness — bugs, logic errors, missing functionality, broken contracts."
      - "Child apply-feedback: apply medium+ priority review findings and commit."
      - "Child release: run /as-release to publish patch-level updates for modified packages touched by valid-cycle fixes and update both package and root CHANGELOGs."

  - name: review-fit-1
    number: "070"
    context: fork
    sub_phases: [review-pr, apply-feedback, release]
    instructions:
      - "First: onboard yourself using /as-onboard skill to load project context."
      - Execute the fit review cycle via child phases.
      - "Child review-pr: use preset code-fit."
      - "Focus: quality — performance, architecture, standards, test coverage."
      - "Child apply-feedback: apply fit-cycle findings and commit."
      - "Child release: run /as-release to publish patch-level updates for modified packages touched by fit-cycle fixes and update both package and root CHANGELOGs."

  - name: review-shine-1
    number: "100"
    context: fork
    sub_phases: [review-pr, apply-feedback, release]
    instructions:
      - "First: onboard yourself using /as-onboard skill to load project context."
      - Execute the shine review cycle via child phases.
      - "Child review-pr: use preset code-shine."
      - "Focus: polish — simplification, naming, documentation (non-blocking suggestions)."
      - "Child apply-feedback: apply worthwhile shine-cycle findings and commit."
      - "Child release: run /as-release to publish patch-level updates for modified packages touched by shine-cycle fixes and update both package and root CHANGELOGs."

  - name: reorganize-commits
    number: "130"
    skill: as-git-reorganize-commits
    instructions:
      - Reorganize commits into logical groups.
      - Group by concern (structure, implementation, tests, release).

  - name: push-to-remote
    number: "140"
    instructions:
      - Push all changes to the remote repository.
      - "Run: git push --force-with-lease origin HEAD"
      - Force-with-lease needed because reorganize-commits rewrites history.

  - name: update-pr-desc
    number: "150"
    skill: as-github-pr-update
    instructions:
      - Update PR description with final implementation summary.
      - Include released version numbers and key components.
      - Ensure PR is ready for human review.

expansion:
  batch-parent:
    name: batch-tasks
    number: "010"
    instructions: |
      Batch container for multiple task implementations.
      This step auto-completes when all child tasks are done.

      Tasks to implement: {{taskrefs}}

  foreach: taskrefs
  child-template:
    name: "work-on-{{item}}"
    parent: "010"
    context: fork
    skill: as-task-work
    taskref: "{{item}}"
    instructions: |
      First: onboard yourself using /as-onboard skill to load project context.
      Implement task {{item}}.
      When complete, mark the task as done: run `ace-taskflow task done {{item}}`
