---
# Skill Sources Protocol Configuration for ace-test-runner-e2e gem
# This enables canonical skill discovery from the installed ace-test-runner-e2e gem

name: ace-test-runner-e2e
type: gem
description: Canonical skills from ace-test-runner-e2e gem
priority: 10

# Configuration for skill discovery within the gem
config:
  # Relative path within the gem
  relative_path: handbook/skills

  # Pattern for finding canonical skill files
  pattern: "*/SKILL.md"

  # Enable discovery
  enabled: true
