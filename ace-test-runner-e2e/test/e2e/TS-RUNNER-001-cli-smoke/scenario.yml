test-id: TS-RUNNER-001
title: "ace-test-runner-e2e CLI Smoke E2E"
area: runner
package: ace-test-runner-e2e
priority: high
duration: ~10min
cost-tier: smoke
tags: [smoke, happy-path, "use-case:runner"]
tool-under-test: ace-test-e2e

sandbox-layout:
  results/tc/01/: "ace-test-e2e help output artifacts"
  results/tc/02/: "invalid package dry-run error artifacts"
  results/tc/03/: "repo-backed dry-run discovery artifacts"
  results/tc/04/: "ace-test-e2e-suite help output artifacts"

e2e-justification: >
  These checks validate real packaged executable behavior (`ace-test-e2e`,
  `ace-test-e2e-suite`) including shell entrypoint wiring, runtime argument
  parsing, and scenario discovery over real filesystem content. Unit tests
  cover internals but do not fully validate operator-visible behavior through
  installed CLI binaries in a sandboxed flow.

unit-coverage-reviewed:
  - test/commands/cli_test.rb
  - test/commands/run_test_test.rb
  - test/commands/run_suite_test.rb
  - test/commands/suite_executable_test.rb
  - test/molecules/test_discoverer_test.rb

requires:
  tools: [ace-test-e2e, ace-test-e2e-suite, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - run: git add -A && git commit -m "initial" --quiet
