test-id: TS-COMMIT-002
title: Path and Delete Handling
area: git-commit
package: ace-git-commit
priority: critical
tags: [happy-path, "use-case:commit"]
requires:
  tools: [git, ace-git-commit]
  ruby: ">= 3.0"

setup:
  - git-init
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - write-file:
      path: .gitignore
      content: |
        *.tc.md
        scenario.yml
  - run: git add .gitignore && git commit -m "Add gitignore" --quiet
  - env:
      PROJECT_ROOT_PATH: .
