test-id: TS-COMMIT-001
title: "ace-git-commit Goal-Based E2E"
area: git-commit
package: ace-git-commit
priority: high
tags: [smoke, happy-path, "use-case:commit"]
cost-tier: smoke
tool-under-test: ace-git-commit

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Basic commit artifacts (git log, git show)"
  results/tc/03/:  "Dry run and path handling evidence"
  results/tc/04/:  "Delete and rename commit evidence"
  results/tc/05/:  "Auto-split evidence (multiple commits from different scopes)"
  results/tc/06/:  "No-split override evidence (single commit across scopes)"

e2e-justification: >
  All goals require the real ace-git-commit binary executing through a shell
  with a real git repository. Commit creation, path handling, file deletion
  detection, rename tracking, and auto-split based on config scopes all
  depend on real git state. Unit tests verify message formatting; these
  tests verify the full commit pipeline end-to-end.

requires:
  tools: [git, ace-git-commit]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $ACE_E2E_SOURCE_ROOT/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - agent-env:
      PROJECT_ROOT_PATH: .
