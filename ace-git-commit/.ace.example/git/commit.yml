# Example ace-git-commit configuration
# Copy to .ace/git/commit.yml in your project and customize

git:
  # Default LLM model for commit generation
  # Uses model aliases from .ace/llm/query.yml
  model: glite  # Options: gpt4, claude, glite, or any configured model

  # Commit message conventions
  conventions:
    format: conventional  # conventional, simple, or detailed

    # Scope detection from file paths
    scopes:
      enabled: true
      detect_from_paths: true

      # Add your project-specific scopes
      custom:
        - core
        - api
        - ui
        - docs
        - test
        - config

  # LLM generation settings (optional)
  generation:
    temperature: 0.7
    max_tokens: 500

  # Author settings (optional)
  author:
    sign_commits: false