---
description: Showcase ace-git-commit with specific files and then remaining changes
tags:
- ace-git-commit
- docs
- getting-started
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
setup:
- sandbox
- git-init
- run: echo "# My Project" > README.md && echo "module App; end" > app.rb && echo "require 'app'" > config.rb
- run: git add -A && git commit -m "initial commit"
- run: echo "# My Project\n\nA sample application." > README.md && echo "module App; VERSION = '0.2.0'; end" > app.rb && echo "require 'app'\nrequire 'logger'" > config.rb
scenes:
- name: Show current changes
  commands:
  - type: git status --short
    sleep: 3s
- name: Commit specific files with intention
  commands:
  - type: clear
    sleep: 1s
  - type: ace-git-commit app.rb config.rb -i 'bump version and add logger'
    sleep: 12s
- name: Commit remaining changes
  commands:
  - type: clear
    sleep: 1s
  - type: ace-git-commit
    sleep: 12s
- name: Show result
  commands:
  - type: clear
    sleep: 1s
  - type: git log --oneline
    sleep: 3s
teardown:
- cleanup
