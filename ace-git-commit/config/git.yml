# Default configuration for ace-git-commit gem
git:
  # Default LLM model (alias from ace-llm config)
  model: glite

  # Commit message conventions
  conventions:
    format: conventional

    # Scope detection and configuration
    scopes:
      enabled: true
      detect_from_paths: true

      # Custom scopes for the project
      custom:
        - core
        - llm
        - git
        - test
        - docs
        - config

    # Type configuration
    types:
      default: feat
      aliases:
        f: feat
        b: fix
        d: docs
        s: style
        r: refactor
        p: perf
        t: test
        c: chore

  # Commit message formatting
  formatting:
    subject_max_length: 72
    body_wrap_length: 72

  # LLM generation settings
  generation:
    temperature: 0.7
    max_tokens: 500
    timeout: 60

  # Author settings (optional)
  author:
    sign_commits: false