# Configuration for ace-git-commit gem
# This file should be copied to .ace/git/commit.yml in your project
#
# Controls git commit message generation using LLMs

git:
  # Default LLM model for commit generation
  # Uses model aliases defined in .ace/llm/query.yml
  model: glite  # Options: gpt-4, claude-3, glite, or any configured model

  # Commit message conventions
  conventions:
    # Commit format style
    # Options: conventional, simple, detailed
    format: conventional

    # Scope detection and configuration
    scopes:
      # Enable automatic scope detection from file paths
      enabled: true

      # Detect scope from changed file paths
      detect_from_paths: true

      # Custom scopes for your project
      # Add your project-specific scopes here
      custom:
        - core           # Core functionality
        - llm            # LLM integration
        - git            # Git operations
        - test           # Testing
        - docs           # Documentation
        - config         # Configuration
        - ui             # User interface
        - api            # API changes
        - db             # Database
        - deps           # Dependencies

    # Commit type configuration
    types:
      # Default type when none specified
      default: feat

      # Type aliases for quick commits
      # Usage: ace-git-commit f "message" → feat: message
      aliases:
        f: feat      # New feature
        b: fix       # Bug fix
        d: docs      # Documentation only
        s: style     # Code style (formatting, etc)
        r: refactor  # Code refactoring
        p: perf      # Performance improvement
        t: test      # Adding/updating tests
        c: chore     # Maintenance tasks
        ci: ci       # CI/CD changes
        build: build # Build system changes
        revert: revert # Revert previous commit

      # Descriptions for each type (shown in help)
      descriptions:
        feat: "A new feature"
        fix: "A bug fix"
        docs: "Documentation only changes"
        style: "Changes that do not affect code meaning"
        refactor: "Code change that neither fixes a bug nor adds a feature"
        perf: "Code change that improves performance"
        test: "Adding missing tests or correcting existing tests"
        chore: "Changes to build process or auxiliary tools"
        ci: "Changes to CI configuration files and scripts"
        build: "Changes that affect the build system or dependencies"
        revert: "Reverts a previous commit"

  # Commit message formatting rules
  formatting:
    # Maximum length for commit subject line
    subject_max_length: 72

    # Wrap body text at this column
    body_wrap_length: 72

    # Require body for certain types
    require_body_for:
      - feat
      - fix
      - refactor

    # Add issue references automatically
    # Example: Closes #123, Fixes #456
    add_issue_refs: true

    # Include file stats in commit body
    include_stats: false

  # LLM generation settings
  generation:
    # Temperature for commit message generation (0.0-1.0)
    # Lower = more focused, Higher = more creative
    temperature: 0.7

    # Maximum tokens for generated message
    max_tokens: 500

    # Timeout for LLM API calls (seconds)
    timeout: 60

    # Number of retry attempts on failure
    retry_attempts: 3

    # Include diff context in prompt
    include_diff: true

    # Maximum diff lines to include
    max_diff_lines: 500

  # Git author settings
  author:
    # Sign commits with GPG
    sign_commits: false

    # Use specific GPG key (leave empty for default)
    gpg_key: ""

    # Author name override (uses git config if not set)
    name: ""

    # Author email override (uses git config if not set)
    email: ""

  # Hook configuration
  hooks:
    # Run pre-commit hooks before generating message
    run_pre_commit: true

    # Allow commit even if hooks fail
    allow_hook_bypass: false

  # Template for commit messages
  # Variables: {type}, {scope}, {subject}, {body}, {footer}
  template: |
    {type}{scope}: {subject}

    {body}

    {footer}

  # Examples for different commit types (used in prompts)
  examples:
    feat: "feat(auth): add OAuth2 login support"
    fix: "fix(api): handle null response in user endpoint"
    docs: "docs(readme): update installation instructions"
    refactor: "refactor(core): extract validation logic to separate module"
    test: "test(auth): add unit tests for login flow"