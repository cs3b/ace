name: Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run with debug logging'
        required: false
        default: false

jobs:
  test:
    name: Test ${{ matrix.package }} (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3', '3.4']
        package:
          - ace-support-core
          - ace-support-test-helpers
          - ace-test-runner
          - ace-bundle
          - ace-support-nav
          - ace-taskflow
          - ace-git-commit
          - ace-llm
          - ace-llm-providers-cli
          - ace-search
          - ace-docs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Bundle install
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Run tests for ${{ matrix.package }}
        run: |
          cd ${{ matrix.package }}
          bundle exec rake ci
        env:
          RAILS_ENV: test
          BUNDLE_PATH: ../vendor/bundle

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.package }}-ruby${{ matrix.ruby }}
          path: |
            ${{ matrix.package }}/test-reports/
            ${{ matrix.package }}/tmp/
          retention-days: 7

  # Summary job to ensure all tests passed
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Some tests failed. Check the individual job logs for details."
            exit 1
          fi
