# ace-idea default configuration
idea:
  # Root directory for ideas storage
  root_dir: .ace-ideas

  # Default status for new ideas
  default_status: pending

  # LLM model for idea enhancement
  llm_model: gemini:flash-latest

  # LLM model for doctor --auto-fix-with-agent
  doctor_agent_model: gemini:flash-latest

  # Provider-specific CLI args for doctor agent runs (e.g., Gemini uses YOLO)
  doctor_cli_args:
    gemini: "yolo"

  # Status command: default limits
  status:
    up_next_limit: 7
    recently_done_limit: 7

  # Special folder mappings (short name => actual folder name)
  special_folders:
    archive: _archive
    maybe: _maybe
    anytime: _anytime
