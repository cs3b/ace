test-id: TS-IDEA-001
title: "ace-idea Idea Lifecycle"
area: idea
package: ace-idea
priority: high
cost-tier: happy-path
tags: [happy-path, "use-case:idea"]
tool-under-test: ace-idea

sandbox-layout:
  results/tc/01/: "Idea creation artifacts"
  results/tc/02/: "Idea listing artifacts"
  results/tc/03/: "Idea move transition artifacts"

e2e-justification: >
  Idea lifecycle requires real CLI subprocess execution, real filesystem state
  (directory creation, file placement, frontmatter written to disk), and real
  path transitions across create, list (with filter flags), and move operations.
  Unit and integration tests mock filesystem state; E2E confirms the full
  CLI-to-disk pipeline.

unit-coverage-reviewed:
  - test/molecules/idea_creator_test.rb
  - test/molecules/idea_mover_test.rb
  - test/molecules/idea_scanner_test.rb
  - test/organisms/idea_manager_test.rb
  - test/commands/idea_cli_test.rb
  - test/integration/idea_integration_test.rb

requires:
  tools: [ace-idea]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
