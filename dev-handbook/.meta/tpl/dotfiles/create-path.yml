# Create Path Configuration
# This file configures template mappings and variable definitions for create-path CLI tool

templates:
  # Documentation creation templates
  docs-new:
    template: dev-handbook/templates/project-docs/README.template.md
    variables:
      title: user_input
      slug: '{metadata.slug}'
      date: 'datetime:%Y-%m-%d'
      
  # Reflection creation templates  
  reflection-new:
    template: dev-handbook/templates/release-reflections/retrospective.template.md
    variables:
      title: user_input
      session: '{metadata.session}'
      date: 'datetime:%Y-%m-%d'
      
  # Code review templates
  code-review-new:
    template: dev-handbook/templates/review-tasks/task-review-summary.template.md
    variables:
      title: user_input
      reviewer: '{metadata.reviewer}'
      date: 'datetime:%Y-%m-%d'

# Variable processors for dynamic content generation
variable_processors:
  defaults:
    priority: 'medium'
    status: 'draft'
    author: 'unknown'
    
  dynamic:
    # Date/time variables
    date: 'datetime:%Y-%m-%d'
    time: 'datetime:%H:%M:%S'
    timestamp: 'datetime:%Y%m%d-%H%M%S'
    
    # User/system variables
    user: 'whoami'
    hostname: 'hostname'

# Path resolution settings
path_resolution:
  # Base paths for different content types
  docs_base: 'docs'
  reflections_base: 'dev-taskflow/current'
  reviews_base: 'dev-taskflow/current'
  
  # Auto-create missing directories
  auto_create_dirs: true
  
  # File extension handling
  default_extension: '.md'