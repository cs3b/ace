# Code Quality Configuration
# This file overrides default linting settings

ruby:
  enabled: true
  linters:
    standardrb:
      enabled: true
      autofix: true
      # config_file: .standard.yml  # Optional: custom StandardRB config
    security:
      enabled: true
      full_scan: false
      git_history: false
    cassettes:
      enabled: true
      threshold: 51200  # 50KB in bytes

markdown:
  enabled: true
  linters:
    styleguide:
      enabled: true
      autofix: true
    link_validation:
      enabled: true
      context: 3  # Lines of context for broken links
    template_embedding:
      enabled: true
      template_dirs:
        - dev-handbook/.meta/tpl
        - templates
        - _includes
    task_metadata:
      enabled: true
      task_dirs:
        - dev-taskflow/current
        - dev-taskflow/backlog
  # Order in which markdown linters run
  order:
    - task_metadata
    - link_validation
    - template_embedding
    - styleguide

error_distribution:
  enabled: true
  max_files: 4              # Maximum error files to generate
  one_issue_per_file: true  # Distribute one issue per file for agents

# Global settings
global:
  parallel: true     # Run linters in parallel where possible
  verbose: false     # Verbose output
  fail_fast: false   # Stop on first failure