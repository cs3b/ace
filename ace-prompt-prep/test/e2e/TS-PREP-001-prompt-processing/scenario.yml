test-id: TS-PREP-001
title: "ace-prompt-prep Goal-Based E2E"
area: prep
package: ace-prompt-prep
priority: high
tags: [smoke, happy-path, "use-case:prep"]
cost-tier: smoke
mode: goal
execution-model: sequential
tool-under-test: ace-prompt-prep

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Setup workspace artifacts (directory listing, template content)"
  results/tc/03/:  "Archive workflow artifacts (archive file, symlink verification)"

e2e-justification: >
  All goals require the real ace-prompt-prep binary executing through a shell.
  Setup creates real directories and template files. Processing invokes the
  real archival pipeline with Base36 timestamp IDs via ace-b36ts. These
  filesystem side-effects and binary interactions cannot be tested with mocks.

requires:
  tools: [ace-prompt-prep, ace-b36ts]
  ruby: ">= 3.0"

setup:
  - copy-fixtures
  - write-file:
      path: .ace/prompt-prep/config.yml
      content: |
        task:
          detection: false
  - env:
      PROJECT_ROOT_PATH: .
