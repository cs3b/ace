test-id: TS-PREP-001
title: "ace-prompt-prep Goal-Based E2E"
area: prep
package: ace-prompt-prep
priority: high
tags: [smoke, happy-path, "use-case:prep"]
cost-tier: smoke
tool-under-test: ace-prompt-prep

sandbox-layout:
  results/tc/01/:  "Archive workflow artifacts (archive file, symlink verification)"
  results/tc/02/:  "Context-mode processing artifacts (bundle output and archive evidence)"

e2e-justification: >
  This suite retains only workflow-value checks that require the real
  ace-prompt-prep binary in a sandbox. Processing with archive lifecycle and
  context-enabled processing via --bundle validate shell execution, filesystem
  side effects, and integration behavior that deterministic fast/feat tests
  cannot fully replace.

requires:
  tools: [ace-prompt-prep, ace-b36ts]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - write-file:
      path: .ace/prompt-prep/config.yml
      content: |
        task:
          detection: false
  - agent-env:
      PROJECT_ROOT_PATH: .
