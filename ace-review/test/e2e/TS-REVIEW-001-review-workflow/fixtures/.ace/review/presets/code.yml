description: "Base code review configuration"
reviewers:
  - name: base
    model: gpro
    prompt:
      base: "prompt://base/system"
      sections:
        review_focus:
          title: "Files Under Review"
          description: "Files and changes to focus on"
          files:
            - "prompt://focus/scope/tests"
            - "prompt://focus/languages/ruby"
        format_guidelines:
          title: "Format Guidelines"
          description: "Structure and formatting expectations"
          files:
            - "prompt://format/detailed"
