test-id: TS-REVIEW-001
title: "ace-review execution workflows"
area: review
package: ace-review
priority: high
tags: [deep, "use-case:review"]
cost-tier: deep
tool-under-test: ace-review

sandbox-layout:
  results/tc/01/: "Single-model execution artifacts"
  results/tc/02/: "Multi-model and reviewer-format execution artifacts"

e2e-justification: >
  These remaining goals require real ace-review CLI execution with live provider
  calls, session persistence, and multi-model/reviewer orchestration behavior that
  deterministic fast/feat tests cannot fully substitute.

unit-coverage-reviewed:
  - test/fast/commands/feedback/list_test.rb
  - test/fast/commands/feedback/show_test.rb
  - test/fast/commands/feedback/create_test.rb
  - test/fast/commands/feedback/verify_test.rb
  - test/fast/commands/feedback/resolve_test.rb
  - test/fast/commands/feedback/skip_test.rb
  - test/fast/molecules/preset_manager_test.rb
  - test/fast/molecules/context_extractor_test.rb
  - test/fast/molecules/context_composer_test.rb
  - test/fast/molecules/subject_extractor_test.rb
  - test/fast/molecules/subject_strategy_test.rb
  - test/fast/molecules/pr_task_spec_resolver_test.rb
  - test/fast/organisms/review_manager_test.rb
  - test/feat/adaptive_strategy_integration_test.rb
  - test/feat/performance_regression_test.rb

requires:
  tools: [ace-review, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp ${ACE_E2E_SOURCE_ROOT:-$PROJECT_ROOT_PATH}/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - run: |
      echo "# Updated" >> README.md
      git add README.md && git commit -m "Update readme" --quiet
  - agent-env:
      PROJECT_ROOT_PATH: .
