test-id: TS-REVIEW-001
title: "ace-review Goal-Based E2E"
area: review
package: ace-review
priority: high
tags: [smoke, happy-path, deep, "use-case:review"]
cost-tier: happy-path
tool-under-test: ace-review

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Preset discovery and listing evidence"
  results/tc/03/:  "Multi-level composition and inheritance evidence"
  results/tc/04/:  "Subject processing evidence (diff, files, mixed)"
  results/tc/05/:  "Error handling evidence (circular, missing, invalid)"
  results/tc/06/:  "Single model execution evidence (real API)"
  results/tc/07/:  "Multi-model and reviewers format evidence"

e2e-justification: >
  All goals require the real ace-review binary. Preset discovery depends on
  filesystem preset files. Composition resolves multi-level inheritance chains.
  Subject processing requires real git diffs and file patterns. Execution goals
  make real API calls to verify the full review pipeline. None testable with mocks.

requires:
  tools: [ace-review, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $ACE_E2E_SOURCE_ROOT/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - run: |
      echo "# Updated" >> README.md
      git add README.md && git commit -m "Update readme" --quiet
  - agent-env:
      PROJECT_ROOT_PATH: .
