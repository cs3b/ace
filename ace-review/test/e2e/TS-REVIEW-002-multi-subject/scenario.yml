test-id: TS-REVIEW-002
title: Multi-Subject Merging and Type Detection
area: review
package: ace-review
priority: high
tags: [happy-path, "use-case:review"]
requires:
  tools: [ace-review, git]
  ruby: ">= 3.0"

setup:
  - git-init
  - copy-fixtures
  - run: git add . && git commit -m "Initial commit" --quiet
  - run: |
      cat >> lib/example.rb << 'EOF'

        def goodbye
          "Goodbye!"
        end
      EOF
      cat >> README.md << 'EOF'

      ## Features
      - Example feature
      EOF
      git add . && git commit -m "Add features" --quiet
  - run: |
      cat > lib/helper.rb << 'EOF'
      # frozen_string_literal: true

      module Helper
        def assist
          "Helping!"
        end
      end
      EOF
      git add . && git commit -m "Add helper" --quiet
  - env:
      PROJECT_ROOT_PATH: "."
