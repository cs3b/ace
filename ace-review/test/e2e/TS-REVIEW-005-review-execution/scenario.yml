test-id: TS-REVIEW-005
title: Review Execution with Real API Calls
area: review
package: ace-review
priority: high
tags: [deep, "use-case:review"]
requires:
  tools: [ace-review, git]
  ruby: ">= 3.0"
  env: [GOOGLE_API_KEY]

setup:
  - git-init
  - copy-fixtures
  - run: git add . && git commit -m "Initial commit" --quiet
  - run: |
      cat >> calculator.rb << 'EOF'

        def multiply(a, b)
          a * b
        end
      EOF
      git add calculator.rb && git commit -m "Add multiply method" --quiet
  - env:
      PROJECT_ROOT_PATH: "."
