# Ruby ATOM architecture review preset
# Combines Ruby language best practices with ATOM architecture patterns

description: "Ruby code review with ATOM architecture focus"

instructions:
  base: "prompt://base/system"
  bundle:
    sections:
      format:
        title: "Format Guidelines"
        description: "Detailed output formatting and structure guidelines"
        files:
          - "prompt://format/detailed"
      ruby_atom_focus:
        title: "Ruby ATOM Architecture Focus"
        description: "Ruby best practices combined with ATOM architecture patterns"
        files:
          - "prompt://focus/architecture/atom"
          - "prompt://focus/languages/ruby"
      guidelines:
        title: "Communication Guidelines"
        description: "Professional communication style and visual indicators"
        files:
          - "prompt://guidelines/tone"
          - "prompt://guidelines/icons"
      architecture_context:
        title: "Architecture Context"
        description: "Architecture documentation and project information"
        files:
          - "docs/architecture.md"
          - "README.md"

bundle:
  presets:
    - "project"

subject:
  bundle:
    sections:
      ruby_changes:
        title: "Ruby Code Changes"
        description: "Recent Ruby code changes for ATOM architecture review"
        diffs:
          - "HEAD~1..HEAD"
      ruby_files:
        title: "Ruby Source Files"
        description: "Ruby source files for additional context"
        files:
          - "**/*.rb"
          - "lib/**/*.rb"

model: "codex:codex"
