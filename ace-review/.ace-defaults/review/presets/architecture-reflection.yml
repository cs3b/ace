# Architecture reflection preset for pre-PR self-assessment
# Used by the reflect-and-refactor phase to analyze implementation quality

description: "Pre-PR architecture reflection — ATOM compliance, over-engineering, missing abstractions"

instructions:
  base: "prompt://base/system"
  bundle:
    sections:
      format:
        title: "Format Guidelines"
        description: "Detailed output formatting and structure guidelines"
        files:
          - "prompt://format/detailed"
      reflection_focus:
        title: "Architecture Reflection Focus"
        description: "Self-assessment for over-engineering, missing abstractions, ATOM compliance"
        files:
          - "prompt://focus/architecture/reflection"
      atom_focus:
        title: "ATOM Architecture Focus"
        description: "ATOM architecture compliance patterns"
        files:
          - "prompt://focus/architecture/atom"
      ruby_focus:
        title: "Ruby Language Focus"
        description: "Ruby-specific idioms and conventions"
        files:
          - "prompt://focus/languages/ruby"
      communication:
        title: "Communication Style"
        description: "Professional communication guidelines"
        files:
          - "prompt://guidelines/tone"
      visual_indicators:
        title: "Visual Indicators"
        description: "Icons and visual markers for quick scanning"
        files:
          - "prompt://guidelines/icons"
      project_context:
        title: "Project Context"
        description: "Project information and background"
        presets:
          - "project"

bundle: "project"

subject:
  bundle:
    sections:
      code_changes:
        title: "Implementation Changes"
        description: "All code changes since assignment start for architecture review"
        diffs:
          - "origin/main..HEAD"
      ruby_files:
        title: "Ruby Source Files"
        description: "Ruby source files for additional context"
        files:
          - "lib/**/*.rb"

model: "codex:codex"
