# Pull request review - comprehensive code changes review

description: "Pull request review - comprehensive code changes review"

instructions:
  base: "prompt://base/system"
  bundle:
    sections:
      format:
        title: "Format Guidelines"
        description: "Output formatting and structure guidelines"
        files:
          - "prompt://format/standard"
      guidelines:
        title: "Review Guidelines"
        description: "Communication style and visual indicators"
        files:
          - "prompt://guidelines/tone"
          - "prompt://guidelines/icons"
      project_context:
        title: "Project Context"
        description: "Project information and background"
        presets:
          - "project"

bundle: "project"

subject:
  bundle:
    sections:
      code_changes:
        title: "Code Changes"
        description: "Code changes to review from pull request"
        diffs:
          - "origin/main...HEAD"
