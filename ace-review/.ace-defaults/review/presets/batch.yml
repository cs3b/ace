# Batch task review - consolidated review of multiple task implementations
#
# Use this preset when reviewing changes from multiple tasks worked on
# in a batch workflow (ace-assign work-on-tasks).
#
# Focus areas:
# - Cross-task consistency
# - Integration between task implementations
# - Overall code quality across the batch

description: "Batch task review - consolidated review of multiple task changes"

instructions:
  base: "prompt://base/system"
  bundle:
    sections:
      review_focus:
        title: "Batch Review Focus"
        description: "Focus areas for reviewing batch task implementations"
        files:
          - "prompt://focus/scope/tests"
          - "prompt://focus/scope/docs"
          - "prompt://focus/quality/consistency"
          - "prompt://focus/quality/integration"

      format:
        title: "Format Guidelines"
        description: "Output formatting and structure guidelines"
        files:
          - "prompt://format/standard"

      guidelines:
        title: "Review Guidelines"
        description: "Communication style and visual indicators"
        files:
          - "prompt://guidelines/tone"
          - "prompt://guidelines/icons"

      project_context:
        title: "Project Context"
        description: "Project information and background"
        presets:
          - "project"

bundle: "project"

subject:
  bundle:
    sections:
      batch_changes:
        title: "Batch Changes"
        description: "All code changes from batch task implementations"
        diffs:
          - "origin/main...HEAD"

      review_criteria:
        title: "Batch Review Criteria"
        description: "Criteria for evaluating batch task implementations"
        content: |
          ## Cross-Task Consistency
          - Naming conventions consistent across all changes
          - Similar patterns used for similar problems
          - Code style uniform throughout

          ## Integration Quality
          - Changes work together without conflicts
          - Shared code properly factored
          - No duplicate implementations

          ## Test Coverage
          - All new functionality has tests
          - Tests follow project patterns
          - No test gaps in coverage

          ## Documentation
          - Changes documented as needed
          - README/docs updated if public API changed
