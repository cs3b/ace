---
description: Showcase ace-review presets, diff review, PR review, and feedback
tags:
- ace-review
- docs
- getting-started
settings:
  font_size: 12
  width: 960
  height: 540
  format: gif
  env:
    PROJECT_ROOT_PATH: /home/mc/ace-t.5nx
scenes:
- name: Switch to project root
  commands:
  - type: cd $PROJECT_ROOT_PATH && clear
    sleep: 1s
- name: List available presets
  commands:
  - type: ace-review --list-presets
    sleep: 3s
- name: Review branch diff with preset
  commands:
  - type: ace-review --preset code-fit --subject diff:origin/main..HEAD --dry-run
    sleep: 3s
- name: Run a review
  commands:
  - type: ace-review --preset code-fit --subject "files:ace-retro/**/*.rb"
    sleep: 10s
teardown:
- cleanup
