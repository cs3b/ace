# Code quality review - architecture and conventions

description: "Code quality review - architecture and conventions"

instructions:
  base: "prompt://base/system"
  context:
    sections:
      format:
        title: "Format Guidelines"
        description: "Output formatting and structure guidelines"
        files:
          - "prompt://format/detailed"
      focus:
        title: "Review Focus Areas"
        description: "Architecture and code quality focus"
        files:
          - "prompt://focus/architecture/atom"
      guidelines:
        title: "Review Guidelines"
        description: "Communication style and visual indicators"
        files:
          - "prompt://guidelines/tone"
          - "prompt://guidelines/icons"
      project_context:
        title: "Project Context"
        description: "Project information and background"
        presets:
          - "project"

context: "project"

subject:
  context:
    sections:
      code_changes:
        title: "Recent Code Changes"
        description: "Code changes from recent commits for review"
        diffs:
          - "HEAD~3..HEAD"
