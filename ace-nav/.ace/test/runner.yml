# ACE Test Runner Configuration for ace-nav
# Uses standard flat ATOM structure

version: 1

# Test file patterns - standard structure
patterns:
  atoms: "test/atoms/**/*_test.rb"
  molecules: "test/molecules/**/*_test.rb"
  models: "test/models/**/*_test.rb"
  integration: "test/integration/**/*_test.rb"
  cli: "test/cli_test.rb"
  nav: "test/nav_test.rb"

# Test groups
groups:
  unit:
    - atoms
    - molecules
    - models
    - cli
    - nav
  all:
    - unit
    - integration
  quick:
    - atoms
    - molecules
