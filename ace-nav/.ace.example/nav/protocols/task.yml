# Protocol definition for task navigation
protocol: task
name: "Tasks"
description: "Project tasks and work items"
enabled: true

# Task-specific configuration
type: "special"  # Not handbook-based, uses custom resolver

# Paths to search for task files
search_paths:
  - dev-taskflow/current/*/tasks
  - dev-taskflow/backlog
  - dev-taskflow/done/*/tasks

# File handling
extensions:
  - .md

# Autocorrection settings
autocorrect:
  enabled: true
  pad_zeros: true  # Convert 18 to 018

# Pattern matching
patterns:
  task_id: 'v\.\d+\.\d+\.\d+\+task\.\d+'
  task_number: 'task\.\d+'

# Display preferences
display:
  show_status: true
  show_priority: true
  show_estimate: true

# Protocol capabilities
capabilities:
  searchable: true
  supports_glob: true
  supports_create: false  # Tasks have special creation workflow
  supports_content: true
  supports_list: true
  supports_tree: false  # Tasks use flat list display