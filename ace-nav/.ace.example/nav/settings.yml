# Main ace-nav configuration
# Copy this file to .ace/nav/settings.yml and customize for your project

# Cache configuration for performance
cache:
  enabled: true
  directory: ".cache/ace-nav"
  ttl: 3600  # Cache time-to-live in seconds (1 hour)

# Fuzzy matching configuration
fuzzy:
  enabled: true
  threshold: 0.6  # Similarity threshold (0.0 to 1.0)

# Output preferences
output:
  color: true
  verbose: false

# Protocol discovery configuration
protocols:
  # Auto-discover protocols from ace-* gems' .ace.example/protocols/
  discover_gems: true

  # Additional protocol discovery paths (optional)
  # Default paths are automatically searched:
  # - .ace/protocols/        (project - highest priority)
  # - ~/.ace/protocols/      (user)
  # - gem/.ace.example/protocols/  (from installed gems)
  paths: []