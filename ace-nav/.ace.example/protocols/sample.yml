# Protocol definition for sample files
protocol: sample
name: "Samples"
description: "Example files and configurations"
enabled: true


# File extensions to match
extensions: []  # Any file type

# Categories for organizing samples
categories:
  - configuration
  - templates
  - code
  - documentation
  - scripts

# File naming patterns
naming:
  pattern: "%{name}.sample%{ext}"
  preserve_extension: true

# Exclusions
exclude:
  - "*.pyc"
  - "*.class"
  - ".DS_Store"
  - "thumbs.db"

# Protocol capabilities
capabilities:
  searchable: true
  supports_glob: true
  supports_create: true
  supports_content: true
  supports_list: true
  supports_tree: true