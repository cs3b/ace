# Tree filtering configuration for nav-tree command
# This file controls what gets displayed when using the nav-tree command

# Default maximum depth for tree display
default_depth: 3

# Global exclusion patterns - these are always excluded
global_excludes:
  - ".git"
  - "node_modules"
  - "coverage"
  - "tmp"
  - ".DS_Store"
  - "*.log"

# Context-specific filters
contexts:
  # Default context when no specific context is requested
  default:
    excludes:
      - "dev-taskflow/backlog"
      - "dev-taskflow/done"
      - "dev-taskflow/sessions"
      - "dev-handbook/templates"
      - "dev-tools/sig"
      - "dev-tools/coverage"
    includes: []
    max_depth: 3

  # Development context - show more detail for active development
  dev:
    excludes:
      - "dev-taskflow/backlog"
      - "dev-taskflow/done"
      - "dev-handbook/templates"
    includes:
      - "dev-tools/lib"
      - "dev-tools/spec"
      - "dev-taskflow/current"
    max_depth: 4

  # Task context - focus on current tasks and workflow
  tasks:
    excludes:
      - "dev-handbook"
      - "dev-tools/coverage"
      - "dev-tools/sig"
    includes:
      - "dev-taskflow/current"
      - "bin"
    max_depth: 3

  # Full context - minimal filtering for comprehensive view
  full:
    excludes: []
    includes: []
    max_depth: 5

# Path autocorrection settings
autocorrect:
  enabled: true
  # Minimum similarity threshold for suggesting corrections (0.0 to 1.0)
  similarity_threshold: 0.6
  # Maximum number of suggestions to show
  max_suggestions: 5
  # Whether to use fuzzy matching with fzf when available
  use_fzf: true

# Repository scanning configuration
repositories:
  # Order for scanning across the 4 repositories
  scan_order:
    - "."              # tools-meta (root)
    - "dev-tools"      # Primary development focus
    - "dev-taskflow"   # Task management
    - "dev-handbook"   # Documentation and guides
  
  # Repository-specific exclusions
  specific_excludes:
    ".":
      - "package-lock.json"
      - "package.json"
    "dev-tools":
      - "Gemfile.lock"
      - "exe-old"
    "dev-taskflow":
      - "backlog"
      - "done"
    "dev-handbook":
      - "templates"