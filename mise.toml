# mise configuration for ace monorepo
# This file configures the development environment for the ace project

[vars]
_.file = ["~/.ace/.env"]

[env]
# Add project script directories to PATH for executable commands
PROJECT_ROOT_PATH = "{{ config_root }}"
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"
_.path = ["./.ace-bin", "./bin"]

## exposed api keys:
ZAI_API_KEY = { value = "{{vars.ZAI_API_KEY}}", redact = true }
OPENROUTER_API_KEY = { value = "{{vars.OPENROUTER_API_KEY}}", redact = true }
GEM_HOST_API_KEY = { value = "{{vars.GEM_HOST_API_KEY}}", redact = true }

[tools]
bun = "1.3.8"
node = "latest"
ruby = "3.4.8"
