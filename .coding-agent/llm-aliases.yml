# LLM aliases configuration for project
# This file defines shortcuts for commonly used language models
# You can customize these aliases for your project needs

# Global aliases - shortcuts that work from any provider
global:
  # Google Gemini shortcuts
  gpro: "google:gemini-2.5-pro"
  gflash: "google:gemini-2.5-flash"
  gfast: "google:gemini-2.0-flash-lite"
  
  # Claude shortcuts (via Claude Code CLI)
  opus: "cc:opus"
  sonnet: "cc:sonnet"
  haiku: "cc:haiku"
  
  # OpenAI shortcuts
  gpt4: "openai:gpt-4o"
  gpt4mini: "openai:gpt-4o-mini"

# Provider-specific aliases - shortcuts within a provider namespace
providers:
  # Claude Code provider aliases
  cc:
    opus: "opus"      # Maps to actual model in ClaudeCodeClient
    sonnet: "sonnet"
    haiku: "haiku"
  
  # Google provider aliases  
  google:
    pro: "gemini-2.5-pro"
    flash: "gemini-2.5-flash"
    lite: "gemini-2.0-flash-lite"
  
  # OpenAI provider aliases
  openai:
    gpt4: "gpt-4o"
    mini: "gpt-4o-mini"