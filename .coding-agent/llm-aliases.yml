# LLM aliases configuration for project
# This file defines shortcuts for commonly used language models
# You can customize these aliases for your project needs

# Global aliases - shortcuts that work from any provider
global:
  # Google Gemini shortcuts
  gpro: "google:gemini-2.5-pro"
  gflash: "google:gemini-2.5-flash"
  gfast: "google:gemini-2.5-flash-lite"
  
  # Claude shortcuts (via Claude Code CLI)
  opus: "cc:opus"
  sonnet: "cc:sonnet"
  haiku: "cc:haiku"
  
  # OpenAI shortcuts (GPT-5 family only)
  gpt5: "openai:gpt-5"
  gpt5mini: "openai:gpt-5-mini"
  gpt5nano: "openai:gpt-5-nano"
  
  # Codex shortcuts (via Codex CLI)
  codex: "codex:o3-mini"
  o3: "codex:o3"
  o3mini: "codex:o3-mini"
  
  # OpenCode shortcuts (via OpenCode CLI)
  opencode: "oc:google/gemini-2.5-flash"
  ocgflash: "oc:google/gemini-2.5-flash"
  ocgpro: "oc:google/gemini-1.5-pro"
  ocsonnet: "oc:anthropic/claude-3-5-sonnet"
  ochaiku: "oc:anthropic/claude-3-5-haiku"
  ocgpt4: "oc:openai/gpt-4o"

# Provider-specific aliases - shortcuts within a provider namespace
providers:
  # Claude Code provider aliases
  cc:
    opus: "opus"      # Maps to actual model in ClaudeCodeClient
    sonnet: "sonnet"
    haiku: "haiku"
  
  # Google provider aliases  
  google:
    pro: "gemini-2.5-pro"
    flash: "gemini-2.5-flash"
    lite: "gemini-2.5-flash-lite"
  
  # OpenAI provider aliases (GPT-5 family)
  openai:
    gpt5: "gpt-5"
    mini: "gpt-5-mini"
    nano: "gpt-5-nano"
  
  # Codex provider aliases
  codex:
    o3: "o3"
    mini: "o3-mini"
    default: "o3-mini"
  
  # Codex OSS provider aliases  
  codexoss:
    llama: "llama3"
    mistral: "mistral"
    codellama: "codellama"
  
  # OpenCode provider aliases
  oc:
    # Google models
    gflash: "google/gemini-2.5-flash"
    gpro: "google/gemini-1.5-pro"
    g2flash: "google/gemini-2.0-flash-experimental"
    
    # Anthropic models
    sonnet: "anthropic/claude-3-5-sonnet"
    haiku: "anthropic/claude-3-5-haiku" 
    
    # OpenAI models
    gpt4: "openai/gpt-4o"
    gpt4mini: "openai/gpt-4o-mini"
    
    # Default
    default: "google/gemini-2.5-flash"