test-id: TS-SIM-001
title: "ace-sim validate-idea smoke"
area: sim
package: ace-sim
timeout: 900
priority: high
tags: [smoke, happy-path, "use-case:simulation"]
cost-tier: smoke
tool-under-test: ace-sim

sandbox-layout:
  results/tc/01/: "Help survey observations"
  results/tc/02/: "Default preset behavioral run evidence"
  results/tc/03/: "Explicit CLI override + one-step synthesis evidence"
  results/tc/04/: "Full-chain synthesis evidence with dual final artifacts"
  results/tc/05/: "Validate-task preset run contract evidence"
  results/tc/06/: "Validation guard failure-path evidence"

e2e-justification: >
  This scenario validates end-to-end CLI execution and file-chained artifact
  contracts for preset-driven simulation. Unit tests cover internals; this
  verifies real binary behavior.

requires:
  tools: [ace-sim, ace-llm, ace-bundle]

setup:
  - copy-fixtures
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - agent-env:
      PROJECT_ROOT_PATH: .
