test-id: TS-HANDBOOK-001
title: "ace-handbook CLI smoke"
area: handbook
package: ace-handbook
priority: high
tags: [smoke, happy-path, "use-case:handbook-cli"]
cost-tier: smoke
tool-under-test: ace-handbook

sandbox-layout:
  results/tc/01/: "CLI help surface evidence"
  results/tc/02/: "Status table output evidence"
  results/tc/03/: "Status JSON output evidence"

e2e-justification: >
  These checks validate executable wiring, command routing, and user-visible
  output/exit semantics through real CLI invocation. Unit tests cover command
  internals and renderers but do not fully validate packaged binary behavior in
  an end-to-end shell context.

unit-coverage-reviewed:
  - test/cli/commands/status_test.rb
  - test/organisms/status_collector_test.rb
  - test/organisms/provider_syncer_test.rb
  - test/organisms/skill_inventory_test.rb

requires:
  tools: [ace-handbook]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
  - agent-env:
      PROJECT_ROOT_PATH: .
