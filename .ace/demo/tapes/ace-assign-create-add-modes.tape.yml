---
description: Showcase ace-assign create and add modes with a temporary git worktree
tags:
- ace-assign
- demo
- create
- add
settings:
  font_size: 16
  width: 960
  height: 540
  format: gif
scenes:
- name: Create a temporary demo worktree
  commands:
  - type: export DEMO_TREE=$(mktemp -d /tmp/ace-assign-demo-XXXXXX) && git worktree add "$DEMO_TREE" HEAD && cd "$DEMO_TREE"
    sleep: 3s
  - type: mkdir -p .ace .ace-local/demo/tasks
    sleep: 1s
  - type: >-
      printf 'task:\n  root_dir: .ace-local/demo/tasks\n  default_status: pending\n' > .ace/task/config.yml
    sleep: 2s
- name: Create a sandbox task for task-based demos
  commands:
  - type: ace-task create "Demo task for ace-assign modes" --status pending --tags demo
    sleep: 3s
  - type: export DEMO_TASK_REF=$(ruby -e 'dir = Dir.glob(".ace-local/demo/tasks/*").find { |path| File.directory?(path) } or abort("No demo task found"); puts File.basename(dir).sub(/-.*/, "")')
    sleep: 1s
  - type: printf 'DEMO_TASK_REF=%s\n' "$DEMO_TASK_REF"
    sleep: 3s
- name: Create an assignment from YAML
  commands:
  - type: ace-assign create --yaml .ace/demo/fixtures/assign/create-job.yml
    sleep: 3s
- name: Add steps with all supported insertion modes
  commands:
  - type: ace-assign add --step update-docs --after 010
    sleep: 3s
  - type: ace-assign status
    sleep: 3s
  - type: ace-assign add --yaml .ace/demo/fixtures/assign/add-steps.yml --after 010 --child
    sleep: 3s
  - type: ace-assign status
    sleep: 3s
  - type: ace-assign add --task "$DEMO_TASK_REF" --after 010 --child
    sleep: 3s
  - type: ace-assign status
    sleep: 3s
- name: Create an assignment from task refs
  commands:
  - type: ace-assign create --task "$DEMO_TASK_REF" --preset work-on-task
    sleep: 3s
- name: Remove the temporary demo worktree
  commands:
  - type: cd /home/mc/ace-t.2p4 && git worktree remove "$DEMO_TREE" --force
    sleep: 2s
