name: google
last_synced: 2025-12-21
class: Ace::LLM::Organisms::GoogleClient
gem: ace-llm
models:
  - gemini-2.5-flash
  - gemini-2.5-flash-lite
  - gemini-2.5-pro
  - gemini-3-flash-preview
  - gemini-3-pro-preview
  - gemini-flash-latest
  - gemini-flash-lite-latest
aliases:
  global:
    gflash: google:flash
    gpro: google:pro
    glite: google:lite
  model:
    flash: gemini-flash-latest
    lite: gemini-flash-latest
    pro: gemini-2.5-pro
    pro-preview: gemini-3-pro-preview
api_key:
  env: GEMINI_API_KEY
  required: true
  description: Google AI Studio API key
capabilities:
  - text_generation
  - streaming
  - function_calling
  - vision
default_options:
  temperature: 0.7
  max_tokens: 8192
