name: codexoai
class: Ace::LLM::Providers::CLI::CodexOaiClient
gem: ace-llm-providers-cli
context_limit: 128000
backends:
  zai:
    name: "Z.ai GLM"
    base_url: "https://api.z.ai/api/coding/paas/v4"
    env_key: "ZAI_API_KEY"
    models: [glm-5, glm-4.7, glm-4.6]
models:
  - zai/glm-5
  - zai/glm-4.7
  - zai/glm-4.6
aliases:
  global:
    codex-oai: codexoai:zai/glm-5
  model:
    glm: zai/glm-5
    glm47: zai/glm-4.7
capabilities:
  - text_generation
  - code_generation
  - multi_provider
default_options:
  temperature: 0.7
