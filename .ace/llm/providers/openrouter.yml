name: openrouter
last_synced: 2025-12-21
class: Ace::LLM::Organisms::OpenRouterClient
gem: ace-llm
context_limit: 128000
models:
  # Fast inference (:nitro = throughput priority → Groq/Cerebras)
  - openai/gpt-oss-120b:nitro
  - openai/gpt-oss-20b:nitro
  - moonshotai/kimi-k2-0905:nitro
  - qwen/qwen3-max
  # DeepSeek (exclusive to OpenRouter)
  - deepseek/deepseek-v3.2
  # Kimi/Moonshot
  - moonshotai/kimi-k2-thinking
  # Qwen
  - qwen/qwen3-coder
  # Others
  - z-ai/glm-4.6
  - minimax/minimax-m1
  - google/gemini-3-flash-preview
  - minimax/minimax-m2.1
  - openai/gpt-5.2
  - openai/gpt-5.2-chat-latest
  - openai/gpt-5.2-pro
aliases:
  model:
    # Fast inference (nitro = throughput)
    oss-nitro: openai/gpt-oss-120b:nitro
    oss-small-nitro: openai/gpt-oss-20b:nitro
    kimi-nitro: moonshotai/kimi-k2-0905:nitro
    qwen3: qwen/qwen3-max
    # Kimi
    kimi: moonshotai/kimi-k2-0905
    kimi-think: moonshotai/kimi-k2-thinking
    # DeepSeek
    deepseek: deepseek/deepseek-v3.2
    # Qwen
    qwen-coder: qwen/qwen3-coder
    # Others
    glm: z-ai/glm-4.6
    minimax: minimax/minimax-m2.1
api_key:
  env: OPENROUTER_API_KEY
  required: true
  description: OpenRouter API key
capabilities:
  - text_generation
default_options:
  temperature: 0.7
  max_tokens: 16384
