name: pi
class: Ace::LLM::Providers::CLI::PiClient
gem: ace-llm-providers-cli
models:
  # ZAI (default provider)
  - zai/glm-4.7
  - zai/glm-4.6
  - zai/glm-4.5
  - zai/glm-5
  - zai/glm-5-turbo 
  # Anthropic
  - anthropic/claude-opus-4-6
  - anthropic/claude-opus-4-5
  - anthropic/claude-sonnet-4-5
  - anthropic/claude-sonnet-4-0
  - anthropic/claude-haiku-4-5
  # Google Gemini
  - google-gemini-cli/gemini-3-pro-preview
  - google-gemini-cli/gemini-3-flash-preview
  - google-gemini-cli/gemini-2.5-pro
  - google-gemini-cli/gemini-2.5-flash
  # OpenAI Codex
  - openai-codex/gpt-5.3-codex
  - openai-codex/gpt-5.2-codex
  - openai-codex/gpt-5.2
  - openai-codex/gpt-5.1
aliases:
  global:
    pi: pi:zai/glm-4.7
  model:
    glm: zai/glm-5
    glmturbo: zai/glm-5-turbo
    glm47: zai/glm-4.7
    opus: anthropic/claude-opus-4-6
    sonnet: anthropic/claude-sonnet-4-5
    haiku: anthropic/claude-haiku-4-5
    gemini-pro: google-gemini-cli/gemini-2.5-pro
    gemini: google-gemini-cli/gemini-2.5-flash
    gpt: openai-codex/gpt-5.2
capabilities:
  - text_generation
  - streaming
  - function_calling
  - vision
  - multi_provider
  - skill_rewriting
default_options:
  temperature: 0.7
  skills_dir: .claude/skills
