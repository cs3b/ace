llm:
  providers:
    active:
      - opencode
      - pi
      - codex
      - gemini
      - claude
      - openrouter
      - zai
      - google
  roles:
    doctor:
      - gemini:flash-latest@yolo
      - claude:haiku:low@yolo
      - codex:mini:low@yolo
    planner:
      - codex:gpt:high@ro
      - claude:opus:high@ro
      - gemini:pro-latest@ro
    review-default:
      - codex:codex:medium@ro
      - claude:sonnet:medium@ro
      - gemini:pro-latest@ro
    review-synthesizer:
      - codex:gpt:low@ro
      - claude:sonnet:medium@ro
      - gemini:flash-latest@ro
    review-claude:
      - claude:opus:high@ro
    review-codex:
      - codex:gpt:high@ro
    review-gemini:
      - gemini:pro-latest@ro
    assign-executor:
      - codex:codex:medium@yolo
      - claude:sonnet:medium@yolo
      - gemini:flash-latest@yolo
    assign-engineer:
      - codex:codex:medium@yolo
      - claude:sonnet:medium@yolo
      - gemini:flash-latest@yolo
    assign-orchestrator:
      - claude:opus:medium@yolo
      - codex:gpt:medium@yolo
      - gemini:pro-latest@yolo
    e2e-executor:
      - claude:haiku:low@yolo
      - codex:mini:low@yolo
      - gemini:flash-latest@yolo
    e2e-reporter:
      - claude:haiku:low@ro
      - codex:mini:low@ro
      - gemini:flash-latest@ro
    prompt-enhance:
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    commit:
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    docs-analysis:
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    idea-enhance:
      - gemini:flash-latest@ro
      - codex:mini@ro
      - claude:haiku@ro
    compressor:
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    sim-primary:
      - gemini:flash-latest@ro
      - claude:haiku@ro
      - codex:mini@ro
    sim-synthesis:
      - claude:opus:medium
      - codex:gpt:medium
      - gemini:pro-latest
  fallback:
    enabled: true
    retry_count: 2
    retry_delay: 1.0
    max_total_timeout: 60.0
    chains:
      glite: [zai:glm-4.7, openai:nano]
      cco: [codex, pi]
      codex: [pi]
    providers:
      - zai:glm-5
