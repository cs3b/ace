llm:
  providers:
    active:
      - opencode
      - pi
      - codex
      - gemini
      - claude
      - openrouter
      - zai
      - google
  roles:
    doctor:
      - gemini:flash-latest@yolo
    planner:
      - codex:gpt@ro
    review-default:
      - codex:codex@ro
    review-synthesizer:
      - codex:gpt@ro
    review-fallback:
      - claude:sonnet
    review-claude:
      - claude:opus@ro
    review-codex:
      - codex:gpt@ro
    review-gemini:
      - gemini:pro-latest@ro
    assign-executor:
      - codex:codex@yolo
    e2e-executor:
      - claude:haiku@yolo
    e2e-reporter:
      - claude:haiku
    prompt-enhance:
      - glite
    commit:
      - codex:mini
    docs-analysis:
      - glite
    idea-enhance:
      - gemini:flash-latest
    compressor:
      - glite
    sim-primary:
      - google:flash-preview
    sim-synthesis:
      - claude:haiku
  fallback:
    enabled: true
    retry_count: 2
    retry_delay: 1.0
    max_total_timeout: 60.0
    chains:
      glite: [zai:glm-4.7, openai:nano]
      cco: [codex, pi]
      codex: [pi]
    providers:
      - zai:glm-5
