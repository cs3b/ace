llm:
  providers:
    active:
      - opencode
      - pi
      - codex
      - gemini
      - claude
      - openrouter
      - zai
      - google
  roles:
    # --- Reusable candidate lists ---
    _utility: &utility
      - codex:mini
      - claude:haiku
      - gemini:flash-latest
    _assign-worker: &assign-worker
      - codex:codex:medium@yolo
      - claude:sonnet:medium@yolo
      - gemini:flash-latest@yolo

    # --- Diagnostic ---
    doctor:
      - gemini:flash-latest@yolo
      - claude:haiku:low@yolo
      - codex:mini:low@yolo

    # --- Planning ---
    planner:
      - codex:gpt:high@ro
      - claude:opus:high@ro
      - gemini:pro-latest@ro

    # --- Review ---
    review-default:
      - codex:codex:medium@ro
      - claude:sonnet:medium@ro
      - gemini:pro-latest@ro
    review-synthesizer:
      - codex:gpt:low@ro
      - claude:sonnet:medium@ro
      - gemini:flash-latest@ro
    review-claude:
      - claude:opus:high@ro
    review-codex:
      - codex:gpt:high@ro
    review-gemini:
      - gemini:pro-latest@ro

    # --- Assignment ---
    assign-executor: *assign-worker
    assign-engineer: *assign-worker
    assign-orchestrator:
      - claude:opus:medium@yolo
      - codex:gpt:medium@yolo
      - gemini:pro-latest@yolo

    # --- E2E testing ---
    e2e-executor:
      - claude:haiku:low@yolo
      - codex:mini:low@yolo
      - gemini:flash-latest@yolo
    e2e-reporter:
      - claude:haiku:low@ro
      - codex:mini:low@ro
      - gemini:flash-latest@ro

    # --- Utility ---
    prompt-enhance: *utility
    commit: *utility
    docs-analysis: *utility
    compressor: *utility
    idea-enhance:
      - gemini:flash-latest@ro
      - codex:mini@ro
      - claude:haiku@ro

    # --- Simulation ---
    sim-primary:
      - gemini:flash-latest@ro
      - claude:haiku@ro
      - codex:mini@ro
    sim-synthesis:
      - claude:opus:medium
      - codex:gpt:medium
      - gemini:pro-latest
  fallback:
    enabled: true
    retry_count: 2
    retry_delay: 1.0
    max_total_timeout: 60.0
    chains:
      glite: [zai:glm-4.7, openai:nano]
      cco: [codex, pi]
      codex: [pi]
    providers:
      - zai:glm-5
