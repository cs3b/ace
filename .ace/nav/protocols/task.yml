# Protocol definition for task navigation via command delegation
protocol: task
type: cmd  # Command delegation (not file-based resolution)
name: "Task Navigation"
description: "Navigate to tasks via ace-task delegation"
enabled: true

# Command delegation configuration
command_template: "ace-task show %{ref} --path"


# Protocol capabilities (limited for cmd-type protocols)
capabilities:
  searchable: false     # No search within task:// URIs
  supports_glob: false  # No pattern matching in v1
  supports_create: false  # Use ace-task create directly
  supports_content: true  # Passed through to ace-task
  supports_list: false   # Requires ace-task list enhancement first
  supports_tree: true    # Passed through to ace-task

# Notes for users
notes: |
  The task:// protocol delegates to ace-task show command.
  All task reference formats are supported:
    - 0p5, t.0p5, 8c0.t.05p 

  Examples:
    ace-nav task://05p            # Short format
    ace-nav task://8c0.t.05p      # Full Id 
