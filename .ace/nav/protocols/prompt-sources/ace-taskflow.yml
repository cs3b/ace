---
# Prompt Sources Protocol Configuration for ace-taskflow gem
# This enables prompt discovery from the installed ace-taskflow gem

name: ace-taskflow
type: gem
description: Task and idea slug generation prompts from ace-taskflow gem
priority: 10

# Configuration for prompt discovery within the gem
config:
  # Relative path within the gem (default: handbook/prompts)
  relative_path: handbook/prompts

  # Pattern for finding prompt files (supports both *.md and *.prompt.md)
  pattern: "*.md"

  # Enable discovery
  enabled: true

# Categories of prompts available
categories:
  - slug-generation  # LLM prompts for generating hierarchical task and idea slugs

# Notes for users
notes: |
  ace-taskflow provides prompts for slug generation:
  - slug-generation: Prompt with project context for generating hierarchical
    task and idea slugs using LLM

  Use prompt:// URIs to reference these prompts in your configurations.
  Users can override by creating:
    - .ace/handbook/prompts/slug-generation.md (project)
    - ~/.ace/handbook/prompts/slug-generation.md (user)
