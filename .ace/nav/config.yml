# Configuration for ace-nav gem
# This file should be copied to .ace/nav/config.yml in your project
#
# Controls navigation and resource discovery

nav:
  # Discovery settings
  discovery:
    # Enable resource discovery
    enabled: true

    # Search paths for resources
    search_paths:
      - "."                    # Current directory
      - "~/.ace"              # User configuration
      - "/opt/ace"            # System-wide resources

    # Maximum search depth
    max_depth: 10

    # Follow symbolic links
    follow_symlinks: false

    # Cache discovered resources
    cache_results: true

    # Cache TTL in seconds
    cache_ttl: 300

  # Protocol handling
  protocols:
    # Enable protocol handling
    enabled: true

    # Protocol configuration directory
    config_dir: ".ace/nav/protocols"

    # Default protocol if none specified
    default: "file"

    # Protocol timeout (seconds)
    timeout: 30

    # Available protocols (loaded from protocol files)
    available:
      - wfi      # Workflow instructions
      - guide    # Development guides
      - task     # Task definitions
      - tmpl     # Templates
      - prompt   # LLM prompts

  # Search configuration
  search:
    # Search algorithm
    # Options: fuzzy, exact, regex
    algorithm: "fuzzy"

    # Case sensitivity
    case_sensitive: false

    # Minimum match score (0.0-1.0)
    min_score: 0.6

    # Maximum results
    max_results: 50

    # Include hidden files
    include_hidden: false

    # Search index
    index:
      enabled: false
      rebuild_interval: 3600  # seconds
      storage: ".cache/ace-nav/index"

  # Navigation shortcuts
  shortcuts:
    # Define navigation shortcuts
    # Usage: ace-nav @docs
    docs: "docs/**/*.md"
    tests: "test/**/*_test.rb"
    gems: "ace-*/README.md"
    workflows: "**/*.wf.md"
    guides: "**/guides/**/*.md"
    tasks: ".ace-taskflow/**/task.*.md"

  # Resource types
  resources:
    # File resource handling
    files:
      # Show file preview
      preview: true

      # Preview lines
      preview_lines: 10

      # Syntax highlighting
      syntax_highlight: true

    # Directory resource handling
    directories:
      # Show directory contents
      show_contents: true

      # Maximum items to show
      max_items: 20

      # Sort order
      sort: "name"  # Options: name, size, modified

    # URL resource handling
    urls:
      # Fetch URL content
      fetch_content: false

      # URL timeout (seconds)
      timeout: 10

      # Follow redirects
      follow_redirects: true

      # Maximum redirects
      max_redirects: 5

  # Output formatting
  output:
    # Default output format
    # Options: tree, list, json, yaml
    format: "list"

    # Include metadata
    include_metadata: false

    # Colorize output
    color: true

    # Include file icons
    icons: false

    # Group by type
    group_by_type: false

    # Sort results
    sort: "relevance"  # Options: relevance, name, path, modified

  # Protocol sources
  # Configure where protocols load their resources from
  sources:
    # Workflow instructions
    wfi:
      - path: "dev-handbook/workflow-instructions"
        recursive: true
      - path: ".ace/workflows"
        recursive: false

    # Guides
    guide:
      - path: "dev-handbook/guides"
        recursive: true
      - path: "docs/guides"
        recursive: true

    # Tasks
    task:
      - path: ".ace-taskflow"
        recursive: true
        pattern: "task.*.md"

    # Templates
    tmpl:
      - path: "dev-handbook/templates"
        recursive: true
      - path: ".ace/templates"
        recursive: true

    # Prompts
    prompt:
      - path: "dev-handbook/prompts"
        recursive: true
      - path: ".ace/prompts"
        recursive: true

  # Performance
  performance:
    # Use parallel search
    parallel: false

    # Number of threads
    threads: 4

    # Batch size for operations
    batch_size: 100

    # Memory limit (MB)
    memory_limit: 256

  # Error handling
  errors:
    # Continue on errors
    continue_on_error: true

    # Maximum errors
    max_errors: 10

    # Show error details
    show_details: false

    # Log errors
    log_errors: true

  # Security
  security:
    # Validate paths
    validate_paths: true

    # Forbidden patterns
    forbidden_patterns:
      - "**/.git/**"
      - "**/.env*"
      - "**/*secret*"
      - "**/*password*"
      - "**/*.key"

    # Sandbox navigation
    sandbox: false

    # Allowed schemes for URLs
    allowed_schemes:
      - http
      - https
      - file

  # Logging
  logging:
    # Enable logging
    enabled: true

    # Log level
    level: "info"

    # Log file
    file: ".logs/ace-nav.log"

    # Log searches
    log_searches: false

    # Log performance metrics
    log_metrics: false

  # Integration
  integration:
    # Enable IDE integration
    ide: false

    # Enable shell integration
    shell: true

    # Shell completions
    completions:
      bash: true
      zsh: true
      fish: true

  # Development
  development:
    # Debug mode
    debug: false

    # Verbose output
    verbose: false

    # Show timing
    show_timing: false

    # Dry run mode
    dry_run: false