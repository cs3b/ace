description: "Next actionable items (pending + in-progress, excluding maybe/anyday)"
# Universal preset - works for both ideas and tasks
context: "current"
filters:
  # Note: Ideas use folder structure, tasks use different patterns
  # This preset works universally by filtering on status rather than glob patterns
  status:
    - "pending"
    - "in-progress"
sort:
  by: "sort"
  ascending: true
display:
  group_by: null