# ace-assign default configuration
# Override in ~/.ace/assign/config.yml or .ace/assign/config.yml

# Directory where assignments are stored
cache_dir: ".ace-local/assign"

# Main phase numbering step (gaps for injection)
step_increment: 10

# Sub-phase numbering format
subtask_format: "%02d"

# Maximum sub-phase depth (e.g., 010.01.01 = 3 levels)
max_subtask_depth: 3

# Skill metadata lookup roots (relative to project root unless absolute)
skill_source_paths:
  - ".agents/skills"
  - ".claude/skills"

# Workflow lookup roots (relative to project root unless absolute)
workflow_source_paths:
  - "ace-task/handbook/workflow-instructions"
  - "ace-assign/handbook/workflow-instructions"

# Fork execution defaults
execution:
  # provider: "codex:mini"
  provider: "codex:spark"
  # provider: "claude:opus"
  timeout: 1800

# Provider-level defaults for CLI invocation
providers:
  cli: 
    - "claude"
    - "claudeoai"
    - "gemini"
    - "codex"
    - "codexoss"
    - "opencode"
    - "pi"
  cli_args:
    claude:
      - "dangerously-skip-permissions"
    claudeoai:
      - "dangerously-skip-permissions"
    codex:
      - "dangerously-bypass-approvals-and-sandbox"
    codexoss:
      - "full-auto"
