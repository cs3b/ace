# Project-specific configuration for ace-git-commit
git:
  # Default model - uses alias from ace-llm configuration
  model: glite

  # Project-specific conventions
  conventions:
    format: conventional

    # Scope configuration for ace-meta project
    scopes:
      enabled: true
      detect_from_paths: true

      # Custom scopes for ace-meta components
      custom:
        # Gem components
        - ace-core
        - ace-llm
        - ace-git-commit
        - ace-context
        - ace-nav
        - ace-taskflow
        - ace-test-runner
        - ace-test-support

        # Project areas
        - dev-handbook
        - dev-tools
        - taskflow
        - templates
        - docs
        - config
        - workflow
        - agents
        - prompts

  # LLM settings for this project
  generation:
    temperature: 0.7
    max_tokens: 500
    timeout: 60

  # Author settings
  author:
    sign_commits: false