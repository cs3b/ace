# Project-specific configuration for ace-git-commit
git:
  # Default model - uses alias from ace-llm configuration
  # model: google:lite-preview
  model: codex:mini 

  # Commit scope definitions - each key is a scope name
  # Scopes define file groupings for commit splitting
  # Each scope can include:
  #   - glob: pattern(s) to match files
  #   - model: LLM model override
  #   - type_hint: preferred commit type (docs, chore, feat, fix, etc.)
  #   - description: scope context for better commit messages
  scopes:
    ace-config:
      glob:
        - ".ace/**"
        - "*/.ace/**"
        - "**/.ace/**"
      type_hint: chore
      description: "Project configuration files (nav protocols, git settings, bundle presets)"

    task-specs:
      glob: ".ace-tasks/**"
      type_hint: spec
      description: "Task specifications, retrospectives, session notes, and workflow documentation - NOT code features"

    idea-specs:
      glob: ".ace-ideas/**"
      type_hint: spec
      description: "Idea specifications, categorization, and feature exploration notes"

    retro-specs:
      glob: ".ace-retros/**"
      type_hint: spec
      description: "Retrospectives, synthesis reports, and improvement recommendations"

    agent-integrations:
      glob: "{.claude/**,.codex/**,.gemini/**,.opencode/**,.pi/**,AGENTS.md,CLAUDE.md}"
      type_hint: docs
      description: "Agent skills, workflow instructions, and AI assistant integration configs"

    support-packages:
      glob: "ace-support-*/**"
      description: "Shared support libraries (ace-support-core, ace-support-config, etc.)"

    ace-bundle:
      glob: "ace-bundle/**"

    ace-compressor:
      glob: "ace-compressor/**"

    ace-assign:
      glob: "ace-assign/**"

    ace-demo:
      glob: "ace-demo/**"

    ace-docs:
      glob: "ace-docs/**"

    ace-git:
      glob: "ace-git/**"

    ace-git-commit:
      glob: "ace-git-commit/**"

    ace-git-secrets:
      glob: "ace-git-secrets/**"

    ace-git-worktree:
      glob: "ace-git-worktree/**"

    ace-handbook:
      glob: "ace-handbook/**"

    ace-idea:
      glob: "ace-idea/**"

    ace-lint:
      glob: "ace-lint/**"

    ace-llm:
      glob: "ace-llm/**"

    ace-llm-providers-cli:
      glob: "ace-llm-providers-cli/**"

    ace-overseer:
      glob: "ace-overseer/**"

    ace-prompt-prep:
      glob: "ace-prompt-prep/**"

    ace-retro:
      glob: "ace-retro/**"

    ace-review:
      glob: "ace-review/**"

    ace-search:
      glob: "ace-search/**"

    ace-sim:
      glob: "ace-sim/**"

    ace-task:
      glob: "ace-task/**"

    ace-test:
      glob: "ace-test/**"

    ace-test-runner-e2e:
      glob: "ace-test-runner-e2e/**"

    ace-test-runner:
      glob: "ace-test-runner/**"

    ace-tmux:
      glob: "ace-tmux/**"

    ace-b36ts:
      glob: "ace-b36ts/**"

  # Project-specific conventions
  conventions:
    format: conventional

  # LLM settings for this project
  generation:
    temperature: 0.7
    max_tokens: 500
    timeout: 60

  # Author settings
  author:
    sign_commits: false
