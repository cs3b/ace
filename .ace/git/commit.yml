# Project-specific configuration for ace-git-commit
git:
  # Default model - uses alias from ace-llm configuration
  model: glite

  # Project-specific conventions
  conventions:
    format: conventional

    # Scope configuration for ace-meta project
    scopes:
      enabled: true
      detect_from_paths: true

      # Custom scopes for ace-meta components
      custom:
        # Gem components (auto-detected from ace-* pattern)
        - ace-support-core
        - ace-llm
        - ace-git
        - ace-git-commit
        - ace-git-secrets
        - ace-git-worktree
        - ace-context
        - ace-support-nav
        - ace-taskflow
        - ace-test-runner
        - ace-support-test-helpers
        - ace-handbook
        - ace-review
        - ace-docs
        - ace-lint
        - ace-search
        - ace-prompt
        - ace-integration-claude

        # Project areas
        - taskflow
        - docs
        - config

  # LLM settings for this project
  generation:
    temperature: 0.7
    max_tokens: 500
    timeout: 60

  # Author settings
  author:
    sign_commits: false
