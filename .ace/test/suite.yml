test_suite:
  # Maximum parallel processes (10 balances speed vs resource contention)
  max_parallel: 12

  # Packages to test in order of priority
  packages:
    - name: ace-support-core
      path: ace-support-core
      group: foundation
      priority: 2

    - name: ace-support-config
      path: ace-support-config
      group: foundation
      priority: 1

    - name: ace-support-fs
      path: ace-support-fs
      group: foundation
      priority: 2

    - name: ace-test-runner
      path: ace-test-runner
      group: foundation
      priority: 2

    - name: ace-bundle
      path: ace-bundle
      group: tools
      priority: 2

    - name: ace-support-nav
      path: ace-support-nav
      group: tools
      priority: 2

    - name: ace-taskflow
      path: ace-taskflow
      group: tools
      priority: 1

    - name: ace-assign
      path: ace-assign
      group: tools
      priority: 2

    - name: ace-b36ts
      path: ace-b36ts
      group: foundation
      priority: 2

    - name: ace-git-commit
      path: ace-git-commit
      group: tools
      priority: 2

    - name: ace-llm
      path: ace-llm
      group: tools
      priority: 1

    - name: ace-llm-providers-cli
      path: ace-llm-providers-cli
      group: tools
      priority: 2

    - name: ace-support-models
      path: ace-support-models
      group: tools
      priority: 2

    - name: ace-search
      path: ace-search
      group: tools
      priority: 2

    - name: ace-docs
      path: ace-docs
      group: tools
      priority: 1

    - name: ace-git-worktree
      path: ace-git-worktree
      group: tools
      priority: 2

    - name: ace-lint
      path: ace-lint
      group: tools
      priority: 2

    - name: ace-review
      path: ace-review
      group: tools
      priority: 2

    - name: ace-sim
      path: ace-sim
      group: tools
      priority: 2

    - name: ace-git
      path: ace-git
      group: tools
      priority: 2

    - name: ace-git-secrets
      path: ace-git-secrets
      group: tools
      priority: 1

    - name: ace-handbook
      path: ace-handbook
      group: tools
      priority: 2

    - name: ace-integration-claude
      path: ace-integration-claude
      group: tools
      priority: 2

    - name: ace-prompt-prep
      path: ace-prompt-prep
      group: tools
      priority: 1

    - name: ace-support-markdown
      path: ace-support-markdown
      group: foundation
      priority: 2

    - name: ace-support-mac-clipboard
      path: ace-support-mac-clipboard
      group: foundation
      priority: 2

    - name: ace-support-test-helpers
      path: ace-support-test-helpers
      group: foundation
      priority: 2

    - name: ace-tmux
      path: ace-tmux
      group: foundation
      priority: 2

    - name: ace-overseer
      path: ace-overseer
      group: tools
      priority: 2

  # Test command options
  test_options:
    format: compact
    save_reports: true
    fail_fast: false

  # Display options
  display:
    show_progress: true
    update_interval: 0.1  # seconds
    color: true
    clear_screen: false  # Don't clear entire screen, just update lines
