# Configuration for ace-test-runner
# Controls test execution behavior and output formatting

version: 1

defaults:
  # Output format for test results
  # Options: progress (default), progress-file, json
  reporter: progress

  # Directory to save test reports (relative to project root)
  report_dir: test-reports

  # Whether to save detailed reports to disk
  save_reports: true

  # Stop execution on first test failure
  fail_fast: false

  # Enable colored output in terminal
  color: auto

# Test file patterns - standard flat ATOM structure
patterns:
  smoke: "test/*_test.rb"
  atoms: "test/atoms/**/*_test.rb"
  molecules: "test/molecules/**/*_test.rb"
  organisms: "test/organisms/**/*_test.rb"
  models: "test/models/**/*_test.rb"
  commands: "test/commands/**/*_test.rb"
  edge: "test/edge/**/*_test.rb"
  integration: "test/integration/**/*_test.rb"
  system: "test/system/**/*_test.rb"

# Test groups
groups:
  unit:
    - smoke
    - atoms
    - molecules
    - organisms
    - models
    - commands
  all:
    - unit
    - edge
    - integration
    - system
  quick:
    - atoms
    - molecules

# Failure display limits
failure_limits:
  # Maximum failures to display in console output
  max_display: 7

  # Stop test execution after this many failures
  stop_threshold: 21

# Execution settings
execution:
  # Execution mode: "grouped" or "all-at-once"
  # grouped: Run test groups sequentially with headers (better organization)
  # all-at-once: Run all tests together without group headers (faster, simpler output)
  mode: grouped 

  # Stop at first failing group (only for mode: grouped)
  group_fail_fast: true

  # Process isolation for groups (only for mode: grouped)
  # true: Run each group in separate subprocess (slower, better isolation)
  # false: Run groups in same process (faster)
  group_isolation: false
