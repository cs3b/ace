# Configuration for ace-test-runner
# Controls test execution behavior and output formatting

version: 1

defaults:
  # Output format for test results
  # Options: progress (default), progress-file, json
  reporter: progress

  # Directory to save test reports (relative to project root)
  report_dir: .ace-local/test/reports

  # Whether to save detailed reports to disk
  save_reports: true

  # Stop execution on first test failure
  fail_fast: false

  # Enable colored output in terminal
  color: auto

# Test file patterns - standard flat ATOM structure
patterns:
  smoke: "test/{fast/,}*_test.rb"
  atoms: "test/{fast/,}atoms/**/*_test.rb"
  molecules: "test/{fast/,}molecules/**/*_test.rb"
  organisms: "test/{fast/,}organisms/**/*_test.rb"
  models: "test/{fast/,}models/**/*_test.rb"
  commands: "test/{fast/,}commands/**/*_test.rb"
  cli: "test/{fast/,}cli/**/*_test.rb"
  prompts: "test/{fast/,}prompts/**/*_test.rb"
  fixtures: "test/{fast/,}fixtures/**/*_test.rb"
  support: "test/{fast/,}support/**/*_test.rb"
  edge: "test/edge/**/*_test.rb"
  feat_tests: "test/feat/**/*_test.rb"

# Test targets
targets:
  fast:
    - smoke
    - atoms
    - molecules
    - organisms
    - models
    - commands
    - cli
    - prompts
    - fixtures
    - support
  feat:
    - feat_tests
    - edge
  all:
    - fast
    - feat
  quick:
    - atoms
    - molecules

# Failure display limits
failure_limits:
  # Maximum failures to display in console output
  max_display: 7

  # Stop test execution after this many failures
  stop_threshold: 21

# Execution settings
execution:
  # Execution mode: "by-target" or "all-at-once"
  # by-target: Run test targets sequentially with headers (better organization)
  # all-at-once: Run all tests together in one batch (faster, simpler output)
  mode: by-target

  # Stop at first failing target (only for mode: by-target)
  target_fail_fast: true

  # Process isolation for targets (only for mode: by-target)
  # true: Run each target in separate subprocess (slower, better isolation)
  # false: Run targets in same process (faster)
  target_isolation: false
