# ace-review configuration file
# This file defines default settings and presets for code reviews

# Default settings applied to all reviews unless overridden
defaults:
  preset: code-multi
  output_format: "markdown"
  bundle: "project"
  max_concurrent_models: 5  # Max parallel LLM queries for multi-model execution
  auto_execute: true  # Automatically execute LLM query without confirmation
  gh_timeout: 30  # Timeout for GitHub CLI operations in seconds
  # NOTE: Auto-save is enabled for this project's contributors.
  # The gem's user-facing default is `false` (opt-in).
  auto_save: true
  auto_save_branch_patterns:
    - '^(\d+(?:\.\d+)?)-'  # Standard: 121-feature, 121.01-subtask
    - '^feature/(\d+)-'     # Feature branches: feature/123-name
  auto_save_release_fallback: true

# Synthesis configuration for multi-model review reports
synthesis:
  enabled: true  # Set to false to disable automatic synthesis
  model: "google:flash-preview"  # Model to use for synthesis

# Storage configuration
# storage:
#   # Where to store review outputs
#   # Detection order (if not specified):
#   #   1. Try: $(ace-taskflow release --path reviews)
#   #   2. Fallback: .cache/ace-review/sessions/
#   # You can override with custom path (supports %{release} placeholder):
#   base_path: ".ace-taskflow/%{release}/reviews"
#   auto_organize: true

# Review presets - load from .ace/review/presets/*.yml
# Individual preset files provide better organization and shareability
