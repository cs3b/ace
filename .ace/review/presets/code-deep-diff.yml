# Deep code review - filtered diff excluding dev-local and _legacy
presets:
  - code-deep

description: "Deep code review against origin/main, excluding dev-local and _legacy"

subject:
  bundle:
    sections:
      code_changes:
        title: "Core Code Changes"
        description: "Production code changes, excluding development and legacy paths"
        commands:
          - "git diff origin/main...HEAD -- . ':(exclude)dev-local' ':(exclude)_legacy'"
