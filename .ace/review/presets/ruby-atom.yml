# Ruby ATOM architecture review preset
# Combines Ruby language best practices with ATOM architecture patterns

description: "Ruby code review with ATOM architecture focus"

instructions:
  bundle:
    base: "prompt://base/system"
    sections:
      format:
        title: "Format Guidelines"
        description: "Detailed output formatting and structure guidelines"
        files:
          - "prompt://format/detailed"
      architecture_focus:
        title: "Architecture Review Focus"
        description: "ATOM architecture patterns and Ruby best practices"
        files:
          - "prompt://focus/architecture/atom"
          - "prompt://focus/languages/ruby"
      communication:
        title: "Communication Style"
        description: "Professional communication guidelines"
        files:
          - "prompt://guidelines/tone"
      visual_indicators:
        title: "Visual Indicators"
        description: "Icons and visual markers for quick scanning"
        files:
          - "prompt://guidelines/icons"
      architecture_context:
        title: "Architecture Documentation"
        description: "Project architecture and main documentation"
        files:
          - "docs/architecture.md"
          - "README.md"

bundle: "project"

subject:
  # Use diff key for consistent filtering via ace-git
  diff:
    ranges:
      - "HEAD~1..HEAD"
    filters:
      - "*.rb"
      - "lib/**/*.rb"

model: "codex:codex"
