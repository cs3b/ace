# Specification review - clarity, completeness, and feasibility
#
# Requires --subject parameter to specify files to review:
#   ace-review --preset spec --subject '.ace-tasks/v.0.9.0/tasks/150-*/**/*'
#
# For auto-detecting all changed .s.md files on branch, use 'spec-branch' preset.

description: "Specification review - goal clarity, usage expectations, tests, completeness"

reviewers:
  - name: spec-architecture
    model: "claude:opus"
    prompt:
      base: "prompt://base/system"
      sections:
        project_context:
          presets:
            - project
        format:
          title: "Format Guidelines"
          description: "Standard output formatting and structure guidelines"
          files:
            - "prompt://format/standard"
        spec_focus:
          title: "Specification Focus"
          description: "Specification clarity, completeness, and feasibility review"
          files:
            - "prompt://focus/scope/spec"
        guidelines:
          title: "Communication Guidelines"
          description: "Professional communication style"
          files:
            - "prompt://guidelines/tone"
  - name: spec-implementation
    model: "codex:max"
    prompt:
      base: "prompt://base/system"
      sections:
        project_context:
          presets:
            - project
        format:
          title: "Format Guidelines"
          description: "Standard output formatting and structure guidelines"
          files:
            - "prompt://format/standard"
        spec_focus:
          title: "Specification Focus"
          description: "Specification clarity, completeness, and feasibility review"
          files:
            - "prompt://focus/scope/spec"
        guidelines:
          title: "Communication Guidelines"
          description: "Professional communication style"
          files:
            - "prompt://guidelines/tone"

# No subject section - uses CLI --subject parameter directly
