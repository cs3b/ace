# Specification review - auto-detect all changed .s.md files on branch
#
# Extends 'spec' preset with automatic subject detection via git diff.
# Use this when you want to review ALL changed spec files on current branch:
#   ace-review --preset spec-branch

description: "Specification review - all changed .s.md files on branch"

base: spec

subject:
  bundle:
    sections:
      spec_changes:
        title: "Specification Changes"
        description: "Specification files to review"
        commands:
          - "git diff origin/main...HEAD -- '**/*.s.md'"
