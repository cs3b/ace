# Performance review - optimization opportunities

description: "Performance review - optimization opportunities"

instructions:
  base: "prompt://base/system"
  context:
    sections:
      format:
        title: "Format Guidelines"
        description: "Detailed output formatting and structure guidelines"
        files:
          - "prompt://format/detailed"
      performance_focus:
        title: "Performance Review Focus"
        description: "Performance optimization and bottleneck analysis"
        files:
          - "prompt://focus/quality/performance"
      communication:
        title: "Communication Style"
        description: "Professional communication guidelines"
        files:
          - "prompt://guidelines/tone"
      project_context:
        title: "Project Context"
        description: "Project information and background"
        presets:
          - "project"

context: "project"

subject:
  # Use diff key for consistent filtering via ace-git-diff
  diff:
    ranges:
      - "HEAD~3..HEAD"
