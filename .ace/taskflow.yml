# ace-taskflow configuration for this project

taskflow:
  # Root directory for all taskflow data
  root: ".ace-taskflow"

  # Task directory name within releases
  task_dir: "t"

  # Release management
  active_strategy: "lowest"          # How to pick primary active release (lowest version number)
  allow_multiple_active: true        # Allow multiple active releases

  # Qualified references
  references:
    allow_qualified: true            # Enable v.0.9.0+018 syntax
    allow_cross_release: true        # Can reference other releases

  # Default contexts for new items
  defaults:
    idea_location: "active"          # Where ideas go by default (active, backlog, or release name)
    task_location: "active"          # Where new tasks go by default

  # Global settings
  settings:
    author:
      name: "ACE Developer"
      email: "dev@ace-meta.com"
    formatting:
      timestamp_format: "%Y-%m-%d %H:%M:%S"
      timezone: "UTC"
    git:
      auto_commit: false
      commit_prefix: "idea:"
    output:
      verbose: true
      color: true

  # Idea subcommand configuration
  idea:
    directory: "dev-taskflow/backlog/ideas"
    template: |
      # %{title}

      ## Idea Description

      %{content}

      ## Metadata

      - **Captured**: %{timestamp}
      - **Author**: %{author}
      - **Tags**: %{tags}
      - **Status**: unprocessed

      ## Next Steps

      - [ ] Review and categorize
      - [ ] Convert to task if actionable
      - [ ] Archive if not relevant
    file_naming:
      pattern: "%{timestamp}-%{title}"
      title_max_length: 50
      timestamp_format: "%Y%m%d-%H%M%S"
    categories:
      enabled: true
      default: "general"
      allowed:
        - general
        - feature
        - bugfix
        - refactor
        - documentation
        - performance
        - testing
        - workflow

  # Task subcommand configuration (future)
  task:
    directory: "./dev-taskflow/current"
    use_release_dirs: true
    tasks_subdir: "tasks"

  # Release subcommand configuration (future)
  release:
    current: "./dev-taskflow/current"
    completed: "./dev-taskflow/done"
