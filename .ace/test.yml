# Configuration for ace-test in ace-meta project

version: 1

# Failure limits configuration
failure_limits:
  max_display: 3      # Show first 7 failures in output
  stop_threshold: 10  # Stop running tests after 21 failures

# Test file patterns for ATOM architecture
# patterns:
#   atoms: 'test/{unit/,}atoms/**/*_test.rb'
#   molecules: 'test/{unit/,}molecules/**/*_test.rb'
#   organisms: 'test/{unit/,}organisms/**/*_test.rb'
#   models: 'test/{unit/,}models/**/*_test.rb'
#   integration: 'test/integration/**/*_test.rb'
#   system: 'test/system/**/*_test.rb'
#
# # Test groups
# groups:
#   unit: [atoms, molecules, organisms, models]
#   all: [unit, integration, system]
#   quick: [atoms, molecules]

# Default settings
defaults:
  reporter: progress
  color: auto
  fail_fast: false
  save_reports: true
  report_dir: test-reports
