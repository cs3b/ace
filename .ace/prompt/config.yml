# ace-prompt configuration
# Place this in .ace/prompt/config.yml in your project
#
# Configuration cascade: ./.ace/prompt/config.yml → ~/.ace/prompt/config.yml
# Values in project config take precedence over home directory config.

# Context loading configuration
# When enabled, ace-prompt will load project context via ace-context
# based on frontmatter in the prompt file.
context:
  enabled: true
  # sources:
  #   - file: "docs/architecture.md"
  #   - preset: "project-overview"
  #   - command: "git status --short"

task:
  detection: true
  branch_patterns:
    - '^(\d+(?:\.\d+)?)-'  # Default: 121-feature, 121.01-archive

# Security configuration
# Controls security limits and validation for context loading
security:
  max_file_size_mb: 10  # Maximum file size for context loading (10MB default)

# Debug configuration
# Enables debug logging for troubleshooting and development
debug:
  enabled: false          # Enable debug logging globally
  context_loading: false # Detailed context loading logs

# Enhancement configuration
# Controls LLM-powered prompt enhancement via `ace-prompt -e`
enhance:
  enabled: false
  model: glite           # Model alias or provider:model (e.g., groq:llama-3.3-70b-versatile)
  temperature: 0.3        # Lower = more focused, higher = more creative
  # system_prompt: prompt://custom-enhance-instructions  # Optional custom system prompt

