# Configuration for ace-context gem
# This file should be copied to .ace/context/config.yml in your project
#
# Controls context loading and caching behavior

context:
  # Cache settings
  cache:
    # Enable context caching
    enabled: true

    # Cache directory (relative to project root)
    directory: ".cache/ace-context"

    # Cache time-to-live in seconds (0 = no expiry)
    ttl: 3600  # 1 hour

    # Maximum cache size in MB
    max_size: 50

    # Compression for cached files
    compress: false

  # Output settings
  output:
    # Default output format
    # Options: markdown, yaml, json, text
    format: markdown

    # Include metadata in output
    include_metadata: true

    # Maximum output size in bytes (0 = unlimited)
    max_size: 10485760  # 10MB

    # Line numbering in file content
    line_numbers: true

    # Syntax highlighting (if supported)
    syntax_highlight: false

  # File handling
  files:
    # Maximum file size to include (bytes)
    max_file_size: 1048576  # 1MB

    # Skip binary files
    skip_binary: true

    # File encoding
    encoding: "UTF-8"

    # Patterns to always exclude
    exclude_patterns:
      - "**/.git/**"
      - "**/node_modules/**"
      - "**/.cache/**"
      - "**/tmp/**"
      - "**/*.log"
      - "**/*.tmp"

    # File extensions to treat as text
    text_extensions:
      - .md
      - .txt
      - .rb
      - .yml
      - .yaml
      - .json
      - .xml
      - .html
      - .css
      - .js
      - .py
      - .sh

  # Command execution
  commands:
    # Enable command execution in context
    enabled: true

    # Command timeout in seconds
    timeout: 30

    # Maximum output lines per command
    max_lines: 1000

    # Shell to use for commands
    shell: "/bin/bash"

    # Environment variables for commands
    environment:
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"

    # Forbidden commands (security)
    forbidden:
      - rm
      - sudo
      - chmod
      - chown

  # Preset handling
  presets:
    # Directory for preset files
    directory: ".ace/context/presets"

    # Default preset if none specified
    default: "minimal"

    # Auto-load preset on context init
    auto_load: false

    # Preset file extension
    extension: ".md"

  # Context collection
  collection:
    # Follow symbolic links
    follow_symlinks: false

    # Maximum directory depth
    max_depth: 10

    # Collect git information
    include_git_info: true

    # Collect environment info
    include_env_info: false

    # Sort files in output
    sort_files: true

    # Group files by type/directory
    group_files: false

  # Performance settings
  performance:
    # Use parallel file reading
    parallel: false

    # Number of threads for parallel ops
    threads: 4

    # Batch size for file operations
    batch_size: 10

    # Memory limit in MB
    memory_limit: 512

  # Error handling
  errors:
    # Continue on file read errors
    continue_on_error: true

    # Include error details in output
    include_errors: true

    # Maximum errors before stopping
    max_errors: 100

    # Retry failed operations
    retry_attempts: 3

  # Templates
  templates:
    # Template for file content
    file_template: |
      ### {path}

      ```{language}
      {content}
      ```

    # Template for command output
    command_template: |
      ### Command: `{command}`

      **Output:**
      ```
      {output}
      ```

    # Template for metadata
    metadata_template: |
      ## Metadata

      - **preset_name**: {preset}
      - **timestamp**: {timestamp}
      - **file_count**: {file_count}
      - **total_size**: {total_size}

  # Logging
  logging:
    # Enable logging
    enabled: true

    # Log level: debug, info, warn, error
    level: "info"

    # Log file path
    file: ".logs/ace-context.log"

    # Include timing information
    include_timing: true

  # Security
  security:
    # Validate file paths
    validate_paths: true

    # Sandbox command execution
    sandbox_commands: true

    # Maximum context size (prevent DoS)
    max_context_size: 52428800  # 50MB

    # Allowed preset directories only
    restrict_preset_paths: true