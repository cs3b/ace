# Work-on task orchestration workspace:
# - Left: cc running /as-assign-drive
# - Middle: nvim on active assignment cache (via .ace-local/assign/.latest)
# - Right: status from task and assignment
direction: horizontal
panes:
  - preset: work-on-tasks-cc
    size: "34%"
  - preset: work-on-tasks-nvim
    size: "32%"
  - preset: work-on-tasks-status
    size: "34%"
