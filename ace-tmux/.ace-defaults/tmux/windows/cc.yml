# Claude Code workspace: claude (left) | nvim + git status (center) | taskflow (right)
direction: horizontal
panes:
  - preset: claude
    size: "34%"
  - direction: vertical
    size: "32%"
    panes:
      - preset: nvim
      - commands:
          - ace-git status
  - commands:
      - ace-task list
    size: "34%"
