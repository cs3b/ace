test-id: TS-TMUX-001
title: "ace-tmux Session Management"
area: tmux
package: ace-tmux
priority: low
cost-tier: deep
tags: [deep, "use-case:tmux"]
tool-under-test: ace-tmux

sandbox-layout:
  results/tc/01/: "Preset listing artifacts"
  results/tc/02/: "Session start artifacts"
  results/tc/03/: "Window add artifacts"

e2e-justification: >
  Requires real tmux process/session interactions and preset-driven CLI behavior
  that cannot be fully validated with isolated unit tests.

unit-coverage-reviewed:
  - test/commands/cli_test.rb
  - test/molecules/tmux_executor_test.rb
  - test/organisms/session_manager_test.rb

requires:
  tools: [ace-tmux, tmux]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
