test-id: TS-TASK-002
title: "ace-task Query and Filtering"
area: taskflow
package: ace-taskflow
priority: high
cost-tier: happy-path
tags: [happy-path, "use-case:taskflow"]
tool-under-test: ace-task

sandbox-layout:
  results/tc/01/: "Task detail output"
  results/tc/02/: "Status-filtered listing output"
  results/tc/03/: "Taskflow status summary output"

e2e-justification: >
  These goals exercise real task discovery, filtering, and formatted status
  output from filesystem-backed task data across task and taskflow CLIs.

unit-coverage-reviewed:
  - test/integration/cli_status_activity_test.rb
  - test/commands/status_command_test.rb
  - test/commands/task_command_test.rb

requires:
  tools: [ace-task, ace-taskflow]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
