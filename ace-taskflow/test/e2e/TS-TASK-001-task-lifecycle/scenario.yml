test-id: TS-TASK-001
title: "ace-task Task Lifecycle"
area: taskflow
package: ace-taskflow
priority: high
cost-tier: smoke
tags: [smoke, "use-case:taskflow"]
tool-under-test: ace-task

sandbox-layout:
  results/tc/01/: "Task creation evidence"
  results/tc/02/: "Task start transition evidence"
  results/tc/03/: "Task completion transition evidence"
  results/tc/04/: "Task listing evidence"

e2e-justification: >
  These goals validate stateful task lifecycle behavior using the real CLI and
  filesystem-backed task records. The checks rely on command sequencing and
  persisted state transitions that unit tests do not fully cover.

unit-coverage-reviewed:
  - test/integration/task_workflow_test.rb
  - test/commands/task/create_test.rb
  - test/commands/task_command_test.rb

requires:
  tools: [ace-task]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
