test-id: TS-IDEA-001
title: "ace-idea Idea Lifecycle"
area: taskflow
package: ace-taskflow
priority: high
cost-tier: happy-path
tags: [happy-path, "use-case:taskflow"]
tool-under-test: ace-idea

sandbox-layout:
  results/tc/01/: "Idea creation artifacts"
  results/tc/02/: "Idea listing artifacts"
  results/tc/03/: "Idea park transition artifacts"

e2e-justification: >
  Idea lifecycle requires filesystem-backed state and real CLI transitions
  across create, list, and lifecycle state change operations.

unit-coverage-reviewed:
  - test/integration/idea_writer_integration_test.rb
  - test/commands/idea_subcommands_test.rb
  - test/commands/ideas_command_test.rb

requires:
  tools: [ace-idea]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp $PROJECT_ROOT_PATH/mise.toml mise.toml && mise trust mise.toml"
