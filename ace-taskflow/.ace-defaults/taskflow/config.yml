# ace-taskflow configuration - Complete reference with defaults
# Copy to .ace/taskflow/config.yml and customize only what differs
# This file is the single source of truth for default values (ADR-022)

taskflow:
  # Root directory for tasks (default: .ace-taskflow)
  root: ".ace-taskflow"

  # Task directory name within releases (default: t)
  task_dir: "t"

  # Directory structure (underscore prefix for system directories)
  # GTD-inspired naming: anyday (tasks for anytime), maybe (ideas that might happen)
  directories:
    completed: "_archive"         # Completed tasks/ideas (default: _archive)
    backlog: "_backlog"           # Future releases (default: _backlog)
    anyday: "_anyday"             # Tasks for anytime, no urgency (default: _anyday)
    maybe: "_maybe"               # Ideas that might happen (default: _maybe)

  # Active release selection strategy
  # "lowest" - Select the release with lowest version number (default)
  # "highest" - Select the release with highest version number
  active_strategy: "lowest"

  # Allow multiple active releases (default: true)
  allow_multiple_active: true

  # Status transition mode (default: false - flexible mode)
  # Set to true for rigid status validation (legacy behavior)
  strict_transitions: false

  # Terminal statuses for orchestrator auto-completion
  # When all subtasks have one of these statuses, the orchestrator auto-completes
  terminal_statuses:
    - done        # Task completed successfully
    - cancelled   # Task cancelled/abandoned intentionally
    - suspended   # Task suspended indefinitely (may resume later)
    - superseded  # Task replaced by another task
    - skipped     # Task intentionally skipped (not needed)

  # Reference resolution settings
  references:
    allow_qualified: true        # Allow v.X.Y.Z+task.NNN format (default: true)
    allow_cross_release: true    # Allow referencing tasks in other releases (default: true)

  # Default locations and behaviors for new items
  defaults:
    idea_location: "active"      # Where to save ideas: active, backlog, or v.X.Y.Z
    task_location: "active"      # Where to create tasks: active or v.X.Y.Z
    git_commit: false            # Auto-commit new ideas
    llm_enhance: false           # Use LLM to enhance ideas

  # Task-specific settings
  tasks:
    defaults:
      reschedule_strategy: "add_next"  # Strategy for rescheduled tasks: add_next, add_end

  # Display parameters
  params:
    subtasks: enabled            # Subtask display: enabled, disabled

  # Status command settings (ace-taskflow status)
  status:
    # Task activity section settings
    activity:
      recently_done_limit: 3     # Max recently completed tasks to show (default: 3)
      up_next_limit: 3           # Max upcoming tasks to show (default: 3)
      include_drafts: false      # Include draft tasks in "Up Next" (default: false)

  # Idea configuration
  idea:
    directory: "ideas"           # Where to save ideas locally
    template: |
      # %{title}

      ## Description
      %{content}

      ## Metadata
      - **Captured**: %{timestamp}
      - **Author**: %{author}
      - **Status**: unprocessed
    file_naming:
      pattern: "%{id}-%{title}"
      # IDs are always 6-character Base36 compact format (e.g., "abc123-my-idea")

  # Task configuration
  task:
    directory: "."               # Task directory within release (default: .)
    use_release_dirs: true       # Use version directories for tasks (default: true)
    tasks_subdir: "t"            # Subdirectory for tasks within release (default: t)

  # Release configuration
  release:
    current: "."                 # Current release directory (default: .)
    completed: "done"            # Completed release directory (default: done)
