# Current sprint/release tasks preset
# Shows tasks for the active release/sprint

description: "Current release/sprint tasks"
type: "task"  # task, idea, or release
context: "current"  # current, all, specific version

# Filter criteria
filters:
  # Status filter
  status:
    include:
      - pending
      - in_progress
      - blocked
      - review
    exclude:
      - done
      - cancelled

  # Priority filter (optional)
  # priority:
  #   include:
  #     - critical
  #     - high

  # Release filter
  release: "current"  # current, next, or specific version

  # Time filters
  # created_after: "-30d"  # Last 30 days
  # modified_after: "-7d"  # Modified in last week

# Sorting
sort:
  by: "priority"  # priority, status, id, created, modified, estimate
  ascending: false  # High priority first

  # Secondary sort
  then_by: "id"
  then_ascending: true

# Display options
display:
  # Format: table, list, cards, tree
  format: "table"

  # Fields to show
  fields:
    - id
    - status
    - priority
    - title
    - estimate
    - assignee

  # Show additional info
  show_dependencies: true
  show_blockers: true
  show_dates: false
  show_progress: true

  # Grouping
  group_by: "status"

  # Colors
  color_code: true
  color_by: "status"

# Limits
limits:
  max_results: 50
  page_size: 20

# Export options
export:
  format: "markdown"  # markdown, json, csv
  include_metadata: false
  include_content: false