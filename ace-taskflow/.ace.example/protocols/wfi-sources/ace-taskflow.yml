---
# WFI Sources Protocol Configuration for ace-taskflow gem
# This enables workflow discovery from the installed ace-taskflow gem

name: ace-taskflow
type: gem
description: Taskflow workflow instructions from ace-taskflow gem
path: handbook/workflow-instructions/

# Configuration for workflow discovery
config:
  # Base directory within the gem
  base_path: handbook/workflow-instructions

  # Pattern for finding workflow files
  pattern: "*.wf.md"

  # Enable discovery through gem installation
  enabled: true

# Metadata
metadata:
  version: 1.0.0
  author: ace-taskflow
  source: gem
  priority: 10  # Higher priority for gem-based workflows