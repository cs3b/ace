description: "Next actionable items (pending + in-progress, excluding maybe/anyday)"
# Universal preset - works for both ideas and tasks
context: "current"
filters:
  glob: ["ideas/*/*.s.md", "tasks/*/*.s.md"]  # Top-level items in both ideas and tasks dirs
  status:
    - "pending"
    - "in-progress"
sort:
  by: "sort"
  ascending: true
display:
  group_by: null