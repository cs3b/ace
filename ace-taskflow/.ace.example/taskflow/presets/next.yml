description: "Next actionable items (pending + in-progress, excluding maybe/anyday)"
# Universal preset - works for both ideas and tasks
context: "current"
filters:
  glob: ["*/*.s.md"]  # Items in immediate subdirectories only (excludes maybe/anyday)
  status:
    - "pending"
    - "in-progress"
sort:
  by: "sort"
  ascending: true
display:
  group_by: null