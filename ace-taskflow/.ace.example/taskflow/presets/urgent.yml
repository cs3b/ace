# Example custom preset for urgent/critical tasks
description: "Urgent tasks requiring immediate attention"
type: "tasks"  # Can be "tasks", "ideas", "releases", or null for universal
context: "current"  # Can be "current", "all", "backlog", or specific release name
filters:
  status:
    - "in-progress"
    - "pending"
  priority:
    - "critical"
    - "high"
sort:
  by: "priority"  # Can be "priority", "status", "modified", "context", "id", etc.
  ascending: false  # High priority first
display:
  group_by:  # Optional grouping (null, "context", "status", etc.)
  show_dates: false  # Whether to show timestamps
  highlight_critical: true  # Custom display options