# ace-taskflow configuration example
# Copy this file to .ace/taskflow.yml in your project root

taskflow:
  # Global settings
  settings:
    author:
      name: "${USER}"
      email: "${USER}@example.com"
    formatting:
      timestamp_format: "%Y-%m-%d %H:%M:%S"
      timezone: "UTC"
    git:
      auto_commit: false
      commit_prefix: "idea:"
    output:
      verbose: false
      color: true

  # Idea subcommand configuration
  idea:
    directory: "./ideas"
    template: |
      # %{title}

      %{content}

      ---
      Captured: %{timestamp}
    file_naming:
      pattern: "%{timestamp}-%{title}"
      title_max_length: 50
      timestamp_format: "%Y%m%d-%H%M%S"

  # Task subcommand configuration (future)
  task:
    directory: "./tasks"
    use_release_dirs: false
    tasks_subdir: "tasks"

  # Release subcommand configuration (future)
  release:
    current: "./releases/current"
    completed: "./releases/done"