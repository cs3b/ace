test-id: TS-SECRETS-001
title: "ace-git-secrets Goal-Based E2E"
area: git-secrets
package: ace-git-secrets
priority: high
tags: [smoke, happy-path, "use-case:secrets"]
cost-tier: smoke
tool-under-test: ace-git-secrets

sandbox-layout:
  results/tc/01/:  "Help survey observations"
  results/tc/02/:  "Secret detection evidence (scan output, exit code)"
  results/tc/03/:  "History persistence evidence (scan after git rm)"
  results/tc/04/:  "Output format and filtering evidence (JSON report, whitelist)"
  results/tc/05/:  "Rewrite workflow evidence (dry run, raw values)"
  results/tc/06/:  "Error handling evidence (graceful failure without raw values)"
  results/tc/07/:  "Configuration cascade evidence (defaults, overrides, missing config)"
  results/tc/08/:  "Release gate evidence (check-release JSON + strict mode)"

e2e-justification: >
  All goals require the real ace-git-secrets binary with gitleaks executing
  against a real git repository. Secret scanning inspects actual git history.
  Whitelist filtering depends on real config discovery. Rewrite-history
  needs git-filter-repo against actual commits. Config cascade requires
  real filesystem config resolution. Deterministic tests cover parser and
  component behavior; this scenario verifies end-to-end CLI workflow behavior.

unit-coverage-reviewed:
  - test/fast/atoms/gitleaks_runner_test.rb
  - test/fast/atoms/service_api_client_test.rb
  - test/fast/commands/cli_test.rb
  - test/fast/commands/revoke_command_test.rb
  - test/fast/commands/rewrite_command_test.rb
  - test/fast/models/detected_token_test.rb
  - test/fast/models/scan_report_test.rb
  - test/fast/molecules/git_rewriter_test.rb
  - test/fast/molecules/history_scanner_test.rb
  - test/fast/molecules/token_revoker_test.rb
  - test/fast/organisms/history_cleaner_test.rb
  - test/fast/organisms/release_gate_test.rb
  - test/fast/organisms/security_auditor_test.rb

requires:
  tools: [ace-git-secrets, git, gitleaks]
  ruby: ">= 3.0"

setup:
  - git-init
  - run: "cp ${ACE_E2E_SOURCE_ROOT:-$PROJECT_ROOT_PATH}/mise.toml mise.toml && mise trust mise.toml"
  - copy-fixtures
  - run: git add -A && git commit -m "initial" --quiet
  - agent-env:
      PROJECT_ROOT_PATH: .
